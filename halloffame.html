<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Elite Hall of Fame</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --silver: #c0c0c0; --bronze: #cd7f32; --bg: #0a0c0f; }
        
        body { 
            background: var(--bg); 
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://i.ibb.co/FbHYLMCD/BACKGROUND.png');
            background-size: cover; background-attachment: fixed; background-position: center;
            color: #eee; font-family: 'Open Sans', sans-serif; margin: 0; padding-bottom: 50px;
        }

        nav { background: rgba(0,0,0,0.95); padding: 20px; border-bottom: 2px solid var(--gold); text-align: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-family: 'Cinzel'; color: var(--gold); text-decoration: none; font-size: 1.8rem; letter-spacing: 5px; text-shadow: 0 0 15px var(--gold); }

        .container { max-width: 1600px; margin: 40px auto; padding: 0 40px; }

        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h2 { font-family: 'Cinzel'; font-size: 2.8rem; color: #fff; margin: 0; letter-spacing: 6px; text-transform: uppercase; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .line { width: 180px; height: 3px; background: var(--gold); margin: 15px auto; box-shadow: 0 0 20px var(--gold); }

        /* ELITE PODIUM SYSTEM - THE COMEBACK */
        .podium-wrapper { 
            display: flex; justify-content: center; align-items: flex-end; gap: 35px; margin-bottom: 120px; perspective: 1200px;
        }

        .fancy-card {
            position: relative; width: 310px; background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; display: flex; flex-direction: column; align-items: center;
            padding-bottom: 40px; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }

        /* 3D Hover & Glow */
        .fancy-card:hover { transform: translateY(-25px) rotateX(10deg); border-color: rgba(212,175,55,0.6); background: rgba(255, 255, 255, 0.08); }
        .fancy-card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 20px; z-index: -1; filter: blur(50px); opacity: 0; transition: 0.6s; }
        .r-1:hover::after { background: var(--gold); opacity: 0.3; }
        .r-2:hover::after { background: var(--silver); opacity: 0.2; }
        .r-3:hover::after { background: var(--bronze); opacity: 0.2; }

        /* Heights - Epic Scaling */
        .r-1 { height: 460px; z-index: 3; border: 2px solid var(--gold); }
        .r-2 { height: 380px; z-index: 2; }
        .r-3 { height: 320px; z-index: 1; }

        /* THE ANIMATED BORDER (RANK 1) */
        .r-1::before {
            content: ''; position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px;
            background: linear-gradient(45deg, var(--gold), transparent, var(--gold), transparent, var(--gold));
            background-size: 400%; z-index: -1; border-radius: 26px; 
            animation: borderGlow 4s linear infinite; opacity: 0.8;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            100% { background-position: 100% 50%; filter: hue-rotate(15deg); }
        }

        .rank-icon { font-size: 4.5rem; margin-top: -45px; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(0,0,0,0.8)); }
        
        .p-name { font-family: 'Cinzel'; font-size: 1.9rem; color: #fff; text-align: center; margin: 10px 0; letter-spacing: 1px; }
        .p-stat { font-family: 'Cinzel'; font-size: 4.5rem; font-weight: 900; color: var(--gold); margin: 10px 0; line-height: 1; text-shadow: 0 0 20px rgba(212,175,55,0.3); }
        .p-label { font-size: 0.75rem; letter-spacing: 4px; color: #888; text-transform: uppercase; font-weight: 700; }

        .divider { height: 3px; background: radial-gradient(circle, var(--gold) 0%, transparent 80%); margin: 100px 0; opacity: 0.3; }
    </style>
</head>
<body>

    <nav><a href="index.html" class="logo">BMA ELITE ARCHIVES</a></nav>

    <div class="container">
        
        <div class="section-header">
            <h2>THE IMMORTALS</h2>
            <div class="p-label">Legendary Killers of All-Time</div>
            <div class="line"></div>
        </div>
        <div id="ever-podium" class="podium-wrapper"></div>

        <div class="divider"></div>

        <div class="section-header">
            <h2>WEEKLY WARLORDS</h2>
            <div class="p-label">Dominating the Last 7 Days</div>
            <div class="line"></div>
        </div>
        <div id="weekly-podium" class="podium-wrapper"></div>

        <div class="divider"></div>

        <div class="section-header">
            <h2>THE SPECIALISTS</h2>
            <div class="p-label">Elite Mastery: Zaken / Fri / AQ / Orfen / Core</div>
            <div class="line"></div>
        </div>
        <div id="mid-podium" class="podium-wrapper"></div>

    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes", 
            databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const lowMidKeys = ['ZAK', 'FRI', 'AQ', 'ORF', 'COR'];

        db.ref().on('value', snap => {
            const data = snap.val();
            const allCPs = data.cps || {};
            const logs = data.dailyLogs || {};
            
            const everSorted = Object.values(allCPs)
                .map(cp => ({ name: cp.name, val: Object.values(cp.bossStats || {}).reduce((a,b)=>a+b, 0) }))
                .sort((a,b) => b.val - a.val);

            const last7Days = Array.from({length: 7}, (_, i) => {
                const d = new Date(); d.setDate(d.getDate() - i);
                return d.toLocaleDateString('el-GR').replace(/\//g, '-');
            });

            let wMap = {}, mMap = {};
            last7Days.forEach(date => {
                if(logs[date]) {
                    Object.values(logs[date]).forEach(bossData => {
                        Object.keys(bossData).forEach(bossId => {
                            const cid = bossData[bossId].cp;
                            wMap[cid] = (wMap[cid] || 0) + 1;
                            if(lowMidKeys.includes(bossId)) mMap[cid] = (mMap[cid] || 0) + 1;
                        });
                    });
                }
            });

            const wSorted = Object.keys(wMap).map(id => ({ name: allCPs[id]?.name || id, val: wMap[id] })).sort((a,b)=>b.val-a.val);
            const mSorted = Object.keys(mMap).map(id => ({ name: allCPs[id]?.name || id, val: mMap[id] })).sort((a,b)=>b.val-a.val);

            renderElite('ever-podium', everSorted.slice(0, 3));
            renderElite('weekly-podium', wSorted.slice(0, 3));
            renderElite('mid-podium', mSorted.slice(0, 3));
        });

        function renderElite(targetId, top3) {
            const area = document.getElementById(targetId);
            if(!top3 || top3.length === 0) { area.innerHTML = "<h2>DATA REDACTED</h2>"; return; }
            
            const p = [top3[1], top3[0], top3[2]];
            const r = [2, 1, 3];
            const m = ['🥈', '🥇', '🥉'];

            area.innerHTML = p.map((cp, i) => {
                if(!cp) return `<div style="width:310px"></div>`;
                return `
                    <div class="fancy-card r-${r[i]}">
                        <div class="rank-icon">${m[i]}</div>
                        <div class="p-label">RANK ${r[i]}</div>
                        <div class="p-name">${cp.name}</div>
                        <div class="p-stat">${cp.val}</div>
                        <div class="p-label">BOSS KILLS</div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
