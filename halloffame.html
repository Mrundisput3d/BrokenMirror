<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Hall of Fame</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0a0c0f; --card: #1c1f24; --blue: #3498db; }
        body { background: var(--bg); color: #eee; font-family: 'Open Sans', sans-serif; margin: 0; padding: 0; }
        nav { background: rgba(0,0,0,0.9); padding: 20px 40px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Cinzel'; color: var(--gold); text-decoration: none; font-size: 1.5rem; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .section-title { font-family: 'Cinzel'; color: var(--gold); text-align: center; font-size: 1.8rem; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .fame-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px; }
        .fame-card { background: var(--card); border: 1px solid #333; border-top: 3px solid var(--gold); border-radius: 10px; padding: 25px; text-align: center; }
        .fame-card.weekly { border-top-color: var(--blue); }
        
        .fame-label { font-family: 'Cinzel'; font-size: 0.75rem; color: #888; letter-spacing: 1px; }
        .fame-name { font-family: 'Cinzel'; font-size: 1.5rem; color: #fff; margin: 10px 0; }
        .fame-stat { font-size: 1.8rem; font-weight: bold; color: var(--gold); }
        .weekly .fame-stat { color: var(--blue); }
    </style>
</head>
<body>

    <nav><a href="index.html" class="logo">BMA ALLIANCE</a></nav>

    <div class="container">
        <div class="section-title">ALL-TIME LEGENDS</div>
        <div class="fame-grid" id="ever-grid">
            <div class="fame-card">
                <div class="fame-label">TOP BOSS KILLER (EVER)</div>
                <div id="ever-name" class="fame-name">...</div>
                <div id="ever-stat" class="fame-stat">0</div>
            </div>
        </div>

        <div class="section-title">WEEKLY DOMINANCE (LAST 7 DAYS)</div>
        <div class="fame-grid">
            <div class="fame-card weekly">
                <div class="fame-label">TOP OVERALL KILLER</div>
                <div id="weekly-name" class="fame-name">...</div>
                <div id="weekly-stat" class="fame-stat">0</div>
            </div>
            <div class="fame-card weekly">
                <div class="fame-label">LOW-MID BOSS MASTER</div>
                <div id="mid-name" class="fame-name">...</div>
                <div id="mid-stat" class="fame-stat">0</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes", databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const lowMidKeys = ['ZAK', 'FRI', 'AQ', 'ORF', 'COR'];

        // Sync Data
        Promise.all([
            db.ref('cps/').once('value'),
            db.ref('dailyLogs/').once('value')
        ]).then(snapshots => {
            const allCPs = snapshots[0].val() || {};
            const logs = snapshots[1].val() || {};
            
            processEver(allCPs);
            processWeekly(allCPs, logs);
        });

        function processEver(allCPs) {
            let bestCP = { name: '-', kills: -1 };
            Object.values(allCPs).forEach(cp => {
                let total = 0;
                if(cp.bossStats) Object.values(cp.bossStats).forEach(v => total += v);
                if(total > bestCP.kills) { bestCP = { name: cp.name, kills: total }; }
            });
            document.getElementById('ever-name').innerText = bestCP.name;
            document.getElementById('ever-stat').innerText = bestCP.kills;
        }

        function processWeekly(allCPs, logs) {
            const last7Days = [];
            for(let i=0; i<7; i++) {
                const d = new Date(); d.setDate(d.getDate() - i);
                last7Days.push(d.toLocaleDateString('el-GR').replace(/\//g, '-'));
            }

            let weeklyCounts = {}; // { cpId: kills }
            let midCounts = {};    // { cpId: kills }

            last7Days.forEach(date => {
                if(logs[date]) {
                    Object.keys(logs[date]).forEach(memberName => {
                        const bossData = logs[date][memberName]; // { BOSS_ID: { cp: id } }
                        Object.keys(bossData).forEach(bossId => {
                            const cpId = bossData[bossId].cp;
                            if(!weeklyCounts[cpId]) weeklyCounts[cpId] = 0;
                            if(!midCounts[cpId]) midCounts[cpId] = 0;
                            
                            weeklyCounts[cpId]++;
                            if(lowMidKeys.includes(bossId)) midCounts[cpId]++;
                        });
                    });
                }
            });

            const topWeekly = getBestFromMap(weeklyCounts, allCPs);
            const topMid = getBestFromMap(midCounts, allCPs);

            document.getElementById('weekly-name').innerText = topWeekly.name;
            document.getElementById('weekly-stat').innerText = topWeekly.val;
            document.getElementById('mid-name').innerText = topMid.name;
            document.getElementById('mid-stat').innerText = topMid.val;
        }

        function getBestFromMap(map, allCPs) {
            let best = { name: '-', val: 0 };
            Object.keys(map).forEach(id => {
                if(map[id] > best.val) {
                    best = { name: allCPs[id] ? allCPs[id].name : id, val: map[id] };
                }
            });
            return best;
        }
    </script>
</body>
</html>
