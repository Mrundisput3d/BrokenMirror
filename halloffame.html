<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Hall of Fame Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Open+Sans:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --silver: #e0e0e0; --bronze: #cd7f32; --bg: #050608; }
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% -20%, #1a1d24 0%, #050608 80%);
            color: #eee; font-family: 'Open Sans', sans-serif; margin: 0; padding-bottom: 100px;
        }
        
        nav { padding: 30px; text-align: center; border-bottom: 1px solid rgba(212,175,55,0.1); }
        .logo { font-family: 'Cinzel'; color: var(--gold); text-decoration: none; font-size: 2rem; letter-spacing: 5px; text-shadow: 0 0 20px rgba(212,175,55,0.5); }

        .container { max-width: 1300px; margin: 60px auto; padding: 0 20px; }
        
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h2 { font-family: 'Cinzel'; font-size: 2.5rem; color: #fff; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        .section-header .line { width: 100px; height: 3px; background: var(--gold); margin: 15px auto; box-shadow: 0 0 15px var(--gold); }

        /* THE ELITE PODIUM */
        .elite-podium { 
            display: flex; justify-content: center; align-items: flex-end; gap: 30px; margin-bottom: 120px; height: 450px;
        }

        .champion-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px 20px 10px 10px;
            width: 320px; position: relative;
            display: flex; flex-direction: column; align-items: center;
            padding-bottom: 30px; transition: 0.4s ease;
        }

        .champion-card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.06); border-color: rgba(255,255,255,0.2); }

        /* Ranks heights */
        .rank-1 { height: 420px; z-index: 3; border-top: 4px solid var(--gold); box-shadow: 0 20px 50px rgba(212,175,55,0.1); }
        .rank-2 { height: 350px; z-index: 2; border-top: 4px solid var(--silver); }
        .rank-3 { height: 300px; z-index: 1; border-top: 4px solid var(--bronze); }

        .crown { font-size: 2.5rem; margin-top: -30px; margin-bottom: 20px; filter: drop-shadow(0 0 10px currentColor); }
        .c-1 { color: var(--gold); } .c-2 { color: var(--silver); } .c-3 { color: var(--bronze); }

        .cp-name { font-family: 'Cinzel'; font-size: 1.8rem; margin: 10px 0; text-align: center; padding: 0 10px; }
        .cp-val { font-size: 3.5rem; font-weight: 900; margin: 10px 0; font-family: 'Cinzel'; opacity: 0.9; }
        .cp-label { font-size: 0.7rem; letter-spacing: 3px; color: #888; text-transform: uppercase; }

        .glow-bar { width: 100%; height: 5px; position: absolute; bottom: 0; left: 0; border-radius: 0 0 10px 10px; }
        .gb-1 { background: var(--gold); box-shadow: 0 0 20px var(--gold); }
        .gb-2 { background: var(--silver); box-shadow: 0 0 20px var(--silver); }
        .gb-3 { background: var(--bronze); box-shadow: 0 0 20px var(--bronze); }

    </style>
</head>
<body>

    <nav><a href="index.html" class="logo">BMA ELITE</a></nav>

    <div class="container">
        <div class="section-header">
            <h2>The Immortals</h2>
            <div class="cp-label" style="margin-top:5px;">Top Boss Killers (All Time)</div>
            <div class="line"></div>
        </div>
        <div id="ever-podium" class="elite-podium"></div>

        <div class="section-header">
            <h2>Weekly Warlords</h2>
            <div class="cp-label" style="margin-top:5px;">Overall Kills (Last 7 Days)</div>
            <div class="line"></div>
        </div>
        <div id="weekly-podium" class="elite-podium"></div>

        <div class="section-header">
            <h2>The Specialists</h2>
            <div class="cp-label" style="margin-top:5px;">Low-Mid Bosses (Weekly)</div>
            <div class="line"></div>
        </div>
        <div id="mid-podium" class="elite-podium"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes", databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const lowMidKeys = ['ZAK', 'FRI', 'AQ', 'ORF', 'COR'];

        Promise.all([
            db.ref('cps/').once('value'),
            db.ref('dailyLogs/').once('value')
        ]).then(snapshots => {
            const allCPs = snapshots[0].val() || {};
            const logs = snapshots[1].val() || {};
            
            // EVER
            const everSorted = Object.values(allCPs)
                .map(cp => ({ name: cp.name, val: Object.values(cp.bossStats || {}).reduce((a,b)=>a+b, 0) }))
                .sort((a,b) => b.val - a.val);
            renderElitePodium('ever-podium', everSorted.slice(0, 3));

            // WEEKLY (7 Days)
            const last7Days = Array.from({length: 7}, (_, i) => {
                const d = new Date(); d.setDate(d.getDate() - i);
                return d.toLocaleDateString('el-GR').replace(/\//g, '-');
            });

            let wMap = {}, mMap = {};
            last7Days.forEach(date => {
                if(logs[date]) {
                    Object.values(logs[date]).forEach(bossData => {
                        Object.keys(bossData).forEach(bossId => {
                            const cid = bossData[bossId].cp;
                            wMap[cid] = (wMap[cid] || 0) + 1;
                            if(lowMidKeys.includes(bossId)) mMap[cid] = (mMap[cid] || 0) + 1;
                        });
                    });
                }
            });

            const wSorted = Object.keys(wMap).map(id => ({ name: allCPs[id]?.name || id, val: wMap[id] })).sort((a,b)=>b.val-a.val);
            const mSorted = Object.keys(mMap).map(id => ({ name: allCPs[id]?.name || id, val: mMap[id] })).sort((a,b)=>b.val-a.val);

            renderElitePodium('weekly-podium', wSorted.slice(0, 3));
            renderElitePodium('mid-podium', mSorted.slice(0, 3));
        });

        function renderElitePodium(targetId, top3) {
            const area = document.getElementById(targetId);
            if(!top3[0]) { area.innerHTML = "<p>No Archives Found</p>"; return; }
            
            // Reorder for visual: 2, 1, 3
            const p = [top3[1], top3[0], top3[2]];
            const ranks = [2, 1, 3];
            const icons = ['🥈', '🥇', '🥉'];

            area.innerHTML = p.map((cp, i) => {
                if(!cp) return `<div style="width:320px"></div>`;
                return `
                    <div class="champion-card rank-${ranks[i]}">
                        <div class="crown c-${ranks[i]}">${icons[i]}</div>
                        <div class="cp-label">Rank ${ranks[i]}</div>
                        <div class="cp-name">${cp.name}</div>
                        <div class="cp-val">${cp.val}</div>
                        <div class="cp-label">Total Kills</div>
                        <div class="glow-bar gb-${ranks[i]}"></div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
