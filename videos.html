<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMA | PVP Media Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0c0f; color: #eee; font-family: 'Open Sans', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; padding: 40px 0; border-bottom: 2px solid #d4af37; }
        h1 { font-family: 'Cinzel'; color: #d4af37; letter-spacing: 3px; }

        /* VIDEO GRID */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; margin-top: 40px; }
        .video-card { background: #15181c; border: 1px solid #333; padding: 15px; border-radius: 8px; transition: 0.3s; }
        .video-card:hover { border-color: #d4af37; }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 5px; }
        .video-title { margin-top: 15px; font-family: 'Cinzel'; color: #d4af37; font-size: 0.9rem; }

        /* UPLOAD FORM */
        .upload-section { background: rgba(212, 175, 55, 0.05); border: 1px dashed #d4af37; padding: 30px; border-radius: 10px; margin-top: 60px; text-align: center; }
        input[type="text"] { background: #000; border: 1px solid #444; color: white; padding: 10px; width: 60%; border-radius: 5px; }
        .btn-submit { background: #d4af37; color: black; border: none; padding: 10px 25px; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        
        .back-btn { display: inline-block; margin-bottom: 20px; color: #d4af37; text-decoration: none; font-family: 'Cinzel'; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← BACK TO DASHBOARD</a>
        <header>
            <h1>ALLIANCE WAR ROOM: VIDEOS</h1>
            <p>Relive the glory of the battlefield</p>
        </header>

        <div class="video-grid">
            <div class="video-card">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                <div class="video-title">SIEGE OF ADEN - NOLDOR VS ALL</div>
            </div>
            <div class="video-card">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                <div class="video-title">VALAKAS ENGAGEMENT - KRIMINALIDES POV</div>
            </div>
        </div>

        <div class="upload-section">
            <h2 style="font-family:'Cinzel'; color:#d4af37;">SUBMIT YOUR PVP VIDEO</h2>
            <p>Paste your YouTube or Streamable link below for review</p>
            <form>
                <input type="text" placeholder="https://www.youtube.com/watch?v=...">
                <br>
                <button type="button" class="btn-submit" onclick="alert('Video submitted for review!')">SUBMIT LINK</button>
            </form>
        </div>
    </div>
</body>
</html>
