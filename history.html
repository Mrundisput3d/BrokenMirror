<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Hall of Fame</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --silver: #c0c0c0; --bronze: #cd7f32; --bg: #0a0c0f; --card: #15181c; }
        body { background: var(--bg); color: #eee; font-family: 'Open Sans', sans-serif; margin: 0; padding: 0; }
        
        nav { background: rgba(0,0,0,0.9); padding: 20px 40px; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Cinzel'; color: var(--gold); text-decoration: none; font-size: 1.5rem; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .section-title { font-family: 'Cinzel'; color: var(--gold); text-align: center; font-size: 2.2rem; margin-bottom: 50px; text-shadow: 0 0 15px rgba(212,175,55,0.4); }

        /* Podium Style */
        .podium { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 20px; align-items: end; margin-bottom: 80px; }
        .podium-card { background: var(--card); border: 1px solid #333; padding: 40px 20px; text-align: center; border-radius: 15px; position: relative; transition: 0.3s; }
        .podium-card:hover { transform: translateY(-10px); border-color: var(--gold); }
        
        .rank-1 { border-top: 5px solid var(--gold); box-shadow: 0 0 30px rgba(212,175,55,0.15); transform: scale(1.05); }
        .rank-2 { border-top: 5px solid var(--silver); }
        .rank-3 { border-top: 5px solid var(--bronze); }
        
        .podium-label { font-family: 'Cinzel'; font-size: 0.8rem; letter-spacing: 2px; color: #666; margin-bottom: 10px; }
        .podium-name { font-family: 'Cinzel'; font-size: 1.8rem; color: #fff; margin: 10px 0; }
        .podium-stat { font-size: 2.2rem; font-weight: bold; color: var(--gold); }
        .stat-desc { font-size: 0.7rem; color: #555; text-transform: uppercase; margin-top: 5px; }

        .divider { border-bottom: 1px solid #333; margin: 60px 0; position: relative; }
        .divider::after { content: '◈'; position: absolute; left: 50%; top: -10px; background: var(--bg); padding: 0 15px; color: var(--gold); transform: translateX(-50%); }
    </style>
</head>
<body>

    <nav><a href="index.html" class="logo">BMA ALLIANCE</a></nav>

    <div class="container">
        <div class="section-title">TOP BOSS KILLERS (EVER)</div>
        <div id="ever-podium" class="podium">
            </div>

        <div class="divider"></div>

        <div class="section-title">WEEKLY CHAMPIONS (7 DAYS)</div>
        <div id="weekly-podium" class="podium">
            </div>

        <div class="divider"></div>

        <div class="section-title">LOW-MID BOSS MASTERS (WEEKLY)</div>
        <div id="mid-podium" class="podium">
            </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes", databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const lowMidKeys = ['ZAK', 'FRI', 'AQ', 'ORF', 'COR'];

        Promise.all([
            db.ref('cps/').once('value'),
            db.ref('dailyLogs/').once('value')
        ]).then(snapshots => {
            const allCPs = snapshots[0].val() || {};
            const logs = snapshots[1].val() || {};
            
            // 1. Process Ever
            const everSorted = Object.values(allCPs)
                .map(cp => ({ name: cp.name, val: Object.values(cp.bossStats || {}).reduce((a,b)=>a+b, 0) }))
                .sort((a,b) => b.val - a.val);
            renderPodium('ever-podium', everSorted.slice(0, 3), 'Total Kills');

            // 2. Process Weekly
            const last7Days = [];
            for(let i=0; i<7; i++) {
                const d = new Date(); d.setDate(d.getDate() - i);
                last7Days.push(d.toLocaleDateString('el-GR').replace(/\//g, '-'));
            }

            let weeklyMap = {}, midMap = {};
            last7Days.forEach(date => {
                if(logs[date]) {
                    Object.values(logs[date]).forEach(bossData => {
                        Object.keys(bossData).forEach(bossId => {
                            const cpId = bossData[bossId].cp;
                            if(!weeklyMap[cpId]) weeklyMap[cpId] = 0;
                            if(!midMap[cpId]) midMap[cpId] = 0;
                            weeklyMap[cpId]++;
                            if(lowMidKeys.includes(bossId)) midMap[cpId]++;
                        });
                    });
                }
            });

            const weeklySorted = Object.keys(weeklyMap).map(id => ({ name: allCPs[id]?.name || id, val: weeklyMap[id] })).sort((a,b)=>b.val-a.val);
            const midSorted = Object.keys(midMap).map(id => ({ name: allCPs[id]?.name || id, val: midMap[id] })).sort((a,b)=>b.val-a.val);

            renderPodium('weekly-podium', weeklySorted.slice(0, 3), 'Weekly Kills');
            renderPodium('mid-podium', midSorted.slice(0, 3), 'Low-Mid Kills');
        });

        function renderPodium(targetId, top3, desc) {
            const area = document.getElementById(targetId);
            if(!top3[0]) { area.innerHTML = "<p style='text-align:center; width:100%; color:#444;'>No Data Found</p>"; return; }
            
            const p1 = top3[0] || { name: '-', val: 0 };
            const p2 = top3[1] || { name: '-', val: 0 };
            const p3 = top3[2] || { name: '-', val: 0 };

            area.innerHTML = `
                <div class="podium-card rank-2">
                    <div class="podium-label">RUNNER UP</div>
                    <div class="podium-name">${p2.name}</div>
                    <div class="podium-stat">${p2.val}</div>
                    <div class="stat-desc">${desc}</div>
                </div>
                <div class="podium-card rank-1">
                    <div class="podium-label">LEGENDARY</div>
                    <div class="podium-name">${p1.name}</div>
                    <div class="podium-stat">${p1.val}</div>
                    <div class="stat-desc">${desc}</div>
                </div>
                <div class="podium-card rank-3">
                    <div class="podium-label">CONTENDER</div>
                    <div class="podium-name">${p3.name}</div>
                    <div class="podium-stat">${p3.val}</div>
                    <div class="stat-desc">${desc}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
