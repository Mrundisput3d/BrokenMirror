<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Hall of Records</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0a0c0f; --card: #15181c; }
        body { background: var(--bg); color: #eee; font-family: 'Open Sans', sans-serif; margin: 0; padding: 40px; line-height: 1.6; }
        h1 { font-family: 'Cinzel'; color: var(--gold); text-align: center; font-size: 2.5rem; margin-bottom: 10px; text-shadow: 0 0 15px rgba(212,175,55,0.3); }
        .subtitle { text-align: center; color: #888; font-family: 'Cinzel'; margin-bottom: 50px; letter-spacing: 2px; }
        
        .history-container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        .history-card { 
            background: var(--card); 
            border: 1px solid #333; 
            border-left: 5px solid #444; 
            padding: 25px; 
            border-radius: 12px;
            display: grid;
            grid-template-columns: 2fr 3fr;
            align-items: center;
            gap: 20px;
        }
        
        .cp-info { border-right: 1px solid #333; padding-right: 20px; }
        .cp-name { font-family: 'Cinzel'; font-size: 1.6rem; color: var(--gold); margin: 0; }
        .cp-meta { font-size: 0.85rem; color: #666; margin-top: 5px; }
        .cp-pts-badge { display: inline-block; background: #222; padding: 4px 12px; border-radius: 20px; color: var(--gold); font-weight: bold; margin-top: 10px; border: 1px solid #444; }
        
        .loot-section { display: flex; flex-wrap: wrap; gap: 10px; }
        .loot-tag { 
            background: rgba(0,0,0,0.4); 
            border: 1px solid #444; 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .loot-tag img { width: 22px; height: 22px; border-radius: 3px; }
        
        .no-records { text-align: center; padding: 50px; color: #555; font-family: 'Cinzel'; }
    </style>
</head>
<body>

    <h1>HALL OF RECORDS</h1>
    <div class="subtitle">Legacy of the Fallen & The Retired</div>

    <div class="history-container" id="history-list">
        <div style="text-align: center; color: var(--gold);">Loading Archives...</div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes", 
            databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Σωστά Icons (Διόρθωσα το Core Ring)
        const itemIcons = {
            "Valakas Necklace": "https://i.ibb.co/84gZPVRP/necklace-valakas.png",
            "Antharas Earring": "https://i.ibb.co/rfqvc6mv/earring-antharas.png",
            "Baium Ring": "https://i.ibb.co/XrZkv67h/ring-of-baium.png",
            "Zaken Earring": "https://i.ibb.co/spkC6Gzz/zaken-earring.png",
            "Frintezza Necklace": "https://i.ibb.co/gF4YKGTM/frintezza-necklace.png",
            "Queen Ant Ring": "https://i.ibb.co/rKRtZmBG/ring-of-queen-ant.png",
            "Orfen Earring": "https://i.ibb.co/j9dDnXwH/earring-orfen.png",
            "Core Ring": "https://i.ibb.co/ksv37fNZ/ring-of-.png", // Εδώ ήταν το λάθος!
            "Siege": "https://i.ibb.co/Txfby6wD/images.png"
        };

        db.ref('cps/').on('value', snap => {
            const data = snap.val() || {};
            const container = document.getElementById('history-list');
            container.innerHTML = "";

            // Φιλτράρισμα και έλεγχος για crash (null checks)
            const historyList = Object.keys(data)
                .map(id => ({ id, ...data[id] }))
                .filter(cp => cp && cp.clan === 'history');

            if (historyList.length === 0) {
                container.innerHTML = "<div class='no-records'>THE ARCHIVES ARE CURRENTLY EMPTY</div>";
                return;
            }

            // Ταξινόμηση ανά πόντους
            historyList.sort((a, b) => (b.totalPoints || 0) - (a.totalPoints || 0));

            historyList.forEach(cp => {
                const card = document.createElement('div');
                card.className = 'history-card';
                
                let lootHtml = "";
                if (cp.lootHistory && Array.isArray(cp.lootHistory)) {
                    lootHtml = cp.lootHistory.map(l => {
                        const icon = itemIcons[l.item] || "https://i.ibb.co/Txfby6wD/images.png";
                        return `<div class="loot-tag"><img src="${icon}"> <span>${l.item}</span></div>`;
                    }).join('');
                } else {
                    lootHtml = "<span style='color:#444; font-style:italic;'>No legacy loot items found.</span>";
                }

                card.innerHTML = `
                    <div class="cp-info">
                        <h2 class="cp-name">${cp.name || 'Unknown CP'}</h2>
                        <div class="cp-meta">Leader: ${cp.leader || 'Unknown'}</div>
                        <div class="cp-pts-badge">${cp.totalPoints || 0} PTS</div>
                    </div>
                    <div class="loot-section">
                        ${lootHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }, error => {
            console.error(error);
            document.getElementById('history-list').innerHTML = "<div class='no-records'>DATABASE ERROR - CONTACT ADMIN</div>";
        });
    </script>
</body>
</html>
