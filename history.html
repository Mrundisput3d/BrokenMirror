<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Hall of Records</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0a0c0f; --card: rgba(21, 24, 28, 0.9); }
        
        body { 
            background: var(--bg); 
            /* Το background image που ζήτησες */
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://i.ibb.co/FbHYLMCD/BACKGROUND.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #eee; 
            font-family: 'Open Sans', sans-serif; 
            margin: 0; 
            padding: 0; 
        }
        
        /* NAVIGATION BAR */
        .nav-bar { 
            background: rgba(0,0,0,0.9); 
            border-bottom: 1px solid var(--gold); 
            padding: 15px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            backdrop-filter: blur(10px); 
        }
        .nav-logo { font-family: 'Cinzel'; color: var(--gold); font-size: 1.2rem; text-decoration: none; font-weight: bold; }
        .nav-links a { color: #888; text-decoration: none; font-family: 'Cinzel'; font-size: 0.9rem; margin-left: 20px; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }

        .header-section { padding: 60px 20px 20px; text-align: center; }
        h1 { font-family: 'Cinzel'; color: var(--gold); font-size: 2.8rem; margin: 0; text-shadow: 0 0 20px rgba(0,0,0,1); }
        .subtitle { color: #aaa; font-family: 'Cinzel'; margin-top: 10px; letter-spacing: 2px; font-size: 0.9rem; font-weight: bold; }
        
        .history-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr; gap: 20px; }
        
        .history-card { 
            background: var(--card); 
            border: 1px solid #333; 
            border-left: 5px solid #555; 
            padding: 25px; 
            border-radius: 12px;
            display: grid; 
            grid-template-columns: 2fr 3fr; 
            align-items: center; 
            gap: 20px;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .history-card:hover { border-left-color: var(--gold); transform: scale(1.01); }
        
        .cp-info { border-right: 1px solid #444; padding-right: 20px; }
        .cp-name { font-family: 'Cinzel'; font-size: 1.6rem; color: var(--gold); margin: 0; }
        .cp-pts-badge { display: inline-block; background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 20px; color: var(--gold); font-weight: bold; margin-top: 10px; border: 1px solid #555; }
        
        .loot-section { display: flex; flex-wrap: wrap; gap: 10px; }
        .loot-tag { 
            background: rgba(0,0,0,0.5); border: 1px solid #444; padding: 6px 12px; border-radius: 6px; 
            font-size: 0.8rem; display: flex; align-items: center; gap: 8px;
        }
        .loot-tag img { width: 22px; height: 22px; border-radius: 3px; }
        
        .no-records { text-align: center; padding: 100px; color: #888; font-family: 'Cinzel'; font-size: 1.2rem; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="index.html" class="nav-logo">BMA ALLIANCE</a>
        <div class="nav-links">
            <a href="index.html">DASHBOARD</a>
            <a href="History.html" style="color: var(--gold);">HISTORY</a>
            <a href="HallofFame.html">HALL OF FAME</a>
            <a href="admin.html">ADMIN</a>
        </div>
    </nav>

    <div class="header-section">
        <h1>HALL OF RECORDS</h1>
        <div class="subtitle">Eternal Legacy of the Fallen</div>
    </div>

    <div class="history-container" id="history-list">
        <div style="text-align: center; color: var(--gold);">Consulting the archives...</div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes", 
            databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const itemIcons = {
            "Valakas Necklace": "https://i.ibb.co/84gZPVRP/necklace-valakas.png",
            "Antharas Earring": "https://i.ibb.co/rfqvc6mv/earring-antharas.png",
            "Baium Ring": "https://i.ibb.co/XrZkv67h/ring-of-baium.png",
            "Zaken Earring": "https://i.ibb.co/spkC6Gzz/zaken-earring.png",
            "Frintezza Necklace": "https://i.ibb.co/gF4YKGTM/frintezza-necklace.png",
            "Queen Ant Ring": "https://i.ibb.co/rKRtZmBG/ring-of-queen-ant.png",
            "Orfen Earring": "https://i.ibb.co/j9dDnXwH/earring-orfen.png",
            "Core Ring": "https://i.ibb.co/ksv37fNZ/ring-of-.png"
        };

        db.ref('cps/').on('value', snap => {
            const data = snap.val() || {};
            const container = document.getElementById('history-list');
            container.innerHTML = "";

            const historyList = Object.keys(data)
                .map(id => ({ id, ...data[id] }))
                .filter(cp => cp && cp.clan === 'history');

            if (historyList.length === 0) {
                container.innerHTML = "<div class='no-records'>THE ARCHIVES ARE CURRENTLY EMPTY</div>";
                return;
            }

            historyList.sort((a, b) => (b.totalPoints || 0) - (a.totalPoints || 0));

            historyList.forEach(cp => {
                const card = document.createElement('div');
                card.className = 'history-card';
                
                let lootHtml = "";
                if (cp.lootHistory && Array.isArray(cp.lootHistory)) {
                    lootHtml = cp.lootHistory.map(l => {
                        const icon = itemIcons[l.item] || "https://i.ibb.co/Txfby6wD/images.png";
                        return `<div class="loot-tag"><img src="${icon}"> <span>${l.item}</span></div>`;
                    }).join('');
                } else {
                    lootHtml = "<span style='color:#666; font-style:italic;'>No legacy loot recorded.</span>";
                }

                card.innerHTML = `
                    <div class="cp-info">
                        <h2 class="cp-name">${cp.name}</h2>
                        <div style="font-size:0.85rem; color:#aaa; margin-top:5px;">Leader: ${cp.leader || 'Unknown'}</div>
                        <div class="cp-pts-badge">${cp.totalPoints || 0} PTS</div>
                    </div>
                    <div class="loot-section">${lootHtml}</div>
                `;
                container.appendChild(card);
            });
        });
    </script>
</body>
</html>
