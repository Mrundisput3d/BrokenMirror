<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Command Center V11</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0a0c0f; --card: #15181c; --red: #ff4444; --green: #28a745; }
        body { background: var(--bg); color: #eee; font-family: 'Open Sans', sans-serif; margin: 0; padding: 20px; font-size: 14px; }
        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .panel { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 10px; border-top: 3px solid var(--gold); }
        
        /* Selection List */
        .detected-cp-row { background: #000; padding: 10px; margin: 5px 0; border-radius: 5px; display: flex; align-items: center; border: 1px solid #333; transition: 0.2s; }
        .detected-cp-row:hover { border-color: var(--gold); }
        .detected-cp-row input[type="checkbox"] { width: 18px; height: 18px; margin-right: 12px; cursor: pointer; accent-color: var(--gold); }
        
        /* Boss Grid */
        .boss-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .boss-btn { background: #111; border: 1px solid #444; padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .boss-btn:hover { border-color: var(--gold); background: #1a1a1a; transform: translateY(-2px); }
        .boss-btn img { width: 35px; display: block; margin: 0 auto 5px; }
        .boss-btn span { font-size: 0.7rem; color: var(--gold); font-weight: bold; display: block; }
        .boss-btn small { font-size: 0.6rem; color: #888; }

        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-family: 'Cinzel'; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-gold:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <h1>BMA SUPREME ADMIN V11</h1>

    <div class="layout">
        <div class="panel">
            <h2>CP LIST</h2>
            <div id="cp-list-simple" style="max-height: 300px; overflow-y: auto; border: 1px solid #222; padding: 5px; margin-bottom: 15px;"></div>
            
            <hr style="border-color:#333;">
            <h3>QUICK CREATE</h3>
            <input type="text" id="new-name" placeholder="CP Name">
            <input type="text" id="new-leader" placeholder="Leader">
            <select id="new-clan">
                <option value="noldor">Noldor</option>
                <option value="kriminalides">Kriminalides</option>
                <option value="caller">Leader/Caller</option>
            </select>
            <button class="btn btn-gold" onclick="createNewCP()">CREATE CP</button>
        </div>

        <div class="panel">
            <h2>1. ATTENDANCE INPUT</h2>
            <textarea id="mass-input" rows="5" placeholder="Paste names from Discord or Game..." oninput="analyzeAttendance()"></textarea>
            
            <div id="detection-area" style="margin-top:15px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>2. VALIDATE TARGETS</h3>
                    <button onclick="toggleAllChecks()" style="background:none; border:1px solid var(--gold); color:var(--gold); cursor:pointer; font-size:0.7rem; padding:2px 5px;">Toggle All</button>
                </div>
                <div id="detected-list"></div>
            </div>

            <div class="boss-grid">
                <div class="boss-btn" onclick="logValidatedEvent('VAL', 3)"><img src="https://i.ibb.co/84gZPVRP/necklace-valakas.png"><span>VALAKAS</span><small>x3 pts</small></div>
                <div class="boss-btn" onclick="logValidatedEvent('ANT', 3)"><img src="https://i.ibb.co/rfqvc6mv/earring-antharas.png"><span>ANTHARAS</span><small>x3 pts</small></div>
                <div class="boss-btn" onclick="logValidatedEvent('BAI', 2)"><img src="https://i.ibb.co/XrZkv67h/ring-of-baium.png"><span>BAIUM</span><small>x2 pts</small></div>
                <div class="boss-btn" onclick="logValidatedEvent('SIE', 3)"><img src="https://i.ibb.co/Txfby6wD/images.png"><span>SIEGE</span><small>x3 pts</small></div>
                <div class="boss-btn" onclick="logValidatedEvent('ZAK', 1)"><img src="https://i.ibb.co/spkC6Gzz/zaken-earring.png"><span>ZAKEN</span><small>x1 pt</small></div>
                <div class="boss-btn" onclick="logValidatedEvent('FRI', 1)"><img src="https://i.ibb.co/gF4YKGTM/frintezza-necklace.png"><span>FRINTEZZA</span><small>x1 pt</small></div>
                <div class="boss-btn" onclick="logValidatedEvent('AQ', 1)"><img src="https://i.ibb.co/rKRtZmBG/ring-of-queen-ant.png"><span>QUEEN ANT</span><small>x1 pt</small></div>
                <div class="boss-btn" onclick="logValidatedEvent('ORF', 1)"><img src="https://i.ibb.co/j9dDnXwH/earring-orfen.png"><span>ORFEN</span><small>x1 pt</small></div>
            </div>

            <div id="edit-section" style="display:none; border-top:2px solid var(--gold); padding-top:15px; margin-top:20px;">
                <h2 id="edit-title" style="color:var(--gold); text-align:left;"></h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div>
                        <label>Edit Roster</label>
                        <textarea id="edit-members" rows="10"></textarea>
                        <button class="btn btn-gold" onclick="updateCP()">SAVE ROSTER</button>
                    </div>
                    <div>
                        <h3 style="color:var(--red); margin-top:0;">MARKETPLACE BUY</h3>
                        <select id="loot-market">
                            <option value="3100|Valakas Necklace">Valakas Necklace (3100)</option>
                            <option value="1100|Antharas Earring">Antharas Earring (1100)</option>
                            <option value="950|Baium Ring">Baium Ring (950)</option>
                            <option value="175|Zaken Earring">Zaken Earring (175)</option>
                            <option value="225|Frintezza Necklace">Frintezza Necklace (225)</option>
                            <option value="150|Queen Ant Ring">Queen Ant Ring (150)</option>
                            <option value="75|Orfen Earring">Orfen Earring (75)</option>
                            <option value="25|Core Ring">Core Ring (25)</option>
                        </select>
                        <button class="btn btn-red" onclick="addMarketLoot()">DEDUCT POINTS</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes", databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allCPs = {};
    let matchedData = {}; 
    let currentEditID = null;

    db.ref('cps/').on('value', snap => {
        allCPs = snap.val() || {};
        renderSimpleList();
    });

    function renderSimpleList() {
        const container = document.getElementById('cp-list-simple');
        container.innerHTML = Object.keys(allCPs)
            .filter(id => allCPs[id].clan !== 'history')
            .map(id => `<div onclick="loadEdit('${id}')" style="cursor:pointer; padding:8px; border-bottom:1px solid #222; font-size:0.8rem;">${allCPs[id].name}</div>`)
            .join('');
    }

    function analyzeAttendance() {
        const input = document.getElementById('mass-input').value.toLowerCase();
        const names = input.match(/[a-z0-9_]+/g) || [];
        const listDiv = document.getElementById('detected-list');
        listDiv.innerHTML = "";
        matchedData = {};

        Object.keys(allCPs).forEach(id => {
            const cp = allCPs[id];
            if(cp.clan === 'history') return;
            const roster = (cp.members || "").toLowerCase();
            const leader = (cp.leader || "").toLowerCase();
            let count = 0;
            names.forEach(n => { if(n.length > 2 && (roster.includes(n) || leader === n)) count++; });

            if(count > 0) {
                matchedData[id] = count;
                listDiv.innerHTML += `
                    <div class="detected-cp-row">
                        <input type="checkbox" class="cp-checkbox" id="check-${id}" checked>
                        <span><b>${cp.name}</b>: ${count} members detected</span>
                    </div>`;
            }
        });
    }

    function toggleAllChecks() {
        const cbs = document.querySelectorAll('.cp-checkbox');
        const firstVal = cbs[0] ? cbs[0].checked : false;
        cbs.forEach(cb => cb.checked = !firstVal);
    }

    async function logValidatedEvent(bossId, multiplier) {
        const checkboxes = document.querySelectorAll('.cp-checkbox');
        let done = false;

        for (const cb of checkboxes) {
            if (cb.checked) {
                const id = cb.id.replace('check-', '');
                const membersCount = matchedData[id];
                const pointsToAdd = membersCount * multiplier;

                await db.ref('cps/' + id).transaction(cp => {
                    if(cp) {
                        if(!cp.bossStats) cp.bossStats = {};
                        // Math: 1 member = 1 icon point
                        cp.bossStats[bossId] = (cp.bossStats[bossId] || 0) + membersCount;
                        cp.totalPoints = (cp.totalPoints || 0) + pointsToAdd;
                    }
                    return cp;
                });
                done = true;
            }
        }
        if(done) {
            alert("Success!");
            document.getElementById('mass-input').value = "";
            document.getElementById('detected-list').innerHTML = "";
        }
    }

    function loadEdit(id) {
        currentEditID = id;
        const cp = allCPs[id];
        document.getElementById('edit-section').style.display = 'block';
        document.getElementById('edit-title').innerText = "Managing: " + cp.name;
        document.getElementById('edit-members').value = cp.members || "";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function addMarketLoot() {
        const loot = document.getElementById('loot-market').value.split('|');
        if(!currentEditID) return;
        
        db.ref('cps/' + currentEditID).transaction(cp => {
            if(cp) {
                cp.totalPoints -= parseInt(loot[0]);
                if(!cp.lootHistory) cp.lootHistory = [];
                cp.lootHistory.push({ item: loot[1], cost: loot[0], date: new Date().toLocaleDateString('el-GR') });
            }
            return cp;
        });
        alert(`Purchased ${loot[1]} for ${loot[0]} PTS`);
    }

    function updateCP() {
        db.ref('cps/' + currentEditID).update({ members: document.getElementById('edit-members').value });
        alert("Roster Updated!");
    }

    function createNewCP() {
        const name = document.getElementById('new-name').value;
        const leader = document.getElementById('new-leader').value;
        const clan = document.getElementById('new-clan').value;
        if(!name) return;
        const id = name.replace(/\s+/g, '-').toLowerCase();
        db.ref('cps/' + id).set({ name, leader, clan, totalPoints: 0, members: "", bossStats: { VAL:0, ANT:0, BAI:0, SIE:0, ZAK:0, AQ:0, ORF:0, COR:0, FRI:0 } });
        alert("CP Created!");
    }
</script>
</body>
</html>
