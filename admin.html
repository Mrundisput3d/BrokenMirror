<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Admin Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Open+Sans&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #0a0c0f; --card: #15181c; --blue: #00d9ff; }
        body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: #eee; padding: 20px; }
        .card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, textarea, select { background: #000; border: 1px solid #444; color: #fff; padding: 10px; width: 100%; box-sizing: border-box; margin: 10px 0; }
        .btn { background: var(--gold); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; font-family: 'Cinzel'; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        #drop-zone { border: 2px dashed var(--gold); padding: 20px; text-align: center; cursor: pointer; }
        .clan-tag { padding: 2px 5px; border-radius: 3px; font-size: 0.8rem; font-weight: bold; }
        .noldor { color: var(--blue); border: 1px solid var(--blue); }
        .kriminalides { color: #ff3333; border: 1px solid #ff3333; }
    </style>
</head>
<body>

    <h1>BMA SYSTEM ADMIN</h1>

    <div class="card">
        <h3>1. ΔΙΑΧΕΙΡΙΣΗ CP (DATABASE)</h3>
        <table id="cp-table">
            <thead>
                <tr><th>NAME</th><th>CLAN</th><th>POINTS</th><th>ACTION</th></tr>
            </thead>
            <tbody id="cp-body">
                <tr><td colspan="4" id="loading-msg">Προσπάθεια σύνδεσης με τη βάση...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <h3>2. ΠΡΟΣΘΗΚΗ CP / BULK</h3>
        <input type="text" id="new-cp-name" placeholder="CP Name">
        <select id="new-cp-clan">
            <option value="noldor">NOLDOR</option>
            <option value="kriminalides">KRIMINALIDES</option>
        </select>
        <textarea id="new-cp-members" rows="3" placeholder="Ονόματα μελών χωρισμένα με κόμμα (π.χ. Player1, Player2)"></textarea>
        <button class="btn" onclick="saveCP()">ΑΠΟΘΗΚΕΥΣΗ CP</button>
    </div>

    <div class="card">
        <h3>3. ATTENDANCE SCANNER (OCR)</h3>
        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            ΚΛΙΚ ΓΙΑ ΦΩΤΟ Η CTRL+V
        </div>
        <input type="file" id="file-input" style="display:none" onchange="handleFile(this.files[0])">
        <div id="ocr-results" style="margin-top:10px; color:var(--gold); font-weight:bold; text-align:center;"></div>
        <button id="submit-ocr-btn" class="btn" style="display:none; background:green; color:white; margin-top:10px;" onclick="applyPoints()">ΕΠΙΒΕΒΑΙΩΣΗ ΠΟΝΤΩΝ (+1)</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes",
            authDomain: "brokenmirrordb.firebaseapp.com",
            databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "brokenmirrordb",
            storageBucket: "brokenmirrordb.firebasestorage.app",
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allCPs = {};
        let detectedCPs = [];

        // --- FETCH DATA ---
        db.ref('cps/').on('value', (snapshot) => {
            allCPs = snapshot.val() || {};
            const tbody = document.getElementById('cp-body');
            tbody.innerHTML = "";
            
            if (Object.keys(allCPs).length === 0) {
                tbody.innerHTML = "<tr><td colspan='4'>Η βάση είναι άδεια. Προσθέστε ένα CP.</td></tr>";
            }

            Object.keys(allCPs).forEach(id => {
                const cp = allCPs[id];
                tbody.innerHTML += `
                    <tr>
                        <td><b>${cp.name}</b></td>
                        <td><span class="clan-tag ${cp.clan}">${cp.clan}</span></td>
                        <td style="color:var(--gold)">${cp.totalPoints || 0}</td>
                        <td><button onclick="deleteCP('${id}')" style="background:red; color:white; border:none; cursor:pointer;">DEL</button></td>
                    </tr>
                `;
            });
            console.log("Data loaded from Firebase");
        }, (error) => {
            document.getElementById('loading-msg').innerText = "ΣΦΑΛΜΑ: " + error.message;
        });

        // --- SAVE CP ---
        function saveCP() {
            const name = document.getElementById('new-cp-name').value;
            const clan = document.getElementById('new-cp-clan').value;
            const members = document.getElementById('new-cp-members').value;
            
            if(!name || !members) return alert("Συμπλήρωσε Name και Members!");

            db.ref('cps/' + name).set({
                name: name,
                clan: clan,
                members: members,
                totalPoints: 0,
                updatedAt: Date.now()
            }).then(() => {
                alert("Το CP " + name + " αποθηκεύτηκε!");
                document.getElementById('new-cp-name').value = "";
                document.getElementById('new-cp-members').value = "";
            });
        }

        function deleteCP(id) {
            if(confirm("Διαγραφή;")) db.ref('cps/' + id).remove();
        }

        // --- OCR LOGIC ---
        function handleFile(file) {
            if(!file) return;
            const resultsDiv = document.getElementById('ocr-results');
            resultsDiv.innerText = "⏳ Scanning Image... παρακαλώ περιμένετε...";
            
            Tesseract.recognize(file, 'eng').then(({ data: { text } }) => {
                const cleanText = text.toLowerCase();
                detectedCPs = [];
                resultsDiv.innerHTML = "";

                Object.values(allCPs).forEach(cp => {
                    const members = cp.members.toLowerCase().split(',').map(m => m.trim());
                    let foundInThisCP = false;
                    
                    members.forEach(m => {
                        if(m.length > 2 && cleanText.includes(m)) foundInThisCP = true;
                    });

                    if(foundInThisCP) {
                        detectedCPs.push(cp.name);
                        resultsDiv.innerHTML += `<div style="color:var(--blue)">✅ Found CP: ${cp.name}</div>`;
                    }
                });

                if(detectedCPs.length > 0) {
                    document.getElementById('submit-ocr-btn').style.display = "block";
                } else {
                    resultsDiv.innerText = "❌ Κανένας παίκτης δεν βρέθηκε στη φωτογραφία.";
                }
            });
        }

        function applyPoints() {
            const updates = {};
            detectedCPs.forEach(cpName => {
                const currentPts = allCPs[cpName].totalPoints || 0;
                updates[`cps/${cpName}/totalPoints`] = currentPts + 1;
            });

            db.ref().update(updates).then(() => {
                alert("Οι πόντοι προστέθηκαν στα " + detectedCPs.length + " CP!");
                document.getElementById('submit-ocr-btn').style.display = "none";
                document.getElementById('ocr-results').innerHTML = "";
            });
        }

        // Paste support
        window.addEventListener('paste', e => {
            const file = e.clipboardData.files[0];
            if(file) handleFile(file);
        });
    </script>
</body>
</html>
