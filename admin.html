<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Admin Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #0a0c0f; --card: #15181c; --blue: #00d9ff; --red: #ff4444; }
        body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: #eee; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        h1, h2 { font-family: 'Cinzel'; color: var(--gold); text-align: center; }
        
        /* OCR & Dropzone */
        #drop-zone { border: 2px dashed var(--gold); padding: 30px; text-align: center; cursor: pointer; background: rgba(212,175,55,0.05); }
        .btn { background: var(--gold); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; font-family: 'Cinzel'; }
        
        /* Modal Styles */
        #manual-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; }
        .modal-content { background: var(--card); max-width: 800px; margin: 50px auto; padding: 25px; border: 2px solid var(--gold); border-radius: 10px; }
        
        .cp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin: 20px 0; }
        .cp-item { padding: 10px; border: 1px solid #444; text-align: center; cursor: pointer; border-radius: 5px; transition: 0.2s; font-weight: bold; }
        .cp-item.selected { background: var(--gold); color: #000; border-color: #fff; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        .clan-tag { padding: 3px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .noldor { color: var(--blue); border: 1px solid var(--blue); }
        .kriminalides { color: var(--red); border: 1px solid var(--red); }
    </style>
</head>
<body>

<div class="container">
    <h1>BMA CONTROL PANEL</h1>

    <div class="card">
        <h2>1. ATTENDANCE & OCR</h2>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <select id="event-mult" style="flex:1; padding:10px; background:#000; color:#fff; border:1px solid #444;">
                <option value="1">Mid Epic (x1)</option>
                <option value="2">Baium (x2)</option>
                <option value="3">High Epic (x3)</option>
            </select>
            <button class="btn" style="flex:1; background:#007bff; color:white;" onclick="openManualModal()">ΧΕΙΡΟΚΙΝΗΤΗ ΕΠΙΛΟΓΗ (NO PHOTO)</button>
        </div>
        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            Σύρετε τη φωτογραφία εδώ ή CTRL+V (Paste) για OCR
        </div>
        <input type="file" id="file-input" style="display:none" onchange="handleFile(this.files[0])">
    </div>

    <div class="card">
        <h2>2. CP ROSTER</h2>
        <table id="main-table">
            <thead>
                <tr><th>CP NAME</th><th>CLAN</th><th>POINTS</th><th>ACTIONS</th></tr>
            </thead>
            <tbody id="cp-body"></tbody>
        </table>
    </div>

    <div class="card">
        <h3>ΠΡΟΣΘΗΚΗ ΝΕΟΥ CP</h3>
        <input type="text" id="new-name" placeholder="CP Name" style="width:100%; padding:10px; margin-bottom:5px; background:#000; color:#fff; border:1px solid #444;">
        <textarea id="new-members" placeholder="Members (comma separated)" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #444;"></textarea>
        <button class="btn" onclick="saveNewCP()" style="margin-top:10px;">SAVE CP</button>
    </div>
</div>

<div id="manual-modal">
    <div class="modal-content">
        <h2 id="modal-title">Επιλογή CP για Πόντους</h2>
        <p style="text-align:center; color: var(--gold);">Κάντε κλικ στα CP που συμμετείχαν (τα επιλεγμένα είναι με χρυσό χρώμα)</p>
        
        <div class="cp-grid" id="modal-grid"></div>
        
        <div style="display:flex; gap:10px;">
            <button class="btn" style="background:#28a745; color:#fff;" onclick="submitAttendance()">ΕΠΙΒΕΒΑΙΩΣΗ & ΠΡΟΣΘΗΚΗ ΠΟΝΤΩΝ</button>
            <button class="btn" style="background:#555; color:#fff;" onclick="closeModal()">ΑΚΥΡΩΣΗ</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes",
        authDomain: "brokenmirrordb.firebaseapp.com",
        databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "brokenmirrordb",
        storageBucket: "brokenmirrordb.firebasestorage.app",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let allCPs = {};
    let selectedCPs = new Set();

    // --- SYNC DATA ---
    db.ref('cps/').on('value', (snapshot) => {
        allCPs = snapshot.val() || {};
        renderTable();
    });

    function renderTable() {
        const tbody = document.getElementById('cp-body');
        tbody.innerHTML = "";
        Object.keys(allCPs).forEach(id => {
            const cp = allCPs[id];
            tbody.innerHTML += `<tr>
                <td><b>${cp.name}</b></td>
                <td><span class="clan-tag ${cp.clan}">${cp.clan}</span></td>
                <td style="color:var(--gold); font-weight:bold;">${cp.totalPoints || 0}</td>
                <td><button onclick="deleteCP('${id}')" style="background:red; color:white; border:none; padding:5px; cursor:pointer;">DEL</button></td>
            </tr>`;
        });
    }

    // --- MODAL LOGIC ---
    function openManualModal() {
        selectedCPs.clear();
        renderModalGrid();
        document.getElementById('manual-modal').style.display = 'block';
    }

    function renderModalGrid() {
        const grid = document.getElementById('modal-grid');
        grid.innerHTML = "";
        Object.keys(allCPs).forEach(id => {
            if(allCPs[id].clan === 'history') return;
            const div = document.createElement('div');
            div.className = `cp-item ${selectedCPs.has(id) ? 'selected' : ''}`;
            div.innerText = id;
            div.onclick = () => {
                if(selectedCPs.has(id)) selectedCPs.delete(id);
                else selectedCPs.add(id);
                renderModalGrid();
            };
            grid.appendChild(div);
        });
    }

    function closeModal() { document.getElementById('manual-modal').style.display = 'none'; }

    // --- OCR LOGIC ---
    async function handleFile(file) {
        if(!file) return;
        const dz = document.getElementById('drop-zone');
        dz.innerText = "⏳ Scanning Party... (AI Analysis)";
        
        const worker = await Tesseract.createWorker('eng');
        await worker.setParameters({ tessedit_char_whitelist: 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789' });
        
        const { data: { text } } = await worker.recognize(file);
        await worker.terminate();
        
        const cleanText = text.toLowerCase();
        selectedCPs.clear();

        Object.values(allCPs).forEach(cp => {
            if(cp.clan === 'history') return;
            const members = cp.members.toLowerCase().split(',').map(m => m.trim());
            members.forEach(m => {
                if(m.length > 2 && cleanText.includes(m)) selectedCPs.add(cp.name);
            });
        });

        dz.innerText = "Σύρετε τη φωτογραφία εδώ ή CTRL+V (Paste) για OCR";
        openManualModal(); // Ανοίγει το modal με τα ήδη επιλεγμένα από το OCR
    }

    // --- FINAL SUBMIT ---
    function submitAttendance() {
        const mult = parseInt(document.getElementById('event-mult').value);
        if(selectedCPs.size === 0) return alert("Δεν επιλέχθηκε κανένα CP!");

        const updates = {};
        selectedCPs.forEach(id => {
            updates[`cps/${id}/totalPoints`] = (allCPs[id].totalPoints || 0) + mult;
        });

        db.ref().update(updates).then(() => {
            alert(`Προστέθηκαν ${mult} πόντοι σε ${selectedCPs.size} CP!`);
            closeModal();
        });
    }

    function saveNewCP() {
        const name = document.getElementById('new-name').value;
        const members = document.getElementById('new-members').value;
        if(!name) return;
        db.ref('cps/' + name).set({ name, clan: 'noldor', totalPoints: 0, members });
    }

    function deleteCP(id) { if(confirm("Διαγραφή;")) db.ref('cps/' + id).remove(); }

    window.addEventListener('paste', e => { if(e.clipboardData.files[0]) handleFile(e.clipboardData.files[0]); });
</script>

</body>
</html>
