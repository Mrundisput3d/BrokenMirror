<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Professional Admin System v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #0a0c0f; --card: #15181c; --blue: #00d9ff; --red: #ff4444; --gray: #888; }
        body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: #eee; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1, h2, h3 { font-family: 'Cinzel'; color: var(--gold); text-align: center; }
        .card { background: var(--card); border: 1px solid #333; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, textarea, select { background: #000; border: 1px solid #444; color: #fff; padding: 12px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 5px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; font-family: 'Cinzel'; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background: #fff; transform: translateY(-2px); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; }
        th { background: #000; color: var(--gold); text-transform: uppercase; }
        .clan-tag { padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; }
        .noldor { color: var(--blue); border: 1px solid var(--blue); }
        .kriminalides { color: var(--red); border: 1px solid var(--red); }
        .history { color: var(--gray); border: 1px solid var(--gray); }
        #drop-zone { border: 2px dashed var(--gold); padding: 40px; text-align: center; background: rgba(212,175,55,0.05); cursor: pointer; border-radius: 10px; }
        .detected-tag { display: inline-block; background: rgba(0,217,255,0.1); border: 1px solid var(--blue); color: var(--blue); padding: 5px 10px; border-radius: 4px; margin: 5px; line-height: 1.4; }
        .action-btns { display: flex; gap: 5px; }
        .small-btn { padding: 5px 8px; border: none; border-radius: 3px; cursor: pointer; font-size: 0.7rem; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>BMA ALLIANCE MANAGEMENT</h1>

    <div class="card" style="border-top: 4px solid var(--blue);">
        <h3>1. PARTY ATTENDANCE (L2 OPTIMIZED)</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label>Boss Multiplier</label>
                <select id="event-multiplier">
                    <option value="1">Mid Epic / Daily (x1)</option>
                    <option value="2">Baium / Special (x2)</option>
                    <option value="3">Antharas / Valakas / Siege (x3)</option>
                </select>
            </div>
            <div>
                <label>Event Name</label>
                <input type="text" id="event-name" placeholder="π.χ. Antharas Run">
            </div>
        </div>

        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            Σύρετε το Screenshot εδώ ή <b>Κάντε Κλικ</b> (ή CTRL+V)
        </div>
        <input type="file" id="file-input" style="display:none" onchange="handleFile(this.files[0])">
        
        <div id="ocr-results" style="margin-top:20px; text-align:center;"></div>
        <button id="submit-ocr-btn" class="btn" style="display:none; background:#28a745; color:white; margin-top:15px;" onclick="applyPoints()">ΚΑΤΑΧΩΡΗΣΗ ΠΟΝΤΩΝ</button>
    </div>

    <div class="card" style="border-top: 4px solid var(--gold);">
        <h3>2. CP REGISTRATION</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <select id="new-cp-clan">
                <option value="noldor">NOLDOR CLAN</option>
                <option value="kriminalides">KRIMINALIDES</option>
                <option value="history">HISTORY (LEAVERS)</option>
            </select>
            <input type="number" id="new-cp-points" placeholder="Start Pts" value="0">
        </div>
        <input type="text" id="new-cp-name" placeholder="CP Name">
        <textarea id="new-cp-members" rows="3" placeholder="Ονόματα μελών (κόμμα ή Enter)"></textarea>
        <button class="btn" onclick="saveCP()">SAVE TO DATABASE</button>
    </div>

    <div class="card">
        <h3>3. ACTIVE DATABASE</h3>
        <table>
            <thead>
                <tr><th>CP NAME</th><th>CLAN</th><th>POINTS</th><th>ACTIONS</th></tr>
            </thead>
            <tbody id="cp-body"></tbody>
        </table>
    </div>

    <div class="card" style="opacity: 0.7;">
        <h3>4. LEAVERS / HISTORY</h3>
        <table>
            <thead>
                <tr><th>CP NAME</th><th>FINAL PTS</th><th>ACTIONS</th></tr>
            </thead>
            <tbody id="history-body"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes",
        authDomain: "brokenmirrordb.firebaseapp.com",
        databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "brokenmirrordb",
        storageBucket: "brokenmirrordb.firebasestorage.app",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let allCPs = {};
    let detectedList = [];

    // --- REAL-TIME SYNC ---
    db.ref('cps/').on('value', (snapshot) => {
        allCPs = snapshot.val() || {};
        const tbody = document.getElementById('cp-body');
        const hbody = document.getElementById('history-body');
        tbody.innerHTML = ""; hbody.innerHTML = "";
        
        Object.keys(allCPs).forEach(id => {
            const cp = allCPs[id];
            if(cp.clan !== 'history') {
                tbody.innerHTML += `<tr><td><b>${cp.name}</b></td><td><span class="clan-tag ${cp.clan}">${cp.clan}</span></td><td style="color:var(--gold)">${cp.totalPoints || 0}</td><td class="action-btns"><button class="small-btn" style="background:#555;" onclick="moveToHistory('${id}')">LEAVE</button><button class="small-btn" style="background:red;" onclick="deleteCP('${id}')">DEL</button></td></tr>`;
            } else {
                hbody.innerHTML += `<tr><td>${cp.name}</td><td>${cp.totalPoints || 0}</td><td class="action-btns"><button class="small-btn" style="background:var(--blue);color:#000;" onclick="restoreCP('${id}')">RESTORE</button></td></tr>`;
            }
        });
    });

    // --- DATABASE FUNCTIONS ---
    function saveCP() {
        const name = document.getElementById('new-cp-name').value.trim();
        const clan = document.getElementById('new-cp-clan').value;
        const pts = parseInt(document.getElementById('new-cp-points').value) || 0;
        const members = document.getElementById('new-cp-members').value.split(/[\n,]+/).map(m => m.trim().toLowerCase()).filter(m => m !== "").join(', ');
        if(!name || !members) return alert("Missing Data!");
        db.ref('cps/' + name).set({ name, clan, totalPoints: pts, members, updatedAt: Date.now() }).then(() => alert("Saved!"));
    }

    function moveToHistory(id) { if(confirm("Move to History?")) db.ref('cps/' + id).update({ clan: 'history' }); }
    function restoreCP(id) { const c = prompt("Clan? (noldor/kriminalides)"); if(c) db.ref('cps/' + id).update({ clan: c }); }
    function deleteCP(id) { if(confirm("Delete Permanently?")) db.ref('cps/' + id).remove(); }

    // --- ENHANCED L2 OCR LOGIC ---
    async function handleFile(file) {
        if(!file) return;
        const resultsDiv = document.getElementById('ocr-results');
        resultsDiv.innerHTML = "<b style='color:var(--gold)'>⏳ Processing Image (Applying Contrast Filters)...</b>";
        document.getElementById('submit-ocr-btn').style.display = "none";
        detectedList = [];

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = async () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width; canvas.height = img.height;
                
                // Φίλτρο για να "πεταχτούν" τα λευκά γράμματα από το σκούρο φόντο
                ctx.filter = 'grayscale(100%) contrast(300%) brightness(150%)';
                ctx.drawImage(img, 0, 0);
                
                const worker = await Tesseract.createWorker('eng');
                await worker.setParameters({ tessedit_char_whitelist: 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 ' });
                
                const { data: { text } } = await worker.recognize(canvas.toDataURL());
                await worker.terminate();

                const fullText = text.toLowerCase();
                resultsDiv.innerHTML = "<h4>Party Recognition:</h4>";

                Object.values(allCPs).forEach(cp => {
                    if(cp.clan === 'history') return;
                    const members = cp.members.split(', ');
                    let found = [];
                    members.forEach(m => { if(m.length > 2 && fullText.includes(m.toLowerCase())) found.push(m); });

                    if(found.length > 0) {
                        detectedList.push(cp.name);
                        resultsDiv.innerHTML += `<div class="detected-tag">✅ ${cp.name}<br><small>Detected: ${found.join(', ')}</small></div>`;
                    }
                });

                if(detectedList.length > 0) document.getElementById('submit-ocr-btn').style.display = "block";
                else resultsDiv.innerHTML = "<p style='color:red'>No members detected. Try a clearer screenshot.</p>";
            };
        };
        reader.readAsDataURL(file);
    }

    function applyPoints() {
        const mult = parseInt(document.getElementById('event-multiplier').value);
        const updates = {};
        detectedList.forEach(name => { updates[`cps/${name}/totalPoints`] = (allCPs[name].totalPoints || 0) + mult; });
        db.ref().update(updates).then(() => { alert("Points Added!"); document.getElementById('submit-ocr-btn').style.display = "none"; });
    }

    window.addEventListener('paste', e => { const f = e.clipboardData.files[0]; if(f) handleFile(f); });
</script>
</body>
</html>
