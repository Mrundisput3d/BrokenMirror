<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Command Center PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #0f1113; --card: #1a1d21; --accent: #00d9ff; --red: #ff4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; }
        nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 15px; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        nav button { background: none; border: 1px solid #333; color: #888; padding: 10px 15px; cursor: pointer; font-family: 'Cinzel'; border-radius: 4px; }
        nav button.active { color: var(--gold); border-color: var(--gold); background: rgba(212,175,55,0.1); }
        .container { padding: 20px; max-width: 1100px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--card); border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        h2 { font-family: 'Cinzel'; color: var(--gold); margin-top: 0; font-size: 1.2rem; }
        input, select, textarea { background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; width: 100%; margin: 8px 0; }
        .btn { background: var(--gold); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; font-family: 'Cinzel'; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .tag { padding: 3px 6px; border-radius: 3px; font-size: 0.7rem; font-weight: bold; }
        .noldor { color: var(--accent); border: 1px solid var(--accent); }
        .kriminalides { color: var(--red); border: 1px solid var(--red); }
        .caller { color: #ccff00; border: 1px solid #ccff00; }
        .history { color: #888; border: 1px solid #888; }
        #drop-zone { border: 2px dashed #444; padding: 30px; text-align: center; color: #888; cursor: pointer; border-radius: 8px; }
        .attendance-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('tab-scan')" id="btn-scan" class="active">SCANNER</button>
    <button onclick="showTab('tab-manage')" id="btn-manage">ROSTER & MEMBERS</button>
    <button onclick="showTab('tab-add')" id="btn-add">NEW CP / CALLER</button>
</nav>

<div class="container">
    
    <div id="tab-scan" class="tab-content active">
        <div class="card">
            <h2>1. SELECT EVENT & BOSS</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <select id="boss-name">
                    <option value="Antharas">Antharas</option>
                    <option value="Valakas">Valakas</option>
                    <option value="Baium">Baium</option>
                    <option value="Orfen">Orfen</option>
                    <option value="Core">Core</option>
                    <option value="Queen Shyeed">Queen Shyeed</option>
                    <option value="Siege">Siege</option>
                    <option value="Daily Raid">Daily Raid</option>
                </select>
                <select id="multiplier">
                    <option value="1">Points per Member: x1</option>
                    <option value="2">Points per Member: x2</option>
                    <option value="3">Points per Member: x3</option>
                </select>
            </div>
            <div id="drop-zone" onclick="document.getElementById('file-input').click()" style="margin-top:15px;">
                Drop Party Screenshot or CTRL+V to Scan
            </div>
            <input type="file" id="file-input" style="display:none" onchange="handleFile(this.files[0])">
        </div>

        <div id="results-area" class="card" style="display:none;">
            <h2 id="summary-title">Attendance Summary</h2>
            <div id="attendance-list"></div>
            <button class="btn" style="margin-top:20px; background:#28a745; color:#fff;" onclick="finalizePoints()">CONFIRM & POST TO INDEX</button>
        </div>
    </div>

    <div id="tab-manage" class="tab-content">
        <div class="card">
            <h2>ACTIVE CP ROSTER</h2>
            <table id="roster-table">
                <thead>
                    <tr><th>Name</th><th>Role/Clan</th><th>Members</th><th>Actions</th></tr>
                </thead>
                <tbody id="roster-body"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-add" class="tab-content">
        <div class="card">
            <h2>ADD NEW ENTRY</h2>
            <input type="text" id="add-name" placeholder="Name (CP Name or Caller Name)">
            <select id="add-clan">
                <option value="noldor">NOLDOR (Clan)</option>
                <option value="kriminalides">KRIMINALIDES (Clan)</option>
                <option value="caller">CALLER (Solo)</option>
                <option value="history">HISTORY (Leaver)</option>
            </select>
            <textarea id="add-members" rows="3" placeholder="Member Names (comma separated). If Caller, put just their name."></textarea>
            <button class="btn" onclick="saveNewEntry()">SAVE TO DATABASE</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes",
        authDomain: "brokenmirrordb.firebaseapp.com",
        databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "brokenmirrordb",
        storageBucket: "brokenmirrordb.firebasestorage.app",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let allData = {};
    let tempAttendance = {};

    db.ref('cps/').on('value', s => {
        allData = s.val() || {};
        renderRoster();
    });

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id.replace('tab-', '')).classList.add('active');
    }

    async function handleFile(file) {
        if(!file) return;
        document.getElementById('drop-zone').innerText = "⌛ AI Analyzing Names...";
        const worker = await Tesseract.createWorker('eng');
        const { data: { text } } = await worker.recognize(file);
        await worker.terminate();
        
        const cleanText = text.toLowerCase();
        tempAttendance = {};

        Object.keys(allData).forEach(id => {
            if(allData[id].clan === 'history') return;
            // Αν είναι Caller, παίρνει πόντους αν βρεθεί το όνομά του
            if(allData[id].clan === 'caller') {
                if(cleanText.includes(id.toLowerCase())) tempAttendance[id] = 1;
            } else {
                const members = allData[id].members.toLowerCase().split(',').map(m => m.trim());
                let foundCount = 0;
                members.forEach(m => { if(m.length > 2 && cleanText.includes(m)) foundCount++; });
                if(foundCount > 0) tempAttendance[id] = foundCount;
            }
        });
        renderAttendance();
        document.getElementById('drop-zone').innerText = "Scan Complete. Check results below.";
    }

    function renderAttendance() {
        const list = document.getElementById('attendance-list');
        list.innerHTML = "";
        const mult = parseInt(document.getElementById('multiplier').value);
        Object.keys(tempAttendance).forEach(id => {
            const div = document.createElement('div');
            div.className = "attendance-row";
            div.innerHTML = `
                <span><b>${id}</b> (${allData[id].clan})</span>
                <div>
                    Members: <input type="number" style="width:50px;" value="${tempAttendance[id]}" onchange="tempAttendance['${id}']=this.value; renderAttendance();">
                    <span style="color:var(--gold); margin-left:10px;">+${tempAttendance[id] * mult} pts</span>
                </div>`;
            list.appendChild(div);
        });
        document.getElementById('results-area').style.display = "block";
    }

    function finalizePoints() {
        const boss = document.getElementById('boss-name').value;
        const mult = parseInt(document.getElementById('multiplier').value);
        const updates = {};
        const logEntry = { boss, date: new Date().toLocaleString(), winners: [] };

        Object.keys(tempAttendance).forEach(id => {
            const pts = parseInt(tempAttendance[id]) * mult;
            if(pts > 0) {
                updates[`cps/${id}/totalPoints`] = (allData[id].totalPoints || 0) + pts;
                logEntry.winners.push(`${id} (+${pts})`);
            }
        });

        db.ref().update(updates);
        db.ref('logs/').push(logEntry); // Στέλνει το log για το index
        alert("Points & Log Saved!");
        document.getElementById('results-area').style.display = "none";
    }

    function renderRoster() {
        const tbody = document.getElementById('roster-body');
        tbody.innerHTML = "";
        Object.keys(allData).forEach(id => {
            const cp = allData[id];
            tbody.innerHTML += `
                <tr>
                    <td><b>${id}</b></td>
                    <td><span class="tag ${cp.clan}">${cp.clan}</span></td>
                    <td><small>${cp.members}</small></td>
                    <td>
                        <button onclick="editMembers('${id}')" style="background:#333; color:#fff; border:none; padding:5px; cursor:pointer;">EDIT</button>
                        <button onclick="deleteEntry('${id}')" style="background:red; color:#fff; border:none; padding:5px; cursor:pointer;">X</button>
                    </td>
                </tr>`;
        });
    }

    function editMembers(id) {
        const newM = prompt("Update members for " + id, allData[id].members);
        if(newM) db.ref('cps/' + id).update({ members: newM });
    }

    function saveNewEntry() {
        const name = document.getElementById('add-name').value;
        const clan = document.getElementById('add-clan').value;
        const members = document.getElementById('add-members').value;
        if(!name) return alert("Enter a name!");
        db.ref('cps/' + name).set({ name, clan, members, totalPoints: 0 }).then(() => {
            alert("Saved!");
            showTab('tab-manage');
        });
    }

    function deleteEntry(id) { if(confirm("Delete " + id + "?")) db.ref('cps/' + id).remove(); }
    window.addEventListener('paste', e => { if(e.clipboardData.files[0]) handleFile(e.clipboardData.files[0]); });
</script>
</body>
</html>
