<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Professional Admin System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #0a0c0f; --card: #15181c; --blue: #00d9ff; --red: #ff4444; }
        body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: #eee; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1, h2, h3 { font-family: 'Cinzel'; color: var(--gold); text-align: center; }
        .card { background: var(--card); border: 1px solid #333; padding: 25px; border-radius: 12px; margin-bottom: 25px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; font-family: 'Cinzel'; width: 100%; }
        input, textarea, select { background: #000; border: 1px solid #444; color: #fff; padding: 10px; width: 100%; margin: 5px 0; border-radius: 5px; }
        
        /* Modal */
        #confirm-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; }
        .modal-content { background: var(--card); max-width: 800px; margin: 50px auto; padding: 30px; border: 2px solid var(--gold); border-radius: 15px; }
        
        .result-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
        .cp-selector { background: #222; padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #444; cursor: pointer; }
        .cp-selector.active { border-color: var(--gold); background: rgba(212,175,55,0.1); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; }
        .clan-tag { padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; }
        .noldor { color: var(--blue); border: 1px solid var(--blue); }
        .kriminalides { color: var(--red); border: 1px solid var(--red); }
        #drop-zone { border: 2px dashed var(--gold); padding: 40px; text-align: center; background: rgba(212,175,55,0.05); cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>BMA ATTENDANCE ENGINE</h1>

    <div class="card">
        <h3>1. SCAN PARTY SCREENSHOT</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;">
            <div>
                <label>Event Multiplier (Points per Member)</label>
                <select id="multiplier">
                    <option value="1">Daily Boss (x1)</option>
                    <option value="2">Baium (x2)</option>
                    <option value="3">Antharas/Valakas (x3)</option>
                </select>
            </div>
            <div style="display:flex; align-items:flex-end;">
                <button class="btn" style="background:#007bff; color:white;" onclick="openManual()">ΧΕΙΡΟΚΙΝΗΤΗ ΚΑΤΑΧΩΡΗΣΗ</button>
            </div>
        </div>
        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            Σύρετε τη φωτογραφία εδώ (ή CTRL+V)
        </div>
        <input type="file" id="file-input" style="display:none" onchange="handleFile(this.files[0])">
    </div>

    <div class="card">
        <h3>2. CP ROSTER</h3>
        <table>
            <thead>
                <tr><th>CP NAME</th><th>CLAN</th><th>POINTS</th><th>ACTIONS</th></tr>
            </thead>
            <tbody id="cp-body"></tbody>
        </table>
    </div>

    <div class="card">
        <h3>NEW CP / EDIT MEMBERS</h3>
        <input type="text" id="new-name" placeholder="CP Name">
        <textarea id="new-members" placeholder="Members (Comma separated, e.g: Player1, Player2, Player3...)"></textarea>
        <button class="btn" onclick="saveCP()">SAVE CP</button>
    </div>
</div>

<div id="confirm-modal">
    <div class="modal-content">
        <h2>ΕΠΙΒΕΒΑΙΩΣΗ ΠΟΝΤΩΝ PARTY</h2>
        <div id="modal-results"></div>
        <div style="margin-top:20px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn" style="background:#28a745; color:white;" onclick="applyPoints()">ΠΡΟΣΘΗΚΗ ΠΟΝΤΩΝ</button>
            <button class="btn" style="background:#555; color:white;" onclick="closeModal()">ΑΚΥΡΩΣΗ</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes",
        authDomain: "brokenmirrordb.firebaseapp.com",
        databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "brokenmirrordb",
        storageBucket: "brokenmirrordb.firebasestorage.app",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let allCPs = {};
    let currentAttendance = {}; // Θα κρατάει { CPName: countOfMembersFound }

    db.ref('cps/').on('value', s => {
        allCPs = s.val() || {};
        const tbody = document.getElementById('cp-body');
        tbody.innerHTML = "";
        Object.keys(allCPs).forEach(id => {
            const cp = allCPs[id];
            tbody.innerHTML += `<tr>
                <td><b>${cp.name}</b></td>
                <td><span class="clan-tag ${cp.clan}">${cp.clan}</span></td>
                <td style="color:var(--gold); font-weight:bold;">${cp.totalPoints || 0}</td>
                <td><button onclick="deleteCP('${id}')" style="background:red; color:white; border:none; padding:5px;">DEL</button></td>
            </tr>`;
        });
    });

    async function handleFile(file) {
        if(!file) return;
        document.getElementById('drop-zone').innerText = "⏳ AI ANALYSIS IN PROGRESS...";
        
        const worker = await Tesseract.createWorker('eng');
        await worker.setParameters({ tessedit_char_whitelist: 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789' });
        const { data: { text } } = await worker.recognize(file);
        await worker.terminate();
        
        const cleanText = text.toLowerCase();
        currentAttendance = {};

        // Ψάχνουμε κάθε μέλος κάθε CP μέσα στο κείμενο
        Object.values(allCPs).forEach(cp => {
            if(cp.clan === 'history') return;
            const members = cp.members.split(',').map(m => m.trim().toLowerCase());
            let foundInParty = 0;
            members.forEach(m => {
                if(m.length > 2 && cleanText.includes(m)) foundInParty++;
            });

            if(foundInParty > 0) {
                currentAttendance[cp.name] = foundInParty;
            }
        });

        showConfirmationModal();
        document.getElementById('drop-zone').innerText = "Σύρετε τη φωτογραφία εδώ (ή CTRL+V)";
    }

    function showConfirmationModal() {
        const resultsDiv = document.getElementById('modal-results');
        const mult = parseInt(document.getElementById('multiplier').value);
        resultsDiv.innerHTML = "";
        
        if(Object.keys(currentAttendance).length === 0) {
            resultsDiv.innerHTML = "<p style='color:red;'>Δεν βρέθηκαν μέλη στη φωτογραφία. Παρακαλώ επιλέξτε χειροκίνητα.</p>";
        }

        Object.keys(allCPs).forEach(cpName => {
            if(allCPs[cpName].clan === 'history') return;
            const count = currentAttendance[cpName] || 0;
            const pts = count * mult;
            
            const div = document.createElement('div');
            div.className = `cp-selector ${count > 0 ? 'active' : ''}`;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span><b>${cpName}</b></span>
                    <span>
                        Members: <input type="number" value="${count}" style="width:50px; display:inline;" 
                        onchange="updateManualCount('${cpName}', this.value)"> 
                        | Points: <b style="color:var(--gold)">+${pts}</b>
                    </span>
                </div>
            `;
            resultsDiv.appendChild(div);
        });
        document.getElementById('confirm-modal').style.display = 'block';
    }

    function updateManualCount(name, val) {
        currentAttendance[name] = parseInt(val) || 0;
        showConfirmationModal(); // Refresh points display
    }

    function applyPoints() {
        const mult = parseInt(document.getElementById('multiplier').value);
        const updates = {};
        Object.keys(currentAttendance).forEach(name => {
            const count = currentAttendance[name];
            if(count > 0) {
                const addedPoints = count * mult;
                updates[`cps/${name}/totalPoints`] = (allCPs[name].totalPoints || 0) + addedPoints;
            }
        });
        
        db.ref().update(updates).then(() => {
            alert("Οι πόντοι προστέθηκαν με επιτυχία!");
            closeModal();
        });
    }

    function openManual() {
        currentAttendance = {};
        showConfirmationModal();
    }

    function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; }
    function saveCP() {
        const name = document.getElementById('new-name').value;
        const members = document.getElementById('new-members').value;
        if(!name) return;
        db.ref('cps/' + name).update({ name, clan: 'noldor', members: members });
    }
    function deleteCP(id) { if(confirm("Delete?")) db.ref('cps/' + id).remove(); }
    window.addEventListener('paste', e => { if(e.clipboardData.files[0]) handleFile(e.clipboardData.files[0]); });
</script>
</body>
</html>
