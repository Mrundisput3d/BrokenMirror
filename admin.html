<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Alliance Admin | Broken Mirror</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Open Sans', sans-serif; background: #1a1c20; color: #eee; padding: 40px; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: #25282e; padding: 30px; border-radius: 10px; border: 1px solid var(--gold); }
        h2 { font-family: 'Cinzel'; color: #d4af37; text-align: center; }
        .cp-edit-row { background: #2f333a; padding: 15px; margin-bottom: 10px; border-radius: 5px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 10px; align-items: center; border-left: 4px solid #d4af37; }
        .cp-edit-row.is-history { border-left-color: #555; opacity: 0.8; }
        input, select { background: #1a1c20; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; width: 90%; }
        .save-btn { background: #d4af37; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .add-box { border: 2px dashed #444; padding: 20px; margin-top: 30px; text-align: center; }
        .history-label { font-size: 10px; color: #888; display: block; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h2>ALLIANCE MANAGEMENT</h2>
        <div id="admin-list">
            </div>

        <div class="add-box">
            <h3>ADD NEW CP</h3>
            <input type="text" id="new-name" placeholder="CP Name (e.g. Titans)">
            <select id="new-clan">
                <option value="noldor">Noldor</option>
                <option value="krim">Kriminalides</option>
                <option value="caller">Shot Caller</option>
                <option value="history">History (Leaver)</option>
            </select>
            <button class="save-btn" onclick="addNewCP()" style="margin-top:10px; width:200px;">CREATE CP</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes", 
            authDomain: "brokenmirrordb.firebaseapp.com", 
            databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "brokenmirrordb" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // LOAD ALL CPs
        db.ref('cps/').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            const list = document.getElementById('admin-list');
            list.innerHTML = "";

            Object.keys(data).forEach(id => {
                const cp = data[id];
                const isHistory = cp.clan === 'history';
                
                const div = document.createElement('div');
                div.className = `cp-edit-row ${isHistory ? 'is-history' : ''}`;
                div.innerHTML = `
                    <div>
                        ${isHistory ? '<span class="history-label">[ARCHIVED]</span>' : ''}
                        <input type="text" value="${cp.name}" onchange="updateCP('${id}', 'name', this.value)">
                    </div>
                    <select onchange="updateCP('${id}', 'clan', this.value)">
                        <option value="noldor" ${cp.clan==='noldor'?'selected':''}>Noldor</option>
                        <option value="krim" ${cp.clan==='krim'?'selected':''}>Kriminalides</option>
                        <option value="caller" ${cp.clan==='caller'?'selected':''}>Shot Caller</option>
                        <option value="history" ${cp.clan==='history'?'selected':''}>History</option>
                    </select>
                    <input type="number" value="${cp.totalPoints || 0}" onchange="updateCP('${id}', 'totalPoints', parseInt(this.value))">
                    <input type="text" value="${cp.leader || ''}" placeholder="Leader" onchange="updateCP('${id}', 'leader', this.value)">
                    <button class="save-btn" style="background:#ff4444; color:white;" onclick="deleteCP('${id}')">DELETE</button>
                `;
                list.appendChild(div);
            });
        });

        function updateCP(id, field, value) {
            db.ref('cps/' + id).update({ [field]: value });
        }

        function addNewCP() {
            const name = document.getElementById('new-name').value;
            const clan = document.getElementById('new-clan').value;
            if(!name) return alert("Enter CP Name");
            
            const newRef = db.ref('cps/').push();
            newRef.set({
                name: name,
                clan: clan,
                totalPoints: 0,
                leader: "",
                members: "",
                bossStats: { VAL:0, ANT:0, BAI:0, FRI:0, ZAK:0, AQ:0, ORF:0, COR:0, SIE:0 }
            });
            document.getElementById('new-name').value = "";
        }

        function deleteCP(id) {
            if(confirm("Are you sure? This will erase all loot history too!")) {
                db.ref('cps/' + id).remove();
            }
        }
    </script>
</body>
</html>
