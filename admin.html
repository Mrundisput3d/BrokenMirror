<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMA | Database Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0c0f; --card: #15181c; --blue: #00d9ff; --red: #ff3333; }
        body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 20px; }
        h1, h2 { font-family: 'Cinzel'; color: var(--gold); text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; }
        .admin-card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, select, textarea { background: #000; border: 1px solid #444; color: #fff; padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; border-radius: 6px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; font-family: 'Cinzel'; }
        .btn:hover { opacity: 0.8; }
        #drop-zone { border: 2px dashed var(--gold); padding: 30px; text-align: center; background: rgba(212, 175, 55, 0.05); cursor: pointer; margin: 10px 0; }
        .detected-tag { display: inline-block; background: rgba(0, 217, 255, 0.2); border: 1px solid var(--blue); color: var(--blue); padding: 4px 8px; border-radius: 4px; margin: 4px; font-size: 0.8rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        th { background: #000; color: var(--gold); }
        .clan-tag { padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; }
        .noldor { border: 1px solid var(--blue); color: var(--blue); }
        .kriminalides { border: 1px solid var(--red); color: var(--red); }
    </style>
</head>
<body>

<div class="container">
    <h1>ALLIANCE MANAGEMENT</h1>

    <div class="admin-card">
        <h2>DAILY ATTENDANCE (SCAN)</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <select id="event-type">
                <option value="1">MID EPICS (QA/Zaken/Fri) - x1</option>
                <option value="2">BAIUM - x2</option>
                <option value="3">HIGH EPICS (Valakas/Siege) - x3</option>
            </select>
            <input type="text" id="event-name" placeholder="Όνομα Event">
        </div>
        
        <input type="file" id="file-input" accept="image/*" style="display:none">
        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>Κάντε κλικ για <b>Επιλογή Φωτογραφίας</b> ή <b>CTRL+V</b></p>
        </div>
        
        <div id="ocr-status" style="text-align:center; color:var(--gold); margin:10px 0;"></div>
        <div id="detected-players" style="text-align:center;"></div>
        <button id="submit-attendance" class="btn" style="background:#28a745; color:#fff; display:none;" onclick="window.submitAttendance()">ΕΠΙΒΕΒΑΙΩΣΗ ΠΟΝΤΩΝ</button>
    </div>

    <div class="admin-card">
        <h2>ΜΑΖΙΚΗ ΕΙΣΑΓΩΓΗ CP</h2>
        <select id="bulk-clan">
            <option value="noldor">NOLDOR CLAN</option>
            <option value="kriminalides">KRIMINALIDES CLAN</option>
        </select>
        <input type="number" id="bulk-points" placeholder="Starting Points">
        <textarea id="bulk-input" rows="5" placeholder="Επικόλληση στήλης Excel..."></textarea>
        <button class="btn" onclick="window.processBulk()">ΔΗΜΙΟΥΡΓΙΑ CP</button>
    </div>

    <div class="admin-card">
        <table>
            <thead>
                <tr><th>CP NAME</th><th>CLAN</th><th>POINTS</th><th>ACTIONS</th></tr>
            </thead>
            <tbody id="cp-list-body"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import Tesseract from 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';

    const firebaseConfig = {
        apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes",
        authDomain: "brokenmirrordb.firebaseapp.com",
        databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "brokenmirrordb",
        storageBucket: "brokenmirrordb.firebasestorage.app",
        messagingSenderId: "609120206504",
        appId: "1:609120206504:web:3a35fbba3cecbbb0030c9d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let allCPs = {};
    let detectedList = [];

    // Εξαγωγή στο Window για να δουλεύουν τα κουμπιά
    window.processBulk = function() {
        const rawData = document.getElementById('bulk-input').value.trim();
        const clan = document.getElementById('bulk-clan').value;
        const pts = parseInt(document.getElementById('bulk-points').value) || 0;
        const lines = rawData.split('\n').map(l => l.trim()).filter(l => l !== "");
        
        if (lines.length < 2) return alert("Βάλε τουλάχιστον CP Name και Leader!");
        
        const cpName = lines[0];
        const leader = lines[1];
        const members = lines.slice(1).join(', ');

        set(ref(db, 'cps/' + cpName), {
            name: cpName, clan, leader, totalPoints: pts, members, updatedAt: Date.now()
        }).then(() => alert("Επιτυχία!"));
    };

    window.deleteCP = (name) => {
        if(confirm("Διαγραφή;")) remove(ref(db, 'cps/' + name));
    };

    // OCR Logic
    document.getElementById('file-input').addEventListener('change', e => {
        if(e.target.files[0]) startOCR(e.target.files[0]);
    });

    document.addEventListener('paste', e => {
        const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
        if(item) startOCR(item.getAsFile());
    });

    async function startOCR(blob) {
        const status = document.getElementById('ocr-status');
        status.innerText = "🔍 Σάρωση... παρακαλώ περιμένετε";
        const { data: { text } } = await Tesseract.recognize(blob, 'eng');
        const words = text.split(/\s+/).map(w => w.replace(/[^a-zA-Z0-9]/g, ''));
        
        detectedList = [];
        const container = document.getElementById('detected-players');
        container.innerHTML = "";

        words.forEach(word => {
            if(word.length < 3) return;
            Object.values(allCPs).forEach(cp => {
                if(cp.members.toLowerCase().includes(word.toLowerCase())) {
                    if(!detectedList.find(p => p.name === word)) {
                        detectedList.push({name: word, cp: cp.name});
                        container.innerHTML += `<span class="detected-tag">${word} (${cp.name})</span>`;
                    }
                }
            });
        });
        status.innerText = `Βρέθηκαν ${detectedList.length} παίκτες.`;
        document.getElementById('submit-attendance').style.display = detectedList.length ? 'block' : 'none';
    }

    window.submitAttendance = function() {
        const mult = parseInt(document.getElementById('event-type').value);
        const updates = {};
        const summary = {};
        
        detectedList.forEach(p => summary[p.cp] = (summary[p.cp] || 0) + mult);
        
        for(let cp in summary) {
            updates[`cps/${cp}/totalPoints`] = (allCPs[cp].totalPoints || 0) + summary[cp];
        }
        
        update(ref(db), updates).then(() => {
            alert("Πόντοι προστέθηκαν!");
            document.getElementById('detected-players').innerHTML = "";
            document.getElementById('submit-attendance').style.display = 'none';
        });
    };

    onValue(ref(db, 'cps/'), snap => {
        allCPs = snap.val() || {};
        const tbody = document.getElementById('cp-list-body');
        tbody.innerHTML = "";
        Object.values(allCPs).forEach(cp => {
            tbody.innerHTML += `<tr>
                <td>${cp.name}</td>
                <td><span class="clan-tag ${cp.clan}">${cp.clan}</span></td>
                <td>${cp.totalPoints}</td>
                <td><button onclick="window.deleteCP('${cp.name}')">DEL</button></td>
            </tr>`;
        });
    });
</script>
</body>
</html>
