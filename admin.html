<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMA | Professional Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0c0f; --card: #15181c; --blue: #00d9ff; --red: #ff3333; }
        body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 20px; }
        h1, h2 { font-family: 'Cinzel'; color: var(--gold); text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; }
        .admin-card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, select, textarea { background: #000; border: 1px solid #444; color: #fff; padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; border-radius: 6px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; font-family: 'Cinzel'; }
        .btn:hover { background: #fff; }
        #drop-zone { border: 2px dashed var(--gold); padding: 30px; text-align: center; background: rgba(212, 175, 55, 0.05); cursor: pointer; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; font-size: 0.85rem; }
        th { background: #000; color: var(--gold); }
        .clan-tag { padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; }
        .noldor { border: 1px solid var(--blue); color: var(--blue); }
        .kriminalides { border: 1px solid var(--red); color: var(--red); }
        .history { border: 1px solid #888; color: #888; }
        .detected-tag { display: inline-block; background: rgba(0,217,255,0.1); border: 1px solid var(--blue); color: var(--blue); padding: 4px 8px; border-radius: 4px; margin: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ALLIANCE MANAGEMENT PANEL</h1>

    <div class="admin-card">
        <h2>1. ATTENDANCE SCANNER</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <select id="event-type">
                <option value="1">MID EPICS (x1)</option>
                <option value="2">BAIUM (x2)</option>
                <option value="3">HIGH EPICS (x3)</option>
            </select>
            <input type="text" id="event-name" placeholder="Event Name">
        </div>
        <input type="file" id="file-input" accept="image/*" style="display:none">
        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            Κάντε κλικ για Επιλογή ή CTRL+V (Paste)
        </div>
        <div id="ocr-status" style="text-align:center; margin:10px 0; color:var(--gold);"></div>
        <div id="detected-players" style="text-align:center;"></div>
        <button id="submit-attendance" class="btn" style="background:#28a745; color:white; display:none;" onclick="window.submitAttendance()">ΚΑΤΑΧΩΡΗΣΗ ΠΟΝΤΩΝ</button>
    </div>

    <div class="admin-card">
        <h2>2. BULK CP IMPORT</h2>
        <select id="bulk-clan">
            <option value="noldor">NOLDOR CLAN</option>
            <option value="kriminalides">KRIMINALIDES CLAN</option>
            <option value="history">LEAVERS / HISTORY</option>
        </select>
        <input type="number" id="bulk-points" placeholder="Starting Points">
        <textarea id="bulk-input" rows="4" placeholder="Paste Excel column..."></textarea>
        <button class="btn" onclick="window.processBulk()">SAVE TO DATABASE</button>
    </div>

    <div class="admin-card">
        <h2>3. DATABASE (CP LIST)</h2>
        <table>
            <thead>
                <tr>
                    <th>CP NAME</th>
                    <th>CLAN</th>
                    <th>POINTS</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody id="cp-list-body"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import Tesseract from 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';

    const firebaseConfig = {
        apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes",
        authDomain: "brokenmirrordb.firebaseapp.com",
        databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "brokenmirrordb",
        storageBucket: "brokenmirrordb.firebasestorage.app",
        messagingSenderId: "609120206504",
        appId: "1:609120206504:web:3a35fbba3cecbbb0030c9d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let allCPs = {};
    let detectedList = [];

    // --- ΣΥΝΔΕΣΗ ΜΕ ΤΟΝ ΠΙΝΑΚΑ (Real-time) ---
    onValue(ref(db, 'cps/'), (snap) => {
        allCPs = snap.val() || {};
        const tbody = document.getElementById('cp-list-body');
        tbody.innerHTML = "";
        
        Object.keys(allCPs).forEach(key => {
            const cp = allCPs[key];
            tbody.innerHTML += `
                <tr>
                    <td><b>${cp.name}</b></td>
                    <td><span class="clan-tag ${cp.clan}">${cp.clan}</span></td>
                    <td style="color:var(--gold)">${cp.totalPoints}</td>
                    <td>
                        <button onclick="window.moveToLeavers('${cp.name}')" style="background:#555; color:white; border:none; padding:4px; cursor:pointer; font-size:0.7rem;">LEAVER</button>
                        <button onclick="window.deleteCP('${cp.name}')" style="background:red; color:white; border:none; padding:4px; cursor:pointer; font-size:0.7rem;">DEL</button>
                    </td>
                </tr>`;
        });
    });

    // --- ΣΥΝΑΡΤΗΣΕΙΣ (WINDOW EXPORT) ---
    window.processBulk = function() {
        const raw = document.getElementById('bulk-input').value.trim();
        const clan = document.getElementById('bulk-clan').value;
        const pts = parseInt(document.getElementById('bulk-points').value) || 0;
        const lines = raw.split('\n').map(l => l.trim()).filter(l => l !== "");
        if(lines.length < 2) return alert("Paste more data!");
        
        const cpName = lines[0];
        set(ref(db, 'cps/' + cpName), {
            name: cpName, clan, leader: lines[1], totalPoints: pts, members: lines.slice(1).join(', '), updatedAt: Date.now()
        }).then(() => alert("Saved!"));
    };

    window.moveToLeavers = function(name) {
        if(confirm(`Μετακίνηση του ${name} στους Leavers;`)) {
            update(ref(db, 'cps/' + name), { clan: 'history' });
        }
    };

    window.deleteCP = function(name) {
        if(confirm(`Οριστική διαγραφή του ${name};`)) remove(ref(db, 'cps/' + name));
    };

    // --- OCR LOGIC ---
    document.getElementById('file-input').onchange = e => e.target.files[0] && startOCR(e.target.files[0]);
    document.onpaste = e => {
        const item = Array.from(e.clipboardData.items).find(x => x.type.includes('image'));
        if(item) startOCR(item.getAsFile());
    };

    async function startOCR(blob) {
        const status = document.getElementById('ocr-status');
        status.innerText = "⏳ Scanning image...";
        try {
            const worker = await Tesseract.createWorker('eng');
            const { data: { text } } = await worker.recognize(blob);
            await worker.terminate();
            
            const words = text.toLowerCase().split(/[\s,]+/).map(w => w.replace(/[^a-z0-9]/g, ''));
            detectedList = [];
            const container = document.getElementById('detected-players');
            container.innerHTML = "";

            Object.values(allCPs).forEach(cp => {
                const roster = cp.members.toLowerCase();
                words.forEach(word => {
                    if(word.length > 2 && roster.includes(word)) {
                        if(!detectedList.find(p => p.name === word)) {
                            detectedList.push({name: word, cp: cp.name});
                            container.innerHTML += `<span class="detected-tag">${word} (${cp.name})</span>`;
                        }
                    }
                });
            });
            status.innerText = `Detected ${detectedList.length} players!`;
            document.getElementById('submit-attendance').style.display = detectedList.length ? 'block' : 'none';
        } catch(e) { status.innerText = "Error: " + e.message; }
    }

    window.submitAttendance = function() {
        const mult = parseInt(document.getElementById('event-type').value);
        const updates = {};
        const sums = {};
        detectedList.forEach(p => sums[p.cp] = (sums[p.cp] || 0) + mult);
        for(let cp in sums) {
            updates[`cps/${cp}/totalPoints`] = (allCPs[cp].totalPoints || 0) + sums[cp];
        }
        update(ref(db), updates).then(() => alert("Points Updated!"));
    };
</script>
</body>
</html>
