<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Command Center V12</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0a0c0f; --card: #15181c; --red: #ff4444; --green: #28a745; --blue: #3498db; }
        body { background: var(--bg); color: #eee; font-family: 'Open Sans', sans-serif; margin: 0; padding: 20px; font-size: 14px; }
        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .panel { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 10px; border-top: 3px solid var(--gold); }
        
        .detected-cp-row { background: #000; padding: 10px; margin: 5px 0; border-radius: 5px; display: flex; align-items: center; border: 1px solid #333; }
        .detected-cp-row input[type="checkbox"] { width: 18px; height: 18px; margin-right: 12px; accent-color: var(--gold); }
        
        .boss-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
        .boss-btn { background: #111; border: 1px solid #444; padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .boss-btn:hover { border-color: var(--gold); background: #1a1a1a; }
        .boss-btn img { width: 30px; display: block; margin: 0 auto 5px; }
        .boss-btn span { font-size: 0.65rem; color: var(--gold); font-weight: bold; }

        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-family: 'Cinzel'; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-blue { background: var(--blue); color: #fff; }

        .stat-edit-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .stat-field { background: #222; padding: 5px; border-radius: 4px; text-align: center; font-size: 0.75rem; border: 1px solid #444; }
        .stat-field input { width: 50px; text-align: center; padding: 2px; margin: 0; background: #000; border: 1px solid var(--gold); color: var(--gold); }
    </style>
</head>
<body>

    <h1>BMA COMMAND CENTER V12</h1>

    <div class="layout">
        <div class="panel">
            <h2>CP LIST</h2>
            <div id="cp-list-simple" style="max-height: 400px; overflow-y: auto; margin-bottom: 15px;"></div>
            <hr style="border-color:#333;">
            <h3>NEW CP / CALLER</h3>
            <input type="text" id="new-name" placeholder="Name">
            <input type="text" id="new-leader" placeholder="Leader">
            <select id="new-clan">
                <option value="noldor">Noldor</option>
                <option value="kriminalides">Kriminalides</option>
                <option value="caller">Leader/Caller</option>
            </select>
            <button class="btn btn-gold" onclick="createNewCP()">CREATE</button>
        </div>

        <div class="panel">
            <h2>1. ATTENDANCE & EVENTS</h2>
            <textarea id="mass-input" rows="4" placeholder="Paste names here..." oninput="analyzeAttendance()"></textarea>
            
            <div id="detection-area">
                <div id="detected-list"></div>
            </div>

            <div class="boss-grid">
                <div class="boss-btn" onclick="logValidatedEvent('VAL', 3)"><img src="https://i.ibb.co/84gZPVRP/necklace-valakas.png"><span>VAL x3</span></div>
                <div class="boss-btn" onclick="logValidatedEvent('ANT', 3)"><img src="https://i.ibb.co/rfqvc6mv/earring-antharas.png"><span>ANT x3</span></div>
                <div class="boss-btn" onclick="logValidatedEvent('BAI', 2)"><img src="https://i.ibb.co/XrZkv67h/ring-of-baium.png"><span>BAI x2</span></div>
                <div class="boss-btn" onclick="logValidatedEvent('SIE', 3)"><img src="https://i.ibb.co/Txfby6wD/images.png"><span>SIEGE x3</span></div>
                <div class="boss-btn" onclick="logValidatedEvent('ZAK', 1)"><img src="https://i.ibb.co/spkC6Gzz/zaken-earring.png"><span>ZAK x1</span></div>
                <div class="boss-btn" onclick="logValidatedEvent('FRI', 1)"><img src="https://i.ibb.co/gF4YKGTM/frintezza-necklace.png"><span>FRIN x1</span></div>
                <div class="boss-btn" onclick="logValidatedEvent('AQ', 1)"><img src="https://i.ibb.co/rKRtZmBG/ring-of-queen-ant.png"><span>AQ x1</span></div>
                <div class="boss-btn" onclick="logValidatedEvent('ORF', 1)"><img src="https://i.ibb.co/j9dDnXwH/earring-orfen.png"><span>ORF x1</span></div>
                <div class="boss-btn" onclick="logValidatedEvent('COR', 1)"><img src="https://i.ibb.co/ksv37fNZ/ring-of-.png"><span>CORE x1</span></div>
            </div>

            <div id="edit-section" style="display:none; border-top:2px solid var(--gold); padding-top:20px; margin-top:20px;">
                <h2 id="edit-title" style="color:var(--gold); text-align:left;"></h2>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:25px;">
                    <div>
                        <label>Roster (Names)</label>
                        <textarea id="edit-members" rows="12"></textarea>
                        <button class="btn btn-gold" onclick="updateCP()">SAVE ALL CHANGES</button>
                    </div>
                    <div>
                        <h3 style="color:var(--red); margin:0;">MARKETPLACE</h3>
                        <select id="loot-market">
                            <option value="3100|Valakas Necklace">Valakas Necklace (3100)</option>
                            <option value="1100|Antharas Earring">Antharas Earring (1100)</option>
                            <option value="950|Baium Ring">Baium Ring (950)</option>
                            <option value="225|Frintezza Necklace">Frintezza Necklace (225)</option>
                            <option value="175|Zaken Earring">Zaken Earring (175)</option>
                            <option value="150|Queen Ant Ring">Queen Ant Ring (150)</option>
                            <option value="75|Orfen Earring">Orfen Earring (75)</option>
                            <option value="25|Core Ring">Core Ring (25)</option>
                        </select>
                        <button class="btn btn-red" onclick="addMarketLoot()">REGISTER LOOT</button>

                        <hr style="border-color:#333; margin:15px 0;">
                        
                        <label>Total Points</label>
                        <input type="number" id="edit-points" style="color:var(--gold); font-weight:bold; font-size:1.1rem;">
                        
                        <div class="stat-edit-grid" id="stat-inputs"></div>

                        <div style="display:flex; gap:10px; margin-top:20px;">
                            <button class="btn btn-blue" style="flex:1;" onclick="moveToHistory()">TO HISTORY</button>
                            <button class="btn btn-red" style="flex:1; background:#8b0000;" onclick="deleteCP()">DELETE</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes", databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allCPs = {};
    let matchedData = {}; 
    let currentEditID = null;
    const bossKeys = ['VAL', 'ANT', 'BAI', 'SIE', 'ZAK', 'FRI', 'AQ', 'ORF', 'COR'];

    db.ref('cps/').on('value', snap => {
        allCPs = snap.val() || {};
        renderSimpleList();
        if(currentEditID) loadEdit(currentEditID); // Refresh UI if editing
    });

    function renderSimpleList() {
        const container = document.getElementById('cp-list-simple');
        container.innerHTML = Object.keys(allCPs)
            .filter(id => allCPs[id].clan !== 'history')
            .map(id => `<div onclick="loadEdit('${id}')" style="cursor:pointer; padding:8px; border-bottom:1px solid #222; font-size:0.8rem;">${allCPs[id].name} <span style="float:right; color:var(--gold)">${allCPs[id].totalPoints}</span></div>`)
            .join('');
    }

    function analyzeAttendance() {
        const input = document.getElementById('mass-input').value.toLowerCase();
        const names = input.match(/[a-z0-9_]+/g) || [];
        const listDiv = document.getElementById('detected-list');
        listDiv.innerHTML = "";
        matchedData = {};

        Object.keys(allCPs).forEach(id => {
            if(allCPs[id].clan === 'history') return;
            const roster = (allCPs[id].members || "").toLowerCase();
            const leader = (allCPs[id].leader || "").toLowerCase();
            let count = 0;
            names.forEach(n => { if(n.length > 2 && (roster.includes(n) || leader === n)) count++; });

            if(count > 0) {
                matchedData[id] = count;
                listDiv.innerHTML += `<div class="detected-cp-row"><input type="checkbox" class="cp-checkbox" id="check-${id}" checked><span><b>${allCPs[id].name}</b>: ${count} members</span></div>`;
            }
        });
    }

    async function logValidatedEvent(bossId, multiplier) {
        const checkboxes = document.querySelectorAll('.cp-checkbox');
        for (const cb of checkboxes) {
            if (cb.checked) {
                const id = cb.id.replace('check-', '');
                const mCount = matchedData[id];
                await db.ref('cps/' + id).transaction(cp => {
                    if(cp) {
                        if(!cp.bossStats) cp.bossStats = {};
                        cp.bossStats[bossId] = (cp.bossStats[bossId] || 0) + mCount;
                        cp.totalPoints = (cp.totalPoints || 0) + (mCount * multiplier);
                    }
                    return cp;
                });
            }
        }
        alert("Done!");
        document.getElementById('mass-input').value = "";
        document.getElementById('detected-list').innerHTML = "";
    }

    function loadEdit(id) {
        currentEditID = id;
        const cp = allCPs[id];
        document.getElementById('edit-section').style.display = 'block';
        document.getElementById('edit-title').innerText = cp.name;
        document.getElementById('edit-members').value = cp.members || "";
        document.getElementById('edit-points').value = cp.totalPoints || 0;
        
        let statsHtml = "";
        bossKeys.forEach(k => {
            const val = (cp.bossStats && cp.bossStats[k]) ? cp.bossStats[k] : 0;
            statsHtml += `<div class="stat-field">${k}<br><input type="number" id="inp-${k}" value="${val}"></div>`;
        });
        document.getElementById('stat-inputs').innerHTML = statsHtml;
    }

    function updateCP() {
        const newStats = {};
        bossKeys.forEach(k => newStats[k] = parseInt(document.getElementById('inp-' + k).value) || 0);
        
        db.ref('cps/' + currentEditID).update({
            members: document.getElementById('edit-members').value,
            totalPoints: parseInt(document.getElementById('edit-points').value),
            bossStats: newStats
        });
        alert("Saved Successfully!");
    }

    function addMarketLoot() {
        const loot = document.getElementById('loot-market').value.split('|');
        db.ref('cps/' + currentEditID).transaction(cp => {
            if(cp) {
                cp.totalPoints -= parseInt(loot[0]);
                if(!cp.lootHistory) cp.lootHistory = [];
                cp.lootHistory.push({ item: loot[1], cost: loot[0], date: new Date().toLocaleDateString('el-GR') });
            }
            return cp;
        });
        alert("Loot Added!");
    }

    function moveToHistory() {
        if(confirm("Move to History page?")) {
            db.ref('cps/' + currentEditID).update({ clan: 'history' });
            document.getElementById('edit-section').style.display = 'none';
            currentEditID = null;
        }
    }

    function deleteCP() {
        if(confirm("DANGER: Delete this CP forever?")) {
            db.ref('cps/' + currentEditID).remove();
            document.getElementById('edit-section').style.display = 'none';
            currentEditID = null;
        }
    }

    function createNewCP() {
        const name = document.getElementById('new-name').value;
        const leader = document.getElementById('new-leader').value;
        const clan = document.getElementById('new-clan').value;
        if(!name) return;
        const id = name.replace(/\s+/g, '-').toLowerCase();
        db.ref('cps/' + id).set({ name, leader, clan, totalPoints: 0, members: "", bossStats: { VAL:0, ANT:0, BAI:0, SIE:0, ZAK:0, FRI:0, AQ:0, ORF:0, COR:0 } });
        alert("CP Created!");
    }
</script>
</body>
</html>
