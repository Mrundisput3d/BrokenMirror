<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Advanced Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { background: #0a0c0f; color: #eee; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #15181c; border: 1px solid var(--gold); padding: 20px; border-radius: 8px; border-top: 3px solid #d4af37; }
        h2 { font-family: 'Cinzel'; color: #d4af37; margin-top: 0; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; }
        .btn { background: #d4af37; color: #000; font-weight: bold; padding: 10px; border: none; cursor: pointer; width: 100%; font-family: 'Cinzel'; }
        .event-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .cp-select-item { background: #222; padding: 10px; margin: 5px; border-radius: 4px; display: inline-block; cursor: pointer; }
        .cp-select-item.selected { background: #d4af37; color: #000; }
    </style>
</head>
<body>

    <div class="grid">
        <div class="card">
            <h2>1. CP SETUP & ROSTERS</h2>
            <input type="text" id="cp-name" placeholder="CP Name (π.χ. Noldor Archer)">
            <input type="text" id="cp-leader" placeholder="CP Leader Name">
            <select id="cp-clan">
                <option value="noldor">Noldor</option>
                <option value="kriminalides">Kriminalides</option>
                <option value="caller">Callers</option>
            </select>
            <textarea id="cp-roster" rows="4" placeholder="Members (Member1, Member2...)"></textarea>
            <input type="number" id="cp-start-points" placeholder="Starting Points (για παλιά CP)">
            <button class="btn" onclick="saveCP()">SAVE / UPDATE CP</button>
        </div>

        <div class="card">
            <h2>2. LOG DAILY EVENT</h2>
            <select id="event-type">
                <option value="1">Mid Epic (QA/Zaken/Orfen/Core/Frin) - x1</option>
                <option value="2">Baium - x2</option>
                <option value="3">Siege / Valakas / Antharas - x3</option>
            </select>
            <div id="cp-check-list" class="event-grid">
                </div>
            <button class="btn" style="background:#28a745; color:white;" onclick="submitEvent()">LOG EVENT & ADD POINTS</button>
        </div>

        <div class="card">
            <h2>3. LOOT & MARKETPLACE</h2>
            <select id="loot-cp-id"></select>
            <input type="text" id="loot-item" placeholder="Item Name (π.χ. Baium Ring)">
            <input type="number" id="loot-cost" placeholder="Points Cost (π.χ. 950)">
            <input type="date" id="loot-date">
            <button class="btn" style="background:#dc3545; color:white;" onclick="addLoot()">REGISTER LOOT</button>
        </div>

        <div class="card">
            <h2>4. ARCHIVE CP (LEAVERS)</h2>
            <select id="archive-cp-id"></select>
            <button class="btn" style="background:#555; color:white;" onclick="archiveCP()">MOVE TO HISTORY.HTML</button>
        </div>
    </div>

<script>
    // Firebase Config (Το ίδιο που είχαμε)
    const firebaseConfig = { 
        apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes", 
        databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. ΣΥΝΑΡΤΗΣΗ SAVE CP
    function saveCP() {
        const name = document.getElementById('cp-name').value;
        const startPoints = parseInt(document.getElementById('cp-start-points').value) || 0;
        const id = name.replace(/\s+/g, '-').toLowerCase();

        db.ref('cps/' + id).update({
            name: name,
            leader: document.getElementById('cp-leader').value,
            clan: document.getElementById('cp-clan').value,
            members: document.getElementById('cp-roster').value,
            startingPoints: startPoints,
            // Αν είναι καινούργιο, βάλε τα starting points ως σύνολο
            totalPoints: startPoints 
        });
        alert("CP Saved!");
    }

    // 2. ΦΟΡΤΩΣΗ CP ΓΙΑ ΤΑ DROPDOWNS
    db.ref('cps/').on('value', snap => {
        const data = snap.val();
        const checkList = document.getElementById('cp-check-list');
        const lootSelect = document.getElementById('loot-cp-id');
        const archiveSelect = document.getElementById('archive-cp-id');
        
        checkList.innerHTML = "";
        lootSelect.innerHTML = "";
        archiveSelect.innerHTML = "";

        Object.keys(data).forEach(id => {
            if(data[id].clan === 'history') return;
            
            // Για το Event Logging
            checkList.innerHTML += `<div class="cp-select-item" onclick="this.classList.toggle('selected')" data-id="${id}">${data[id].name}</div>`;
            
            // Για τα Dropdowns
            const opt = `<option value="${id}">${data[id].name}</option>`;
            lootSelect.innerHTML += opt;
            archiveSelect.innerHTML += opt;
        });
    });

    // 3. LOG EVENT & CALCULATE POINTS
    function submitEvent() {
        const multiplier = parseInt(document.getElementById('event-type').value);
        const selectedCPs = document.querySelectorAll('.cp-select-item.selected');
        
        selectedCPs.forEach(item => {
            const cpId = item.getAttribute('data-id');
            const ref = db.ref('cps/' + cpId + '/totalPoints');
            
            ref.transaction(currentPoints => {
                return (currentPoints || 0) + (1 * multiplier);
            });

            // Log event for Hall of Fame
            db.ref('events/').push({
                cpId: cpId,
                type: multiplier, // 1, 2, or 3
                date: Date.now()
            });
        });
        alert("Event Logged!");
    }

    // 4. ARCHIVE CP (Μεταφορά στο History)
    function archiveCP() {
        const id = document.getElementById('archive-cp-id').value;
        db.ref('cps/' + id).once('value', snap => {
            const data = snap.val();
            data.clan = 'history'; // Αλλάζουμε το clan σε history
            db.ref('history_archive/' + id).set(data); // Το στέλνουμε στο αρχείο
            db.ref('cps/' + id).remove(); // Το σβήνουμε από τα ενεργά
            alert("Moved to History!");
        });
    }

    // 5. REGISTER LOOT
    function addLoot() {
        const cpId = document.getElementById('loot-cp-id').value;
        const cost = parseInt(document.getElementById('loot-cost').value);
        const item = document.getElementById('loot-item').value;
        const date = document.getElementById('loot-date').value;

        // Αφαίρεση πόντων
        db.ref('cps/' + cpId + '/totalPoints').transaction(p => p - cost);
        
        // Καταγραφή στο ιστορικό του CP
        db.ref('cps/' + cpId + '/lootHistory').push({
            item: item,
            cost: cost,
            date: date
        });
        alert("Loot Registered!");
    }
</script>
</body>
</html>
