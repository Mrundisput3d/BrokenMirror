<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Supreme Admin V8</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        /* Κρατάμε το ίδιο CSS και προσθέτουμε λίγο για το loot */
        :root { --gold: #d4af37; --bg: #0a0c0f; --card: #15181c; --red: #ff4444; --green: #28a745; --blue: #3498db; }
        body { background: var(--bg); color: #eee; font-family: 'Open Sans', sans-serif; margin: 0; padding: 20px; font-size: 14px; }
        .layout { display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
        .panel { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 10px; border-top: 3px solid var(--gold); }
        .boss-btn { background: #222; border: 1px solid #444; padding: 8px; text-align: center; cursor: pointer; border-radius: 5px; }
        .boss-btn img { width: 30px; display: block; margin: 0 auto 5px; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-family: 'Cinzel'; font-weight: bold; margin-top: 5px; }
        .loot-select { width: 100%; padding: 10px; background: #000; color: var(--gold); border: 1px solid var(--gold); margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>BMA ADMIN V8 - MARKETPLACE EDITION</h1>

    <div class="layout">
        <div class="panel">
            <h2>CP LIST</h2>
            <div id="cp-list-container" style="max-height: 500px; overflow-y: auto;"></div>
        </div>

        <div class="panel">
            <h2>EVENT & MARKETPLACE LOOT</h2>
            <textarea id="mass-input" rows="4" placeholder="Paste names..." oninput="analyzeAttendance()"></textarea>
            
            <div class="boss-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0;">
                <div class="boss-btn" onclick="logEvent('VAL', 3)"><img src="https://i.ibb.co/84gZPVRP/necklace-valakas.png"><span>VAL x3</span></div>
                <div class="boss-btn" onclick="logEvent('ANT', 3)"><img src="https://i.ibb.co/rfqvc6mv/earring-antharas.png"><span>ANT x3</span></div>
                <div class="boss-btn" onclick="logEvent('BAI', 2)"><img src="https://i.ibb.co/XrZkv67h/ring-of-baium.png"><span>BAI x2</span></div>
                <div class="boss-btn" onclick="logEvent('SIE', 3)"><img src="https://i.ibb.co/Txfby6wD/images.png"><span>SIEGE x3</span></div>
                <div class="boss-btn" onclick="logEvent('ZAK', 1)"><img src="https://i.ibb.co/spkC6Gzz/zaken-earring.png"><span>ZAK x1</span></div>
                <div class="boss-btn" onclick="logEvent('AQ', 1)"><img src="https://i.ibb.co/rKRtZmBG/ring-of-queen-ant.png"><span>AQ x1</span></div>
                <div class="boss-btn" onclick="logEvent('ORF', 1)"><img src="https://i.ibb.co/j9dDnXwH/earring-orfen.png"><span>ORF x1</span></div>
                <div class="boss-btn" onclick="logEvent('COR', 1)"><img src="https://i.ibb.co/ksv37fNZ/ring-of-.png"><span>CORE x1</span></div>
                <div class="boss-btn" onclick="logEvent('FRI', 1)"><img src="https://i.ibb.co/gF4YKGTM/frintezza-necklace.png"><span>FRIN x1</span></div>
            </div>

            <div id="edit-section" style="display:none; border-top:1px solid #333; padding-top:15px;">
                <h2 id="edit-title" style="color:var(--gold)"></h2>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div>
                        <label>Roster</label>
                        <textarea id="edit-members" rows="8"></textarea>
                        <button class="btn btn-gold" onclick="updateCP()">SAVE CHANGES</button>
                    </div>
                    
                    <div>
                        <h3 style="color:var(--red);">MARKETPLACE LOOT</h3>
                        <select id="loot-market" class="loot-select">
                            <option value="">-- SELECT ITEM --</option>
                            <option value="900|Valakas Necklace">Valakas Necklace (900 pts)</option>
                            <option value="800|Antharas Earring">Antharas Earring (800 pts)</option>
                            <option value="600|Baium Ring">Baium Ring (600 pts)</option>
                            <option value="300|Zaken Earring">Zaken Earring (300 pts)</option>
                            <option value="250|Queen Ant Ring">Queen Ant Ring (250 pts)</option>
                            <option value="150|Orfen Earring">Orfen Earring (150 pts)</option>
                            <option value="150|Core Ring">Core Ring (150 pts)</option>
                            <option value="200|Frintezza Neck">Frintezza Neck (200 pts)</option>
                        </select>
                        <button class="btn btn-red" onclick="addMarketLoot()">REGISTER LOOT</button>
                        
                        <div style="margin-top:20px;">
                            <label>Total Points (Manual Adjust)</label>
                            <input type="number" id="edit-points" style="width:100%; padding:8px; background:#000; color:#fff; border:1px solid #444;">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    // ... FIREBASE CONFIG (το ίδιο με πριν) ...

    // Λειτουργία Marketplace Loot
    function addMarketLoot() {
        const lootData = document.getElementById('loot-market').value;
        if(!lootData || !currentEditID) return alert("Select an item first!");
        
        const [cost, itemName] = lootData.split('|');
        const pointsToSubtract = parseInt(cost);

        db.ref('cps/' + currentEditID).transaction(cp => {
            if(cp) {
                cp.totalPoints = (cp.totalPoints || 0) - pointsToSubtract;
                if(!cp.lootHistory) cp.lootHistory = [];
                cp.lootHistory.push({
                    item: itemName,
                    cost: pointsToSubtract,
                    date: new Date().toLocaleDateString('el-GR')
                });
            }
            return cp;
        });
        alert(`Loot Added: ${itemName}. Deducted ${pointsToSubtract} points.`);
    }

    // Η logEvent παραμένει η ίδια, αλλά βεβαιώσου ότι στο Firebase
    // τα κλειδιά είναι VAL, ANT, BAI κτλ. (αυτά χρησιμοποιεί ο κώδικας)
    async function logEvent(bossId, multiplier) {
        const ids = Object.keys(attendanceMap);
        if(ids.length === 0) return alert("No members detected!");
        
        for (const id of ids) {
            const count = attendanceMap[id];
            const pts = count * multiplier;
            await db.ref('cps/' + id).transaction(cp => {
                if(cp) {
                    if(!cp.bossStats) cp.bossStats = {};
                    // ΕΔΩ ΕΙΝΑΙ Η ΣΥΜΜΕΤΟΧΗ ΠΟΥ ΠΡΕΠΕΙ ΝΑ ΔΙΑΒΑΖΕΙ ΤΟ SITE
                    cp.bossStats[bossId] = (cp.bossStats[bossId] || 0) + 1;
                    cp.totalPoints = (cp.totalPoints || 0) + pts;
                }
                return cp;
            });
        }
        alert("Events logged in Firebase!");
        // ... (καθαρισμός input) ...
    }
    
    // ... Οι υπόλοιπες συναρτήσεις analyzeAttendance, renderCPList κτλ παραμένουν ίδιες
</script>
</body>
</html>
