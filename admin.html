<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Admin Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0f1113; --card: #1a1d21; --blue: #00d9ff; --red: #ff4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; }
        nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 15px; border-bottom: 2px solid var(--gold); }
        nav button { background: none; border: 1px solid #333; color: #888; padding: 10px 20px; cursor: pointer; font-family: 'Cinzel'; }
        nav button.active { color: var(--gold); border-color: var(--gold); }
        .container { padding: 20px; max-width: 1000px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--card); border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        h2 { font-family: 'Cinzel'; color: var(--gold); margin-top: 0; }
        .btn { background: var(--gold); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; font-family: 'Cinzel'; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
        .cp-box { display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid #333; border-radius: 5px; cursor: pointer; margin-bottom: 5px; }
        .cp-box.selected { border-color: var(--gold); background: rgba(212,175,55,0.1); }
        input[type="text"], select, textarea { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; margin: 5px 0; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('tab-points')" id="btn-points" class="active">PONTOS</button>
    <button onclick="showTab('tab-roster')" id="btn-roster">ROSTER</button>
    <button onclick="showTab('tab-new')" id="btn-new">NEW CP</button>
</nav>

<div class="container">
    <div id="tab-points" class="tab-content active">
        <div class="card">
            <h2>1. SELECT EVENT</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <select id="event-boss">
                    <option>Valakas</option><option>Antharas</option><option>Baium</option>
                    <option>Frintezza</option><option>Zaken</option><option>Orfen</option>
                    <option>Ant Queen</option><option>Core</option><option>Siege</option>
                </select>
                <select id="event-mult">
                    <option value="1">Points x1</option>
                    <option value="2">Points x2</option>
                    <option value="3">Points x3</option>
                </select>
            </div>
        </div>
        <div class="card">
            <h2>2. SELECT PARTICIPATING CPs</h2>
            <div id="attendance-list"></div>
            <button class="btn" style="margin-top:20px; background: #28a745; color: #fff;" onclick="submitPoints()">SUBMIT POINTS</button>
        </div>
    </div>

    <div id="tab-roster" class="tab-content">
        <div class="card">
            <h2>CURRENT ROSTER</h2>
            <table>
                <thead><tr><th>Name</th><th>Clan</th><th>Points</th><th>Actions</th></tr></thead>
                <tbody id="roster-body"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-new" class="tab-content">
        <div class="card">
            <h2>REGISTER NEW CP / CALLER</h2>
            <input type="text" id="cp-name" placeholder="CP/Caller Name">
            <select id="cp-clan">
                <option value="noldor">NOLDOR</option>
                <option value="kriminalides">KRIMINALIDES</option>
                <option value="caller">CALLER</option>
                <option value="history">HISTORY</option>
            </select>
            <textarea id="cp-members" placeholder="Members (comma separated)"></textarea>
            <button class="btn" onclick="saveCP()">SAVE CP</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes",
        authDomain: "brokenmirrordb.firebaseapp.com",
        databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "brokenmirrordb",
        storageBucket: "brokenmirrordb.firebasestorage.app",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let allCPs = {};
    let selectedForPoints = new Set();

    db.ref('cps/').on('value', s => {
        allCPs = s.val() || {};
        renderAll();
    });

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id.replace('tab-', '')).classList.add('active');
    }

    function renderAll() {
        // Render Roster
        const rBody = document.getElementById('roster-body');
        rBody.innerHTML = "";
        // Render Attendance Selection
        const aList = document.getElementById('attendance-list');
        aList.innerHTML = "";

        Object.keys(allCPs).forEach(id => {
            const cp = allCPs[id];
            // Table
            rBody.innerHTML += `<tr>
                <td><b>${id}</b></td>
                <td>${cp.clan}</td>
                <td>${cp.totalPoints || 0}</td>
                <td><button onclick="deleteCP('${id}')" style="background:red; color:white; border:none; padding:5px;">X</button></td>
            </tr>`;

            // Selection Boxes
            if(cp.clan !== 'history') {
                const div = document.createElement('div');
                div.className = `cp-box ${selectedForPoints.has(id) ? 'selected' : ''}`;
                div.innerHTML = `<span>${id} (${cp.clan})</span>`;
                div.onclick = () => {
                    if(selectedForPoints.has(id)) selectedForPoints.delete(id);
                    else selectedForPoints.add(id);
                    renderAll();
                };
                aList.appendChild(div);
            }
        });
    }

    function submitPoints() {
        const boss = document.getElementById('event-boss').value;
        const mult = parseInt(document.getElementById('event-mult').value);
        if(selectedForPoints.size === 0) return alert("Select at least one CP!");
        
        const updates = {};
        const winners = [];
        selectedForPoints.forEach(id => {
            const cp = allCPs[id];
            const memberCount = cp.clan === 'caller' ? 1 : cp.members.split(',').length;
            const ptsToAdd = memberCount * mult;
            updates[`cps/${id}/totalPoints`] = (cp.totalPoints || 0) + ptsToAdd;
            winners.push(`${id} (+${ptsToAdd})`);
        });

        db.ref().update(updates);
        db.ref('logs/').push({ boss, winners, date: new Date().toLocaleString() });
        selectedForPoints.clear();
        alert("Points Submitted!");
    }

    function saveCP() {
        const name = document.getElementById('cp-name').value;
        const clan = document.getElementById('cp-clan').value;
        const members = document.getElementById('cp-members').value;
        if(!name) return;
        db.ref('cps/' + name).set({ name, clan, members, totalPoints: 0 });
    }

    function deleteCP(id) { if(confirm("Delete?")) db.ref('cps/' + id).remove(); }
</script>
</body>
</html>
