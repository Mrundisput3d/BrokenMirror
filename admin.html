<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMA | Professional Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0c0f; --card: #15181c; --blue: #00d9ff; --red: #ff3333; }
        body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 20px; }
        h1, h2 { font-family: 'Cinzel'; color: var(--gold); text-align: center; margin-bottom: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .admin-card { background: var(--card); border: 1px solid #333; padding: 25px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input, select, textarea { background: #000; border: 1px solid #444; color: #fff; padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; border-radius: 6px; font-size: 0.9rem; }
        
        .btn { background: var(--gold); color: #000; border: none; padding: 14px 20px; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.3s; font-family: 'Cinzel'; width: 100%; font-size: 1rem; margin-top: 10px; }
        .btn:hover { background: #fff; transform: translateY(-2px); }
        .btn-delete { background: var(--red); color: white; width: auto; padding: 5px 10px; font-size: 0.7rem; cursor: pointer; border: none; border-radius: 4px; }

        #drop-zone { border: 2px dashed var(--gold); padding: 40px; text-align: center; background: rgba(212, 175, 55, 0.05); border-radius: 10px; cursor: pointer; transition: 0.3s; margin: 15px 0; }
        #drop-zone:hover { background: rgba(212, 175, 55, 0.1); border-color: #fff; }
        .detected-tag { display: inline-block; background: rgba(0, 217, 255, 0.2); border: 1px solid var(--blue); color: var(--blue); padding: 4px 10px; border-radius: 4px; margin: 4px; font-size: 0.8rem; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(0,0,0,0.2); }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; font-size: 0.85rem; }
        th { background: #000; color: var(--gold); font-family: 'Cinzel'; }
        .clan-tag { padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        .noldor { border: 1px solid var(--blue); color: var(--blue); }
        .kriminalides { border: 1px solid var(--red); color: var(--red); }
        
        #ocr-status { text-align: center; color: var(--gold); margin: 10px 0; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h1>BMA DATABASE CONTROL</h1>

    <div class="admin-card" style="border-top: 4px solid var(--blue);">
        <h2>1. DAILY ATTENDANCE (SCAN SCREENSHOT)</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>Event Multiplier</label>
                <select id="event-type">
                    <option value="1">MID EPICS (QA, Zaken, Fri) - x1</option>
                    <option value="2">BAIUM - x2</option>
                    <option value="3">HIGH EPICS (Valakas, Antharas, Siege) - x3</option>
                </select>
            </div>
            <div>
                <label>Event Name</label>
                <input type="text" id="event-name" placeholder="π.χ. Antharas Run">
            </div>
        </div>
        
        <input type="file" id="file-input" accept="image/*" style="display:none">
        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            <p style="margin:0; font-size:1.1rem;">Κάντε κλικ για <b>Επιλογή Φωτογραφίας</b></p>
            <p style="margin:5px 0 0; font-size:0.8rem; color:#888;">ή πατήστε <b>CTRL + V</b> (Paste)</p>
        </div>
        
        <div id="ocr-status">Αναμονή για ενέργεια...</div>
        <div id="detected-players" style="margin-bottom: 15px; text-align: center;"></div>
        
        <button id="submit-attendance" class="btn" style="background: #28a745; color: #fff; display: none;" onclick="window.submitAttendance()">ΕΠΙΒΕΒΑΙΩΣΗ & ΠΡΟΣΘΗΚΗ ΠΟΝΤΩΝ</button>
    </div>

    <div class="admin-card" style="border-top: 4px solid var(--gold);">
        <h2>2. BULK CP IMPORT (EXCEL)</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <select id="bulk-clan">
                <option value="noldor">NOLDOR CLAN</option>
                <option value="kriminalides">KRIMINALIDES CLAN</option>
            </select>
            <input type="number" id="bulk-points" placeholder="Starting Points">
        </div>
        <textarea id="bulk-input" rows="5" placeholder="Copy-Paste στήλη Excel (1η γραμμή: CP Name, 2η: Leader, επόμενες: Members)"></textarea>
        <button class="btn" onclick="window.processBulk()">ΔΗΜΙΟΥΡΓΙΑ CP</button>
    </div>

    <div class="admin-card">
        <h2>3. CURRENT DATABASE</h2>
        <table>
            <thead>
                <tr>
                    <th>CP NAME</th>
                    <th>CLAN</th>
                    <th>LEADER</th>
                    <th>POINTS</th>
                    <th>MEMBERS</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody id="cp-list-body">
                <tr><td colspan="6" style="text-align:center;">Φόρτωση δεδομένων...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import Tesseract from 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';

    // FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes",
        authDomain: "brokenmirrordb.firebaseapp.com",
        databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "brokenmirrordb",
        storageBucket: "brokenmirrordb.firebasestorage.app",
        messagingSenderId: "609120206504",
        appId: "1:609120206504:web:3a35fbba3cecbbb0030c9d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let allCPs = {};
    let detectedList = [];

    // --- 1. SYNC DATA ---
    onValue(ref(db, 'cps/'), (snapshot) => {
        allCPs = snapshot.val() || {};
        const tbody = document.getElementById('cp-list-body');
        tbody.innerHTML = '';
        
        Object.values(allCPs).forEach(cp => {
            tbody.innerHTML += `
                <tr>
                    <td><b>${cp.name}</b></td>
                    <td><span class="clan-tag ${cp.clan}">${cp.clan}</span></td>
                    <td>👑 ${cp.leader}</td>
                    <td style="color:var(--gold); font-weight:bold;">${cp.totalPoints}</td>
                    <td style="font-size:0.7rem; color:#aaa; max-width:200px;">${cp.members}</td>
                    <td><button class="btn-delete" onclick="window.deleteCP('${cp.name}')">DEL</button></td>
                </tr>
            `;
        });
    });

    // --- 2. EXPORT FUNCTIONS TO WINDOW ---
    window.processBulk = function() {
        const rawData = document.getElementById('bulk-input').value.trim();
        const clan = document.getElementById('bulk-clan').value;
        const pts = parseInt(document.getElementById('bulk-points').value) || 0;

        if (!rawData) return alert("Κάνε paste δεδομένα πρώτα!");
        const lines = rawData.split('\n').map(l => l.trim()).filter(l => l !== "");
        
        if (lines.length < 2) return alert("Χρειάζονται τουλάχιστον 2 γραμμές (Όνομα CP & Leader)");

        const cpName = lines[0];
        const leader = lines[1];
        const membersList = lines.slice(1).join(', ');

        set(ref(db, 'cps/' + cpName), {
            name: cpName, clan: clan, leader: leader, totalPoints: pts, members: membersList, updatedAt: Date.now()
        }).then(() => {
            alert("CP " + cpName + " προστέθηκε!");
            document.getElementById('bulk-input').value = "";
        });
    };

    window.deleteCP = (name) => {
        if(confirm(`Διαγραφή του ${name};`)) remove(ref(db, 'cps/' + name));
    };

    // --- 3. OCR LOGIC ---
    const statusBox = document.getElementById('ocr-status');

    document.getElementById('file-input').addEventListener('change', e => {
        if (e.target.files[0]) startOCR(e.target.files[0]);
    });

    document.addEventListener('paste', e => {
        const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
        if (item) startOCR(item.getAsFile());
    });

    async function startOCR(blob) {
        statusBox.innerHTML = "🔍 <span style='color:white'>Φόρτωση OCR Engine...</span>";
        document.getElementById('detected-players').innerHTML = "";
        
        try {
            const worker = await Tesseract.createWorker('eng');
            statusBox.innerHTML = "🔍 <span style='color:var(--gold)'>Ανάγνωση εικόνας...</span>";
            const { data: { text } } = await worker.recognize(blob);
            await worker.terminate();

            // Καθαρισμός κειμένου (μόνο γράμματα και νούμερα)
            const words = text.split(/[\s,]+/).map(w => w.replace(/[^a-zA-Z0-9]/g, '').toLowerCase()).filter(w => w.length > 2);
            
            detectedList = [];
            const container = document.getElementById('detected-players');

            words.forEach(word => {
                Object.values(allCPs).forEach(cp => {
                    const roster = cp.members.toLowerCase().split(',').map(m => m.trim());
                    if (roster.includes(word)) {
                        if (!detectedList.find(p => p.name === word)) {
                            detectedList.push({ name: word, cp: cp.name });
                            container.innerHTML += `<span class="detected-tag">${word} (${cp.name})</span>`;
                        }
                    }
                });
            });

            statusBox.innerHTML = detectedList.length > 0 ? `✅ Βρέθηκαν ${detectedList.length} παίκτες!` : "❌ Δεν βρέθηκε κανένας γνωστός παίκτης.";
            document.getElementById('submit-attendance').style.display = detectedList.length > 0 ? 'block' : 'none';

        } catch (err) {
            statusBox.innerHTML = "❌ Σφάλμα OCR: " + err.message;
        }
    }

    window.submitAttendance = function() {
        const multiplier = parseInt(document.getElementById('event-type').value);
        const eventTitle = document.getElementById('event-name').value || "Epic Boss";
        const updates = {};
        const summary = {};

        detectedList.forEach(p => summary[p.cp] = (summary[p.cp] || 0) + multiplier);

        for (const cp in summary) {
            updates[`cps/${cp}/totalPoints`] = (allCPs[cp].totalPoints || 0) + summary[cp];
            const logKey = push(ref(db, 'logs')).key;
            updates[`logs/${logKey}`] = { cp, points: summary[cp], event: eventTitle, date: Date.now() };
        }

        update(ref(db), updates).then(() => {
            alert("Οι πόντοι προστέθηκαν!");
            document.getElementById('detected-players').innerHTML = "";
            document.getElementById('submit-attendance').style.display = 'none';
            statusBox.innerText = "Αναμονή για νέα φωτό...";
        });
    };
</script>
</body>
</html>
