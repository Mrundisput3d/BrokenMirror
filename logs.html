<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BMA | Intelligence & Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0a0c0f; --card: #15181c; --blue: #3498db; }
        body { background: var(--bg); color: #eee; font-family: 'Open Sans', sans-serif; padding: 20px; }
        h1, h2 { font-family: 'Cinzel'; color: var(--gold); text-align: center; }
        .grid-container { display: grid; grid-template-columns: 1fr 350px; gap: 20px; max-width: 1300px; margin: 0 auto; }
        .panel { background: var(--card); border-radius: 10px; padding: 20px; border: 1px solid #333; }
        
        /* Ranking Styles */
        .rank-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; background: #111; margin-bottom: 5px; border-radius: 4px; }
        .rank-number { color: var(--gold); font-weight: bold; margin-right: 10px; }
        
        /* Log Styles */
        .log-entry { display: grid; grid-template-columns: 100px 150px 100px 1fr; gap: 10px; padding: 8px; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .player { color: var(--gold); font-weight: bold; }
        .boss { color: var(--blue); text-transform: uppercase; font-size: 0.75rem; }
        input { padding: 8px; background: #000; color: #fff; border: 1px solid #444; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .btn-reset { background: #600; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; width: 100%; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>BMA INTELLIGENCE CENTER</h1>

    <div class="grid-container">
        <div class="panel">
            <h2>ACTIVITY LOGS</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="date-filter" placeholder="Ημερομηνία (DD-MM-YYYY)">
                <input type="text" id="player-filter" placeholder="Αναζήτηση παίκτη..." oninput="renderLogs()">
            </div>
            <div id="logs-list" style="max-height: 600px; overflow-y: auto;"></div>
            
            <button class="btn-reset" onclick="clearAllLogs()">⚠️ DELETE ALL LOGS (RESET FOR NEW SEASON)</button>
        </div>

        <div class="panel">
            <h2>WEEKLY RANKING</h2>
            <p style="text-align:center; color: #888; font-size: 0.8rem;">Με βάση τις παρουσίες των τελευταίων 7 ημερών</p>
            <div id="ranking-list">
                </div>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes", databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const todayStr = new Date().toLocaleDateString('el-GR').replace(/\//g, '-');
    document.getElementById('date-filter').value = todayStr;

    let allLogs = {};

    db.ref('dailyLogs/').on('value', snap => {
        allLogs = snap.val() || {};
        renderLogs();
        calculateWeeklyRanking();
    });

    function renderLogs() {
        const selectedDate = document.getElementById('date-filter').value;
        const playerSearch = document.getElementById('player-filter').value.toLowerCase();
        const container = document.getElementById('logs-list');
        container.innerHTML = "";

        const dayData = allLogs[selectedDate];
        if (!dayData) {
            container.innerHTML = "<div style='color:#666; padding:20px;'>No logs for this date.</div>";
            return;
        }

        Object.keys(dayData).forEach(pName => {
            if (playerSearch && !pName.includes(playerSearch)) return;
            Object.keys(dayData[pName]).forEach(bossId => {
                const ev = dayData[pName][bossId];
                container.innerHTML += `
                    <div class="log-entry">
                        <div style="color:#666">${ev.time}</div>
                        <div class="player">${pName}</div>
                        <div class="boss">${bossId}</div>
                        <div style="color:#28a745">${ev.cp || 'N/A'}</div>
                    </div>`;
            });
        });
    }

    function calculateWeeklyRanking() {
        let cpStats = {};
        const now = new Date();
        
        // Έλεγχος των τελευταίων 7 ημερών
        for (let i = 0; i < 7; i++) {
            let d = new Date();
            d.setDate(now.getDate() - i);
            let dateKey = d.toLocaleDateString('el-GR').replace(/\//g, '-');
            
            if (allLogs[dateKey]) {
                Object.values(allLogs[dateKey]).forEach(playerEntry => {
                    Object.values(playerEntry).forEach(event => {
                        if (event.cp) {
                            cpStats[event.cp] = (cpStats[event.cp] || 0) + 1;
                        }
                    });
                });
            }
        }

        // Μετατροπή σε πίνακα και ταξινόμηση
        let sorted = Object.keys(cpStats).map(name => ({name, score: cpStats[name]}))
                     .sort((a, b) => b.score - a.score);

        const rankDiv = document.getElementById('ranking-list');
        rankDiv.innerHTML = sorted.map((cp, index) => `
            <div class="rank-row">
                <span><span class="rank-number">#${index+1}</span> ${cp.name}</span>
                <span style="color:var(--gold)">${cp.score} <small>pts</small></span>
            </div>
        `).join('') || "<p style='text-align:center; color:#555;'>No activity this week.</p>";
    }

    function clearAllLogs() {
        if (confirm("ΠΡΟΣΟΧΗ: Θα διαγραφούν ΟΛΑ τα logs (όχι οι πόντοι των CP). Αυτό θα επιτρέψει στους παίκτες να ξαναμπούν στα ίδια Bosses σήμερα. Είσαι σίγουρος;")) {
            db.ref('dailyLogs/').remove();
            alert("Τα Logs μηδενίστηκαν!");
        }
    }
</script>
</body>
</html>
