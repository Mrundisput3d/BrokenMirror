<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --noldor-sky: #00d9ff;
            --krim-red: #ff3333;
            --bg-overlay: rgba(10, 12, 15, 0.98);
            --panel-bg: rgba(15, 18, 22, 1);
            --top1: #ffd700; --top2: #c0c0c0; --top3: #cd7f32;
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background: #0a0c0f url('https://images.alphacoders.com/133/1335334.png') no-repeat center center fixed; 
            background-size: cover; color: #eee; margin: 0; padding: 20px;
        }

        .top-header { text-align: center; margin-bottom: 30px; }
        .ally-logo { width: 120px; height: 120px; border: 3px solid var(--gold); box-shadow: 0 0 20px var(--gold); margin-bottom: 10px; }
        .ally-title { font-family: 'Cinzel'; font-size: 2.2rem; color: var(--gold); display: block; letter-spacing: 5px; text-shadow: 0 0 10px #000; }
        
        .leaders-row { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        .leader-card { text-align: center; width: 150px; }
        .leader-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; }
        .leader-name { font-family: 'Cinzel'; font-size: 1.4rem; color: #fff; display: block; margin-top: 5px; }

        .main-wrapper { display: flex; gap: 20px; max-width: 1600px; margin: 0 auto; align-items: flex-start; }

        /* COLUMNS */
        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex-grow: 1; }
        .clan-column { background: var(--panel-bg); height: 650px; display: flex; flex-direction: column; border: 1px solid #444; border-radius: 5px; }
        .column-header { padding: 15px; text-align: center; font-family: 'Cinzel'; font-size: 1.1rem; border-bottom: 1px solid #333; }
        
        .noldor-col { border-color: var(--noldor-sky); }
        .krim-col { border-color: var(--krim-red); }

        .scroll-area { overflow-y: scroll; padding: 10px; flex-grow: 1; scrollbar-width: auto; }
        .scroll-area::-webkit-scrollbar { width: 8px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        /* CP & RANKING STYLE */
        .cp-box { margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.6); position: relative; }
        .cp-btn { width: 100%; background: none; border: none; padding: 12px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        
        /* TOP 3 HIGHLIGHTS */
        .rank-1 { border: 1px solid var(--top1); box-shadow: inset 0 0 10px rgba(255,215,0,0.2); }
        .rank-2 { border: 1px solid var(--top2); }
        .rank-3 { border: 1px solid var(--top3); }
        .badge { font-weight: bold; padding: 2px 8px; border-radius: 3px; font-size: 0.7rem; margin-right: 10px; }

        .points-tag { background: rgba(255,255,255,0.1); padding: 2px 10px; border-radius: 10px; color: var(--gold); font-weight: bold; }

        .member-list { display: none; background: rgba(10,10,10,0.9); padding: 5px; border-top: 1px solid #333; }
        .member-item { border-bottom: 1px solid #222; }
        .member-btn { width: 100%; background: none; border: none; padding: 8px 15px; color: #eee; text-align: left; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.8rem; }
        
        .stats-area { display: none; background: #000; padding: 10px; border-top: 1px solid var(--gold); }
        .cp-box.active > .member-list, .member-item.active > .stats-area { display: block; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .stat-box { background: #111; padding: 5px; text-align: center; border: 1px solid #222; font-size: 0.6rem; color: #aaa; }
        .stat-name { display: block; color: var(--gold); font-weight: bold; font-size: 0.65rem; }

        /* MINI DIST LOG */
        .mini-dist { width: 260px; background: var(--panel-bg); border: 1px solid var(--gold); height: 650px; display: flex; flex-direction: column; }
        .dist-header { background: #221a00; color: var(--gold); padding: 12px; text-align: center; font-family: 'Cinzel'; border-bottom: 1px solid var(--gold); }

        @media (max-width: 1100px) { .main-wrapper { flex-direction: column; } .mini-dist { width: 100%; height: 300px; } }
    </style>
</head>
<body>

    <div class="top-header">
        <img src="https://via.placeholder.com/120/000/d4af37?text=ALLIANCE" class="ally-logo">
        <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
        
        <div class="leaders-row">
            <div class="leader-card">
                <img src="https://via.placeholder.com/110/222/fff?text=NIKLAUS" class="leader-img">
                <span class="leader-name">NIKLAUS</span>
                <small style="color:var(--gold)">ALLY LEADER</small>
            </div>
            <div class="leader-card">
                <img src="https://via.placeholder.com/110/111/fff?text=TSAK" class="leader-img">
                <span class="leader-name">TSAKNORRIS</span>
                <small style="color:var(--gold)">SHOTCALLER</small>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="dashboard-container">
            <div class="clan-column noldor-col">
                <div class="column-header" style="color:var(--noldor-sky)">NOLDOR CLAN ROSTER</div>
                <div class="scroll-area" id="noldor-list"></div>
            </div>
            <div class="clan-column krim-col">
                <div class="column-header" style="color:var(--krim-red)">KRIMINALIDES MAIN ROSTER</div>
                <div class="scroll-area" id="krim-list"></div>
            </div>
        </div>

        <div class="mini-dist">
            <div class="dist-header">LOOT ARCHIVE</div>
            <div class="scroll-area" id="epic-dist-list"></div>
        </div>
    </div>

    <script>
        const bosses = ["VAL", "ANT", "BAI", "FRI", "ZAK", "ORF", "AQ", "CORE", "SIEGE"];
        
        // Data με πόντους για το ranking
        const noldorData = [
            { name: "Noldor Archer", pts: 1500, lead: "Artemis", mems: ["Legolas", "Sylvanas", "Robin"] },
            { name: "Noldor Archer 2", pts: 1200, lead: "Apollo", mems: ["ArcherX", "ArcherY"] },
            { name: "Noldor Dummy", pts: 450, lead: "Dummy", mems: ["D1", "D2"] },
            { name: "Noldor Tank", pts: 1100, lead: "Aegis", mems: ["Shield", "Wall"] },
            { name: "Κriminalides CP", pts: 1800, lead: "Boss", mems: ["Member1", "Member2"] },
            { name: "Outlaw CP", pts: 950, lead: "Renegade", mems: ["O1", "O2"] },
            { name: "Ronin CP", pts: 800, lead: "Samurai", mems: ["Katana", "Bushido"] },
            { name: "Brazilians CP", pts: 1350, lead: "Ronaldo", mems: ["Neymar", "Pele"] },
            { name: "Brazilians 2 CP", pts: 700, lead: "Kaka", mems: ["Cafu", "Zico"] },
            { name: "I am Groot CP", pts: 300, lead: "Groot", mems: ["Rocket", "StarLord"] }
        ];

        const krimData = [
            { name: "Hattrick CP", pts: 2100, lead: "Captain", mems: ["Striker", "Goalie"] },
            { name: "55 Room CP", pts: 1950, lead: "Master55", mems: ["P1", "P2"] },
            { name: "Legion CP", pts: 1100, lead: "Cent", mems: ["S1", "S2"] },
            { name: "Criminal Record CP", pts: 1600, lead: "Judge", mems: ["J1", "J2"] },
            { name: "Avalanche CP", pts: 1400, lead: "Snow", mems: ["Ice", "Frost"] },
            { name: "Gankly Crew CP", pts: 900, lead: "Ganker", mems: ["G1", "G2"] },
            { name: "Furious Wolves CP", pts: 850, lead: "Alpha", mems: ["W1", "W2"] },
            { name: "Animals CP", pts: 750, lead: "Lion", mems: ["Tiger", "Bear"] },
            { name: "Dracaris CP", pts: 1250, lead: "Dany", mems: ["Drag1", "Drag2"] },
            { name: "Sinaloa CP", pts: 1550, lead: "ElChapo", mems: ["C1", "C2"] },
            { name: "Knockout CP", pts: 1050, lead: "Tyson", mems: ["Box1", "Box2"] },
            { name: "VaBank CP", pts: 1300, lead: "Dealer", mems: ["V1", "V2"] }
        ];

        function createCPItem(cp, color, rank) {
            let rankClass = "";
            let badge = "";
            if (rank === 0) { rankClass = "rank-1"; badge = "<span class='badge' style='background:var(--top1); color:#000'>TOP 1</span>"; }
            if (rank === 1) { rankClass = "rank-2"; badge = "<span class='badge' style='background:var(--top2); color:#000'>TOP 2</span>"; }
            if (rank === 2) { rankClass = "rank-3"; badge = "<span class='badge' style='background:var(--top3); color:#000'>TOP 3</span>"; }

            const memberHTML = [cp.lead, ...cp.mems].map((m, i) => `
                <div class="member-item">
                    <button class="member-btn" onclick="this.parentElement.classList.toggle('active')">
                        <span>${i === 0 ? '👑 ' : ''}${m}</span><small>STATS ▼</small>
                    </button>
                    <div class="stats-area">
                        <div class="stat-grid">${bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('')}</div>
                    </div>
                </div>
            `).join('');

            return `
                <div class="cp-box ${rankClass}">
                    <button class="cp-btn" onclick="this.parentElement.classList.toggle('active')">
                        <span>${badge}<span style="color:var(${color})">${cp.name}</span></span>
                        <span class="points-tag">${cp.pts} PTS</span>
                    </button>
                    <div class="member-list">${memberHTML}</div>
                </div>`;
        }

        // Sort data by points
        const sortedNoldor = [...noldorData].sort((a,b) => b.pts - a.pts);
        const sortedKrim = [...krimData].sort((a,b) => b.pts - a.pts);

        document.getElementById('noldor-list').innerHTML = sortedNoldor.map((cp, i) => createCPItem(cp, '--noldor-sky', i)).join('');
        document.getElementById('krim-list').innerHTML = sortedKrim.map((cp, i) => createCPItem(cp, '--krim-red', i)).join('');
        
        // Fill Loot Log
        const allNames = ["NIKLAUS", "TSAKNORRIS", ...sortedNoldor.map(c=>c.name), ...sortedKrim.map(c=>c.name)];
        document.getElementById('epic-dist-list').innerHTML = allNames.map(n => `<div style="padding:10px; border-bottom:1px solid #222; font-size:0.75rem;"><b style="color:var(--gold)">${n}</b><br><span style="color:#555">No items yet</span></div>`).join('');
    </script>
</body>
</html>
