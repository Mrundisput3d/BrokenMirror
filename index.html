<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMA | Alliance Roster</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37; --noldor-sky: #00d9ff; --krim-red: #ff3333;
            --bg-overlay: rgba(10, 12, 15, 0.96); 
        }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Open Sans', sans-serif; 
            background: #0a0c0f url('https://i.ibb.co/1GmpSyxZ/BACKGROUND.jpg') no-repeat center center fixed; 
            background-size: cover; color: #eee; margin: 0; padding: 0;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-overlay); z-index: -1; }

        /* FLOATING NAV */
        .floating-nav { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 20px; background: rgba(0,0,0,0.95); 
            padding: 12px 30px; border-radius: 40px; border: 1px solid var(--gold); z-index: 10000;
            box-shadow: 0 0 20px rgba(0,0,0,1);
        }
        .nav-btn { color: var(--gold); text-decoration: none; font-family: 'Cinzel'; font-size: 0.85rem; transition: 0.3s; font-weight: bold; }
        .nav-btn:hover { text-shadow: 0 0 10px var(--gold); color: #fff; }
        .pvp-link { color: #ff3333; border-left: 1px solid #444; padding-left: 20px; }

        /* HEADER */
        .page-section { min-height: 100vh; padding: 40px 20px; box-sizing: border-box; }
        .top-header { text-align: center; margin-bottom: 40px; }
        .ally-logo { width: 130px; filter: drop-shadow(0 0 15px var(--gold)); }
        .ally-title { font-family: 'Cinzel Decorative'; font-size: 2.2rem; color: var(--gold); display: block; margin-top: 10px; letter-spacing: 2px; }

        /* ROSTER GRID */
        .main-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1500px; margin: 0 auto; }
        .clan-column { background: rgba(15, 18, 22, 0.95); height: 650px; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 12px; border-top: 4px solid var(--gold); }
        .column-header { padding: 18px; text-align: center; font-family: 'Cinzel'; font-size: 1.2rem; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .clan-mini-logo { width: 35px; height: 35px; object-fit: contain; }

        .scroll-area { overflow-y: auto; padding: 15px; flex-grow: 1; }
        .scroll-area::-webkit-scrollbar { width: 5px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* CP & MEMBERS (SAFE POINT STYLE) */
        .cp-box { margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.3); border-radius: 8px; overflow: hidden; transition: 0.3s; }
        .top-cp { border: 1px solid var(--gold); background: rgba(212, 175, 55, 0.08); }
        .cp-btn { width: 100%; background: none; border: none; padding: 15px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-family: 'Open Sans'; font-weight: 600; font-size: 0.95rem; }
        .points-tag { border: 1px solid var(--gold); padding: 3px 12px; border-radius: 5px; font-size: 0.8rem; color: var(--gold); font-family: 'Cinzel'; }

        .member-list { display: none; background: rgba(0,0,0,0.5); border-top: 1px solid #222; }
        .active > .member-list { display: block; }

        .member-item { border-bottom: 1px solid rgba(255,255,255,0.03); }
        .member-btn { width: 100%; background: none; border: none; padding: 12px 25px; color: #bbb; text-align: left; cursor: pointer; font-size: 0.85rem; display: flex; justify-content: space-between; }
        
        .server-time { position: absolute; top: 20px; right: 40px; color: var(--gold); font-family: 'Cinzel'; border: 1px solid var(--gold); padding: 6px 18px; border-radius: 5px; background: rgba(0,0,0,0.6); font-size: 0.85rem; }
    </style>
</head>
<body>

    <nav class="floating-nav">
        <a href="index.html" class="nav-btn">ROSTER</a>
        <a href="marketplace.html" class="nav-btn">MARKETPLACE</a>
        <a href="videos.html" class="nav-btn pvp-link">PVP ZONE</a>
    </nav>

    <div class="page-section" id="section1">
        <div class="server-time" id="clock">SERVER TIME: 00:00:00</div>
        
        <div class="top-header">
            <img src="https://i.ibb.co/6R9q5PGv/ALLIANCE-LOGO.png" class="ally-logo">
            <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
        </div>

        <div class="main-wrapper">
            <div class="clan-column" style="border-top-color: var(--noldor-sky);">
                <div class="column-header" style="color:var(--noldor-sky)">
                    <img src="https://i.ibb.co/8LvFNQkC/noldor.png" class="clan-mini-logo"> NOLDOR CLAN
                </div>
                <div class="scroll-area" id="noldor-list"></div>
            </div>

            <div class="clan-column" style="border-top-color: var(--krim-red);">
                <div class="column-header" style="color:var(--krim-red)">
                    <img src="https://i.ibb.co/VYMZjzYr/kriminalides.png" class="clan-mini-logo"> KRIMINALIDES CLAN
                </div>
                <div class="scroll-area" id="krim-list"></div>
            </div>
        </div>
    </div>

    <script>
        // Data for Sorting
        const noldorCPs = [
            { name: "Noldor Clan", pts: 5200, leader: "Niklaus" },
            { name: "Outlaw CP", pts: 3100, leader: "Outlawed" },
            { name: "Ronin CP", pts: 2900, leader: "Ronin" },
            { name: "Brazilians CP", pts: 4200, leader: "Brazil" }
        ];

        const krimCPs = [
            { name: "Hattrick CP", pts: 5500, leader: "Hattrick" },
            { name: "Legion CP", pts: 4900, leader: "Legionary" },
            { name: "Animals CP", pts: 3800, leader: "Animal" },
            { name: "Sinaloa CP", pts: 2200, leader: "Sicario" }
        ];

        function renderRoster() {
            const sortFn = (a, b) => b.pts - a.pts;
            const createList = (data, elId) => {
                document.getElementById(elId).innerHTML = data.sort(sortFn).map((cp, idx) => `
                    <div class="cp-box ${idx === 0 ? 'top-cp' : ''}">
                        <button class="cp-btn" onclick="this.parentElement.classList.toggle('active')">
                            <span>${idx === 0 ? '⭐ ' : ''}${cp.name}</span>
                            <span class="points-tag">${cp.pts} PTS</span>
                        </button>
                        <div class="member-list">
                            <div class="member-item">
                                <button class="member-btn"><span>👑 CP LEADER: ${cp.leader}</span></button>
                            </div>
                        </div>
                    </div>
                `).join('');
            };
            createList(noldorCPs, 'noldor-list');
            createList(krimCPs, 'krim-list');
        }

        setInterval(() => { 
            document.getElementById('clock').innerText = "SERVER TIME: " + new Date().toLocaleTimeString('el-GR'); 
        }, 1000);

        renderRoster();
    </script>
</body>
</html>
