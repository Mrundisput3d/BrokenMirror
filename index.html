<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror | Clan Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #8a6d3b;
            --bg-overlay: rgba(10, 12, 15, 0.94);
            --panel-bg: rgba(20, 24, 28, 0.98);
            --border-style: 2px solid var(--dark-gold);
            --epic-pink: #ff79c6;
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background: url('https://images.alphacoders.com/133/1335334.png') no-repeat center center fixed; 
            background-size: cover;
            color: #eee; margin: 0; padding: 20px;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 10%, var(--bg-overlay) 90%);
            z-index: -1;
        }

        h1, h2, h3, .column-header, .cp-trigger span, .stat-title, .jewel-row-name { font-family: 'Cinzel', serif; }

        header { text-align: center; margin-bottom: 30px; }
        .main-title { font-size: 3rem; color: var(--gold); text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); margin: 0; letter-spacing: 5px; }

        /* LEADERSHIP */
        .leadership-section { max-width: 1000px; margin: 0 auto 30px auto; text-align: center; }
        .leader-box { background: rgba(0,0,0,0.7); border: var(--border-style); padding: 15px; margin-bottom: 15px; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .caller-box { max-width: 400px; margin: 0 auto; background: rgba(20, 24, 28, 0.9); border: 1px solid var(--dark-gold); }
        .caller-trigger { width: 100%; background: none; border: none; color: #fff; padding: 10px; cursor: pointer; }

        /* MAIN DASHBOARD */
        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; width: 100%; max-width: 1300px; margin: 0 auto; }
        .clan-column { background: var(--panel-bg); border: var(--border-style); height: 500px; display: flex; flex-direction: column; }
        .column-header { background: linear-gradient(to bottom, #2c3136, #111); padding: 12px; color: var(--gold); text-align: center; border-bottom: var(--border-style); }
        .scroll-area { overflow-y: auto; padding: 10px; flex-grow: 1; }
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--dark-gold); }

        /* NESTED MENUS */
        .cp-item { margin-bottom: 8px; border: 1px solid rgba(138, 109, 59, 0.2); background: rgba(0,0,0,0.4); }
        .cp-trigger { width: 100%; background: none; border: none; color: var(--gold); padding: 12px; text-align: left; cursor: pointer; display: flex; justify-content: space-between; }
        .cp-details { display: none; background: rgba(0,0,0,0.5); border-top: 1px solid var(--dark-gold); }
        .active > .cp-details, .active > .member-stats, .active > .jewel-list { display: block; animation: fadeIn 0.3s; }

        .member-item { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .member-trigger { width: 100%; background: none; border: none; color: #fff; padding: 8px 15px; text-align: left; cursor: pointer; font-size: 0.9rem; display: flex; justify-content: space-between; }
        .member-stats { display: none; background: #0a0c0e; padding: 10px; margin: 5px 15px; border-left: 2px solid var(--gold); }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .stat-box { background: #161a1f; padding: 5px; text-align: center; border: 1px solid #333; font-size: 0.7rem; }
        .stat-name { display: block; color: var(--gold); }

        /* EPIC DISTRIBUTION SECTION (SCROLLABLE) */
        .epic-section { width: 100%; max-width: 1300px; margin: 40px auto; background: var(--panel-bg); border: var(--border-style); display: flex; flex-direction: column; height: 500px; }
        .epic-scroll-area { overflow-y: auto; padding: 15px; }
        
        .epic-group-item { margin-bottom: 10px; border: 1px solid rgba(255, 121, 198, 0.2); background: rgba(20, 0, 20, 0.3); }
        .epic-group-trigger { width: 100%; background: none; border: none; color: var(--epic-pink); padding: 15px; text-align: left; cursor: pointer; font-family: 'Cinzel'; font-size: 1.1rem; display: flex; justify-content: space-between; }
        .epic-group-trigger:hover { background: rgba(255, 121, 198, 0.1); }
        
        .jewel-list { display: none; background: rgba(0,0,0,0.6); padding: 10px; border-top: 1px solid var(--epic-pink); }
        .jewel-row { display: flex; justify-content: space-between; padding: 8px 15px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .jewel-row-name { color: #fff; }
        .jewel-row-date { color: #888; font-style: italic; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1 class="main-title">Broken Mirror</h1>
        <p style="color: var(--gold); letter-spacing: 2px;">CLAN MANAGEMENT SYSTEM</p>
    </header>

    <div class="leadership-section">
        <div class="leader-box">
            <h3 style="color: var(--gold); margin: 0; font-size: 0.7rem; letter-spacing: 2px;">ALLY LEADER</h3>
            <div style="font-size: 1.8rem; color: #fff; font-family: 'Cinzel';">NIKLAUS</div>
        </div>
        <div class="caller-box">
            <button class="caller-trigger" onclick="this.parentElement.classList.toggle('active')">
                <span style="color: var(--gold); font-size: 0.6rem; display: block;">TACTICAL CALLER ▼</span>
                <span style="font-size: 1.3rem; color: #fff; font-family: 'Cinzel';">TSAKNORRIS</span>
            </button>
            <div class="member-stats" style="display:none; margin:0; border:none; background:#000;">
                <div id="caller-stats" class="stat-grid"></div>
            </div>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="clan-column"><div class="column-header">Noldor Clan</div><div class="scroll-area" id="noldor-list"></div></div>
        <div class="clan-column"><div class="column-header">Kriminalides Main</div><div class="scroll-area" id="krim-list"></div></div>
    </div>

    <div class="epic-section">
        <div class="column-header" style="color: var(--epic-pink); border-bottom-color: var(--epic-pink);">Epic Jewels Distribution Archive</div>
        <div class="epic-scroll-area" id="epic-dist-list">
            </div>
    </div>

    <script>
        const bosses = ["VAL", "ANT", "BAI", "ZAK", "FRI", "AQ", "ORFEN", "CORE", "BELETH"];
        const noldorCPs = ["CP 1", "Noldor Archer", "Noldor Archer 2", "Noldor Dummy", "Noldor Tank", "Κriminalides CP", "Outlaw CP", "Ronin CP", "Brazilians CP", "Brazilians 2 CP", "I am Groot CP"];
        const krimCPs = ["Hattrick CP", "55 Room CP", "Legion CP", "Criminal Record CP", "Avalanche CP", "Gankly Crew CP", "Furious Wolves CP", "Animals CP", "Dracaris CP", "Sinaloa CP", "Knockout CP", "VaBank CP"];
        const callers = ["NIKLAUS", "TSAKNORRIS"];

        // Mock Data for Epics (Εδώ θα προσθέτεις τα jewels)
        const epicData = {
            "Hattrick CP": [{j: "Valakas Necklace", d: "12/03/2026"}, {j: "Baium Ring", d: "01/03/2026"}],
            "TSAKNORRIS": [{j: "Zaken Earring", d: "05/03/2026"}],
            "Noldor Archer": [{j: "Antharas Earring", d: "10/03/2026"}]
        };

        function createMemberHTML(name, isLeader = false) {
            return `<div class="member-item">
                <button class="member-trigger" onclick="toggleItem(event, this)"><span>${isLeader ? '👑 ' : ''}${name}</span><small style="color:#666">Stats ▼</small></button>
                <div class="member-stats"><div class="stat-grid">${bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('')}</div></div>
            </div>`;
        }

        function createCPItem(name) {
            return `<div class="cp-item">
                <button class="cp-trigger" onclick="toggleItem(event, this)"><span>${name}</span><small>Roster ▼</small></button>
                <div class="cp-details">${createMemberHTML("Leader Name", true)}${createMemberHTML("Member 1")}</div>
            </div>`;
        }

        // Epic Distribution Logic
        function createEpicGroup(name) {
            const jewels = epicData[name] || [];
            const jewelRows = jewels.map(item => `
                <div class="jewel-row">
                    <span class="jewel-row-name">${item.j}</span>
                    <span class="jewel-row-date">${item.d}</span>
                </div>
            `).join('') || '<div style="padding:10px; color:#555;">No epics assigned yet.</div>';

            return `
                <div class="epic-group-item">
                    <button class="epic-group-trigger" onclick="this.parentElement.classList.toggle('active')">
                        <span>${name}</span>
                        <small style="font-size:0.7rem;">View Loot (${jewels.length}) ▼</small>
                    </button>
                    <div class="jewel-list">
                        ${jewelRows}
                    </div>
                </div>`;
        }

        // Init
        document.getElementById('noldor-list').innerHTML = noldorCPs.map(createCPItem).join('');
        document.getElementById('krim-list').innerHTML = krimCPs.map(createCPItem).join('');
        document.getElementById('caller-stats').innerHTML = bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('');
        
        // Populate Epic Archive with everyone
        const allGroups = [...callers, ...noldorCPs, ...krimCPs];
        document.getElementById('epic-dist-list').innerHTML = allGroups.map(createEpicGroup).join('');

        function toggleItem(event, btn) {
            event.stopPropagation();
            btn.parentElement.classList.toggle('active');
        }
    </script>
</body>
</html>
