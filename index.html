<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMA | Professional Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --noldor-sky: #00d9ff; --krim-red: #ff3333; --bg-overlay: rgba(10, 12, 15, 0.96); }
        html { scroll-behavior: smooth; }
        body { font-family: 'Open Sans', sans-serif; background: #0a0c0f url('https://i.ibb.co/1GmpSyxZ/BACKGROUND.jpg') no-repeat center center fixed; background-size: cover; color: #eee; margin: 0; padding: 0; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-overlay); z-index: -1; }

        /* SECTION STYLING - NO OVERLAP */
        .page-section { min-height: 100vh; padding: 60px 20px; box-sizing: border-box; position: relative; border-bottom: 2px solid rgba(212,175,55,0.1); clear: both; display: block; }
        .server-time { position: absolute; top: 20px; right: 40px; color: var(--gold); font-family: 'Cinzel'; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 5px; background: rgba(0,0,0,0.5); font-size: 0.8rem; }

        /* HEADER */
        .top-header { text-align: center; margin-bottom: 30px; }
        .ally-logo { width: 120px; filter: drop-shadow(0 0 15px var(--gold)); }
        .ally-title { font-family: 'Cinzel Decorative'; font-size: 2rem; color: var(--gold); display: block; margin-top: 10px; }

        /* ROSTER GRID */
        .main-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; max-width: 1500px; margin: 0 auto; }
        .clan-column { background: rgba(15, 18, 22, 0.95); height: 600px; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 10px; border-top: 4px solid var(--gold); }
        .column-header { padding: 15px; text-align: center; font-family: 'Cinzel'; font-size: 1.1rem; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .scroll-area { overflow-y: auto; padding: 10px; flex-grow: 1; }

        /* CP & MEMBERS (SAFE POINT STYLE) */
        .cp-box { margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.3); border-radius: 6px; overflow: hidden; }
        .top-cp { border: 1px solid var(--gold); background: rgba(212, 175, 55, 0.05); }
        .cp-btn { width: 100%; background: none; border: none; padding: 12px 15px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
        .points-tag { border: 1px solid var(--gold); padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; color: var(--gold); }

        .member-list { display: none; background: rgba(0,0,0,0.4); border-top: 1px solid #222; }
        .active > .member-list { display: block; }

        .member-btn { width: 100%; background: none; border: none; padding: 10px 20px; color: #ccc; text-align: left; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .member-stats { display: none; background: #000; padding: 12px; }
        .active-member > .member-stats { display: block; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .stat-box { background: #15181c; padding: 6px; border: 1px solid #222; text-align: center; border-radius: 3px; }
        .stat-name { display: block; color: var(--gold); font-size: 0.5rem; text-transform: uppercase; }
        .stat-val { font-size: 0.8rem; color: #fff; font-family: 'Cinzel'; }

        /* SECTION 3 BUTTON */
        .pvp-btn { background: linear-gradient(to right, #8b0000, #ff0000); color: white; border: 2px solid var(--gold); padding: 15px 40px; font-family: 'Cinzel'; font-size: 1.2rem; text-decoration: none; border-radius: 8px; transition: 0.3s; box-shadow: 0 0 15px rgba(255,0,0,0.3); }
        .pvp-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,0,0,0.5); }
    </style>
</head>
<body>

    <div class="page-section" id="section1">
        <div class="server-time" id="clock">SERVER TIME: 00:00:00</div>
        <div class="top-header">
            <img src="https://i.ibb.co/6R9q5PGv/ALLIANCE-LOGO.png" class="ally-logo">
            <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
        </div>

        <div class="main-wrapper">
            <div class="clan-column" style="border-top-color: var(--noldor-sky);">
                <div class="column-header" style="color:var(--noldor-sky)">NOLDOR CLAN</div>
                <div class="scroll-area" id="noldor-list"></div>
            </div>
            <div class="clan-column" style="border-top-color: var(--krim-red);">
                <div class="column-header" style="color:var(--krim-red)">KRIMINALIDES CLAN</div>
                <div class="scroll-area" id="krim-list"></div>
            </div>
        </div>
    </div>

    <div class="page-section" id="section2" style="background: rgba(0,0,0,0.6);">
        <h2 style="font-family:'Cinzel Decorative'; color:var(--gold); text-align:center; margin-bottom:40px;">MARKETPLACE & PROTOCOL</h2>
        <div style="max-width:1200px; margin:0 auto; display:grid; grid-template-columns: 1fr 1.5fr; gap:30px;">
            <div style="background:rgba(10,12,15,0.9); border:2px solid var(--gold); padding:20px; border-radius:10px;">
                <table style="width:100%; color:white; border-collapse:collapse;" id="jewel-table"></table>
            </div>
            <div style="background:rgba(15,18,22,0.95); border-left:4px solid var(--gold); padding:30px; border-radius:10px;">
                <h3 style="color:var(--gold); font-family:Cinzel;">ALLIANCE PROTOCOL</h3>
                <p>• <span style="color:var(--gold)">Attendance:</span> Mid Epics = 1 | Major = 2 | Grand = 3.</p>
                <p>• <span style="color:var(--gold)">Priority:</span> Baium (Archers) | Valakas (Mages) | Antharas (Stoppers).</p>
            </div>
        </div>
    </div>

    <div class="page-section" id="section3" style="text-align:center; display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h2 style="font-family:'Cinzel Decorative'; color:var(--gold); margin-bottom:40px;">BATTLE MEDIA CENTER</h2>
        <a href="videos.html" class="pvp-btn">WATCH PVP VIDEOS</a>
    </div>

    <script>
        const bosses = ["VAL", "ANT", "BAI", "FRI", "ZAK", "ORF", "AQ", "CORE", "SIEGE"];
        const jewels = [
            { name: "Orfen Earring", pts: 35, img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/earring-orfen.png?raw=true" },
            { name: "Core Ring", pts: 25, img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/ring-of-core.png?raw=true" },
            { name: "Baium Ring", pts: 950, img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/ring-of-baium.png?raw=true" }
        ];

        function renderRoster() {
            const cpData = [
                { name: "Hattrick CP", pts: 5500, members: ["Leader_1", "Member_A", "Member_B", "Member_C", "Member_D", "Member_E", "Member_F", "Member_G", "Member_H"] },
                { name: "Noldor Clan", pts: 5200, members: ["Leader_2", "Member_X", "Member_Y"] }
            ];

            const render = (elId) => {
                document.getElementById(elId).innerHTML = cpData.sort((a,b) => b.pts - a.pts).map((cp, idx) => `
                    <div class="cp-box ${idx === 0 ? 'top-cp' : ''}">
                        <button class="cp-btn" onclick="this.parentElement.classList.toggle('active')">
                            <span>${idx === 0 ? '⭐ ' : ''}${cp.name}</span>
                            <span class="points-tag">${cp.pts} PTS</span>
                        </button>
                        <div class="member-list">
                            ${cp.members.map(mem => `
                                <div class="member-item">
                                    <button class="member-btn" onclick="this.parentElement.classList.toggle('active-member')">
                                        <span>${mem}</span><span>▼</span>
                                    </button>
                                    <div class="member-stats">
                                        <div class="stat-grid">${bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span><span class="stat-val">0</span></div>`).join('')}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            };
            render('noldor-list'); render('krim-list');
            document.getElementById('jewel-table').innerHTML = jewels.map(j => `<tr><td style="padding:10px;"><img src="${j.img}" style="width:24px; vertical-align:middle;"> ${j.name}</td><td style="color:var(--gold); font-weight:bold; text-align:right;">${j.pts}</td></tr>`).join('');
        }

        setInterval(() => { document.getElementById('clock').innerText = "SERVER TIME: " + new Date().toLocaleTimeString('el-GR'); }, 1000);
        renderRoster();
    </script>
</body>
</html>
