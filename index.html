<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37; --noldor-sky: #00d9ff; --krim-red: #ff3333;
            --bg-overlay: rgba(10, 12, 15, 0.96); 
        }
        body { 
            font-family: 'Open Sans', sans-serif; 
            background: #0a0c0f url('https://i.ibb.co/1GmpSyxZ/BACKGROUND.jpg') no-repeat center center fixed; 
            background-size: cover; color: #eee; margin: 0; padding: 0;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-overlay); z-index: -1; }

        /* HEADER CONTROLS */
        .header-controls { position: relative; display: flex; justify-content: flex-end; gap: 10px; padding: 20px 40px; z-index: 100; }
        .control-btn { color: var(--gold); font-family: 'Cinzel'; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 5px; background: rgba(0,0,0,0.6); font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        .top-header { text-align: center; }
        .ally-logo { width: 110px; filter: drop-shadow(0 0 15px var(--gold)); }
        .ally-title { font-family: 'Cinzel Decorative', cursive; font-size: 1.8rem; color: var(--gold); display: block; margin-bottom: 20px;}

        /* NAV */
        .main-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .nav-btn { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; font-family: 'Cinzel'; cursor: pointer; border-radius: 4px; font-size: 0.75rem; text-decoration: none; }
        
        .tabs-nav { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
        .tab-btn { background: rgba(0,0,0,0.6); border: 1px solid var(--gold); color: var(--gold); padding: 10px 25px; font-family: 'Cinzel'; cursor: pointer; text-decoration: none; border-radius: 4px; font-size: 0.8rem; }
        .tab-btn.active { background: var(--gold); color: #000; }

        /* CP LISTS */
        .main-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1400px; margin: 0 auto 30px auto; padding: 0 20px; }
        .clan-column { background: rgba(15, 18, 22, 0.95); height: 700px; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 10px; border-top: 4px solid var(--gold); }
        .column-header { padding: 15px; text-align: center; font-family: 'Cinzel'; font-size: 1.1rem; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .scroll-area { overflow-y: auto; padding: 10px; flex-grow: 1; }

        .cp-box { margin-bottom: 8px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.05); }
        .cp-noldor { border-left: 4px solid var(--noldor-sky); background: linear-gradient(90deg, rgba(0,217,255,0.1) 0%, transparent 100%); }
        .cp-krim { border-left: 4px solid var(--krim-red); background: linear-gradient(90deg, rgba(255,51,51,0.1) 0%, transparent 100%); }
        
        .cp-btn { width: 100%; background: none; border: none; padding: 12px 15px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; }
        .cp-content { display: none; padding: 15px; background: rgba(0,0,0,0.4); border-top: 1px solid #333; }
        .cp-box.active .cp-content { display: block; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .stat-box { background: #111; padding: 5px; border: 1px solid #222; text-align: center; border-radius: 4px; }
        .boss-icon-mini { width: 18px; vertical-align: middle; }
        
        .loot-panel { margin-top: 10px; font-size: 0.75rem; color: #bbb; border-top: 1px solid #222; padding-top: 10px; }
        .history-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }

        /* LEADERS */
        .leaders-row { display: flex; justify-content: center; gap: 40px; margin: 20px 0; }
        .leader-card { text-align: center; cursor: pointer; }
        .img-frame { width: 70px; height: 70px; border: 2px solid var(--gold); border-radius: 50%; overflow: hidden; margin: 0 auto; }
        .leader-img { width: 100%; height: 100%; object-fit: cover; }

        @media (max-width: 800px) { .main-wrapper { grid-template-columns: 1fr; } }
    </style>
</head>
<body onclick="tryAutoPlay()">

    <div class="header-controls">
        <div class="control-btn" onclick="toggleMusic(event)">
            <span id="music-icon">🔊</span> <span id="track-name">DION THEME</span>
        </div>
        <div class="control-btn" id="clock">00:00:00 UTC</div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.dropbox.com/scl/fi/ypzqrr336iewt62gncy6u/Lineage-2-Dion-Theme-Song.mp3?rlkey=nl1quliuqleuljgkt5jhqq6hh&st=sb8ij16g&raw=1" type="audio/mpeg">
    </audio>

    <div class="top-header">
        <img src="https://i.ibb.co/6R9q5PGv/ALLIANCE-LOGO.png" class="ally-logo">
        <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
        
        <div class="main-nav">
            <a href="index.html" class="nav-btn">DASHBOARD</a>
            <a href="pvpzone.html" class="nav-btn">PVP ZONE</a>
            <a href="history.html" class="nav-btn">LEAVERS</a>
            <a href="halloffame.html" class="nav-btn">HALL OF FAME</a>
        </div>
    </div>

    <div class="leaders-row">
        <div class="leader-card" onclick="alert('Leader Stats Coming Soon')">
            <div class="img-frame"><img src="https://i.ibb.co/5X3NDQFR/niklaus.png" class="leader-img"></div>
            <div style="color:var(--gold); font-size:0.8rem; font-family:'Cinzel';">NIKLAUS</div>
        </div>
        <div class="leader-card" onclick="alert('Leader Stats Coming Soon')">
            <div class="img-frame"><img src="https://i.ibb.co/xSVgzBPB/tsaknorris.png" class="leader-img"></div>
            <div style="color:var(--gold); font-size:0.8rem; font-family:'Cinzel';">TSAKNORRIS</div>
        </div>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active">ALLIANCE CP LIST</button>
        <a href="marketplace.html" class="tab-btn">MARKET & POLICIES ↗</a>
    </div>

    <div class="main-wrapper">
        <div class="clan-column">
            <div class="column-header" style="color:var(--noldor-sky)">NOLDOR CLAN</div>
            <div class="scroll-area" id="noldor-list"></div>
        </div>
        <div class="clan-column">
            <div class="column-header" style="color:var(--krim-red)">KRIMINALIDES CLAN</div>
            <div class="scroll-area" id="krim-list"></div>
        </div>
    </div>

    <script>
        const bossIcons = { "VAL": "https://i.ibb.co/84gZPVRP/necklace-valakas.png", "ANT": "https://i.ibb.co/rfqvc6mv/earring-antharas.png", "BAI": "https://i.ibb.co/XrZkv67h/ring-of-baium.png", "ZAK": "https://i.ibb.co/spkC6Gzz/zaken-earring.png", "AQ": "https://i.ibb.co/rKRtZmBG/ring-of-queen-ant.png", "ORF": "https://i.ibb.co/j9dDnXwH/earring-orfen.png" };

        const noldorCPs = ["Noldor Archer", "Outlaw CP", "Ronin CP", "Brazilians CP", "Shadow CP"];
        const krimCPs = ["Hattrick CP", "55 Room CP", "Legion CP", "Criminal Record CP", "Avalanche CP"];

        function renderLists() {
            const createCP = (name, style, hasLoot) => `
                <div class="cp-box ${style}">
                    <button class="cp-btn" onclick="this.parentElement.classList.toggle('active')">
                        <span>${name}</span>
                        <span style="color:var(--gold); font-size:0.7rem;">4000 PTS</span>
                    </button>
                    <div class="cp-content">
                        <div class="stat-grid">
                            ${Object.keys(bossIcons).map(b => `<div class="stat-box"><img src="${bossIcons[b]}" class="boss-icon-mini"> 1</div>`).join('')}
                        </div>
                        <div class="loot-panel">
                            <strong>LOOT HISTORY:</strong><br>
                            ${hasLoot ? `
                                <div class="history-item"><img src="${bossIcons.VAL}" class="boss-icon-mini"> VALAKAS NECKLACE - <span style="color:var(--gold)">RECEIVED</span></div>
                                <div class="history-item"><img src="${bossIcons.BAI}" class="boss-icon-mini"> BAIUM RING - <span style="color:var(--gold)">RECEIVED</span></div>
                            ` : 'No history found.'}
                        </div>
                    </div>
                </div>`;

            document.getElementById('noldor-list').innerHTML = noldorCPs.map(cp => createCP(cp, "cp-noldor", cp === "Noldor Archer")).join('');
            document.getElementById('krim-list').innerHTML = krimCPs.map(cp => createCP(cp, "cp-krim", cp === "Hattrick CP")).join('');
        }

        // Music Logic
        const audio = document.getElementById('bg-music');
        function toggleMusic(e) { 
            e.stopPropagation(); 
            if(audio.paused) { audio.play(); document.getElementById('music-icon').innerText = '🔊'; }
            else { audio.pause(); document.getElementById('music-icon').innerText = '🔇'; }
        }
        function tryAutoPlay() { audio.play().catch(()=>{}); }

        // Clock
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('el-GR', {timeZone:'UTC', hour12:false}) + " UTC"; }, 1000);

        renderLists();
    </script>
</body>
</html>
