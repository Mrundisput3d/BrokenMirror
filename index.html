<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --noldor-sky: #00d9ff;
            --krim-red: #ff3333;
            --bg-overlay: rgba(10, 12, 15, 0.85); 
            --panel-bg: rgba(15, 18, 22, 0.98);
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            /* BACKGROUND DIRECT LINK */
            background: #0a0c0f url('https://i.ibb.co/6R9SnyS0/background.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: #eee; margin: 0; padding: 20px;
        }

        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-overlay); z-index: -1; 
        }

        .top-header { text-align: center; margin-bottom: 40px; }
        
        /* ALLIANCE LOGO - DIRECT LINK */
        .ally-logo { 
            width: 180px; height: 180px; 
            object-fit: contain; 
            margin-bottom: 10px; 
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6));
        }

        .ally-title { 
            font-family: 'Cinzel Decorative', cursive; 
            font-size: 3rem; color: var(--gold); display: block; 
            letter-spacing: 3px; text-shadow: 2px 2px 15px #000; 
        }
        
        .leaders-row { display: flex; justify-content: center; gap: 60px; margin-top: 30px; }
        .leader-card { text-align: center; width: 180px; }
        
        /* ΣΤΑΘΕΡΑ ΠΛΑΙΣΙΑ ΓΙΑ ΝΑ ΧΩΡΑΝΕ ΟΙ ΦΩΤΟ */
        .img-frame {
            width: 150px; height: 150px; 
            margin: 0 auto;
            background: #000;
            border: 2px solid var(--gold);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .leader-img { 
            width: 100%; height: 100%; 
            object-fit: contain; /* Αυτό εγγυάται ότι θα φαίνεται όλη η φωτό */
        }

        .leader-name { font-family: 'Cinzel'; font-size: 1.6rem; color: #fff; display: block; margin-top: 12px; }

        .main-wrapper { display: flex; gap: 25px; max-width: 1700px; margin: 0 auto; }

        /* ΠΑΝΕΛ */
        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; flex-grow: 1; }
        .clan-column { background: var(--panel-bg); height: 750px; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 10px; border-top: 4px solid var(--gold); }
        .column-header { padding: 20px; text-align: center; font-family: 'Cinzel'; font-size: 1.3rem; border-bottom: 1px solid #222; }
        
        .scroll-area { overflow-y: auto; padding: 15px; flex-grow: 1; }
        
        /* CP ΣΤΥΛ - ΟΠΩΣ ΤΟ ΠΡΟΗΓΟΥΜΕΝΟ ΣΟΥ ΣΧΕΔΙΟ */
        .cp-box { margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02); border-radius: 6px; }
        .rank-1 { border: 1px solid #ffd700; background: rgba(255,215,0,0.05); }
        
        .cp-btn { width: 100%; background: none; border: none; padding: 18px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .points { color: var(--gold); font-weight: bold; border: 1px solid var(--gold); padding: 2px 10px; border-radius: 4px; font-size: 0.9rem; }

        .mini-dist { width: 340px; background: var(--panel-bg); border: 1px solid var(--gold); height: 750px; border-radius: 10px; display: flex; flex-direction: column; }
        .dist-header { background: #1a1400; color: var(--gold); padding: 20px; text-align: center; font-family: 'Cinzel'; border-bottom: 1px solid var(--gold); }

        @media (max-width: 1200px) { .main-wrapper { flex-direction: column; } .mini-dist { width: 100%; height: 400px; } }
    </style>
</head>
<body>

    <div class="top-header">
        <img src="https://i.ibb.co/1fyDHTJp/alliance-logo.png" class="ally-logo">
        <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
        
        <div class="leaders-row">
            <div class="leader-card">
                <div class="img-frame">
                    <img src="https://i.ibb.co/5X3NDQFR/niklaus.png" class="leader-img">
                </div>
                <span class="leader-name">NIKLAUS</span>
                <small style="color:var(--gold)">ALLY LEADER</small>
            </div>
            <div class="leader-card">
                <div class="img-frame">
                    <img src="https://i.ibb.co/Zs2GGFt/tsaknorris.png" class="leader-img">
                </div>
                <span class="leader-name">TSAKNORRIS</span>
                <small style="color:var(--gold)">SHOTCALLER</small>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="dashboard-container">
            <div class="clan-column">
                <div class="column-header" style="color:var(--noldor-sky)">NOLDOR CLAN</div>
                <div class="scroll-area" id="noldor-list"></div>
            </div>
            <div class="clan-column">
                <div class="column-header" style="color:var(--krim-red)">KRIMINALIDES MAIN</div>
                <div class="scroll-area" id="krim-list"></div>
            </div>
        </div>

        <div class="mini-dist">
            <div class="dist-header">LOOT DISTRIBUTION</div>
            <div class="scroll-area" id="epic-dist-list"></div>
        </div>
    </div>

    <script>
        // Τα δεδομένα σου (μπορείς να αλλάξεις ονόματα και πόντους εδώ)
        const noldor = [
            { name: "Kriminalides CP", pts: 1800 },
            { name: "Noldor Archer", pts: 1500 },
            { name: "Brazilians CP", pts: 1350 }
        ];
        const krim = [
            { name: "Hattrick CP", pts: 2100 },
            { name: "55 Room CP", pts: 1950 },
            { name: "Criminal Record CP", pts: 1600 }
        ];

        function createItem(cp, color, rank) {
            return `
                <div class="cp-box ${rank === 0 ? 'rank-1' : ''}">
                    <div class="cp-btn">
                        <span style="color:var(${color})">${cp.name}</span>
                        <span class="points">${cp.pts} PTS</span>
                    </div>
                </div>`;
        }

        document.getElementById('noldor-list').innerHTML = noldor.map((cp, i) => createItem(cp, '--noldor-sky', i)).join('');
        document.getElementById('krim-list').innerHTML = krim.map((cp, i) => createItem(cp, '--krim-red', i)).join('');
        
        const all = [...noldor, ...krim];
        document.getElementById('epic-dist-list').innerHTML = all.map(n => 
            `<div style="padding:15px; border-bottom:1px solid #222;"><b style="color:var(--gold)">${n.name}</b><br><small>No loot history</small></div>`
        ).join('');
    </script>
</body>
</html>
