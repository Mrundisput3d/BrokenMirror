<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37; --silver: #c0c0c0; --bronze: #cd7f32;
            --noldor-sky: #00d9ff; --krim-red: #ff3333;
            --noldor-grad: linear-gradient(90deg, rgba(0,217,255,0.15) 0%, rgba(0,0,0,0) 100%);
            --krim-grad: linear-gradient(90deg, rgba(255,51,51,0.15) 0%, rgba(0,0,0,0) 100%);
            --bg-overlay: rgba(10, 12, 15, 0.96); 
        }
        body { 
            font-family: 'Open Sans', sans-serif; 
            background: #0a0c0f url('https://i.ibb.co/1GmpSyxZ/BACKGROUND.jpg') no-repeat center center fixed; 
            background-size: cover; color: #eee; margin: 0; padding: 0;
            overflow-x: hidden;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-overlay); z-index: -1; }

        .header-controls { position: absolute; top: 20px; right: 40px; display: flex; gap: 10px; z-index: 100; }
        .control-btn { color: var(--gold); font-family: 'Cinzel'; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 5px; background: rgba(0,0,0,0.6); font-size: 0.75rem; cursor: pointer; transition: 0.3s; }
        .control-btn:hover { background: var(--gold); color: #000; }

        .top-header { text-align: center; padding-top: 20px; }
        .ally-logo { width: 110px; filter: drop-shadow(0 0 15px var(--gold)); }
        .ally-title { font-family: 'Cinzel Decorative', cursive; font-size: 1.8rem; color: var(--gold); display: block; letter-spacing: 2px; margin-bottom: 20px;}

        .main-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; font-family: 'Cinzel'; cursor: pointer; transition: 0.3s; font-size: 0.75rem; border-radius: 4px; }
        .nav-btn:hover, .nav-btn.active { background: var(--gold); color: #000; }

        .leaders-row { display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; }
        .leader-card { text-align: center; width: 110px; cursor: pointer; transition: 0.3s; }
        .leader-card:hover { transform: translateY(-5px); }
        .img-frame { width: 80px; height: 80px; margin: 0 auto; background: #000; border: 2px solid var(--gold); border-radius: 50%; overflow: hidden; box-shadow: 0 0 15px rgba(212,175,55,0.2); }
        .leader-img { width: 100%; height: 100%; object-fit: contain; }
        .leader-name { color: var(--gold); font-size: 0.8rem; font-family: 'Cinzel'; display: block; margin-top: 8px; font-weight: bold; }

        .main-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1400px; margin: 0 auto; padding: 20px; }
        .clan-column { background: rgba(15, 18, 22, 0.95); height: 750px; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 10px; border-top: 4px solid var(--gold); }
        .column-header { padding: 15px; text-align: center; font-family: 'Cinzel'; font-size: 1.1rem; border-bottom: 1px solid #222; background: rgba(0,0,0,0.4); }
        .scroll-area { overflow-y: auto; padding: 10px; flex-grow: 1; }

        .cp-box { margin-bottom: 8px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .cp-noldor { border-left: 4px solid var(--noldor-sky); background: var(--noldor-grad); }
        .cp-krim { border-left: 4px solid var(--krim-red); background: var(--krim-grad); }
        .cp-btn { width: 100%; background: none; border: none; padding: 12px 15px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 0.85rem; }
        .cp-content { display: none; background: rgba(0,0,0,0.85); padding: 15px; border-top: 1px solid #333; }
        .cp-box.active .cp-content { display: block; }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .stat-box { background: #15181c; padding: 6px; border: 1px solid #333; text-align: center; border-radius: 4px; }
        .boss-icon { width: 22px; height: 22px; margin-bottom: 4px; }
        .stat-val { font-size: 0.75rem; color: #fff; font-family: 'Cinzel'; display: block; }

        /* MODAL & OVERLAY - ΕΠΑΝΑΦΟΡΑ ΟΠΩΣ ΗΤΑΝ */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 900; backdrop-filter: blur(5px); }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 500px; background: #0f1216; border: 1px solid var(--gold); border-radius: 10px; z-index: 1000; padding: 30px; box-shadow: 0 0 40px rgba(0,0,0,1); }
        .modal-header { display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .modal-img { width: 70px; height: 70px; border: 2px solid var(--gold); border-radius: 50%; }
        .close-btn { position: absolute; top: 15px; right: 15px; color: #666; cursor: pointer; font-size: 1.5rem; }
        .loot-btn { width: 100%; margin-top: 20px; background: none; border: 1px solid var(--gold); color: var(--gold); padding: 10px; font-family: 'Cinzel'; cursor: pointer; border-radius: 5px; }

        @media (max-width: 900px) {
            .main-wrapper { grid-template-columns: 1fr; }
            .clan-column { height: 500px; }
        }
    </style>
</head>
<body>

    <div class="header-controls">
        <div class="control-btn" id="clock">SERVER TIME: 00:00:00 UTC</div>
    </div>

    <div class="top-header">
        <img src="https://i.ibb.co/6R9q5PGv/ALLIANCE-LOGO.png" class="ally-logo">
        <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
        
        <div class="main-nav">
            <button class="nav-btn active">DASHBOARD</button>
            <button class="nav-btn">HISTORY</button>
            <button class="nav-btn">PVP ZONE</button>
        </div>

        <div class="leaders-row">
            <div class="leader-card" onclick="openCaller('NIKLAUS', 'https://i.ibb.co/5X3NDQFR/niklaus.png')">
                <div class="img-frame"><img src="https://i.ibb.co/5X3NDQFR/niklaus.png" class="leader-img"></div>
                <span class="leader-name">NIKLAUS</span>
            </div>
            <div class="leader-card" onclick="openCaller('TSAKNORRIS', 'https://i.ibb.co/xSVgzBPB/tsaknorris.png')">
                <div class="img-frame"><img src="https://i.ibb.co/xSVgzBPB/tsaknorris.png" class="leader-img"></div>
                <span class="leader-name">TSAKNORRIS</span>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="clan-column">
            <div class="column-header" style="color:var(--noldor-sky)">NOLDOR CLAN</div>
            <div class="scroll-area" id="noldor-list"></div>
        </div>
        <div class="clan-column">
            <div class="column-header" style="color:var(--krim-red)">KRIMINALIDES CLAN</div>
            <div class="scroll-area" id="krim-list"></div>
        </div>
    </div>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="caller-modal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-header">
            <img src="" id="modal-img" class="modal-img">
            <div>
                <h2 id="modal-name" style="margin:0; font-family:'Cinzel'; color:var(--gold);"></h2>
                <p style="margin:5px 0 0; font-size:0.8rem; color:#888;">ALLIANCE LEADER / CALLER</p>
            </div>
        </div>
        <div class="stat-grid" id="modal-stats"></div>
        <button class="loot-btn" onclick="toggleLeaderLoot()">VIEW LOOT HISTORY</button>
        <div id="leader-loot-panel" style="display:none; margin-top:15px; font-size:0.75rem; color:#ccc; border-top:1px solid #333; padding-top:15px;">
            No recent loot distribution recorded.
        </div>
    </div>

    <script>
        // ΟΛΑ ΤΑ ICONS ΟΠΩΣ ΤΑ ΖΗΤΗΣΕΣ
        const bossIcons = {
            "VAL": "https://i.ibb.co/84gZPVRP/necklace-valakas.png",
            "ANT": "https://i.ibb.co/rfqvc6mv/earring-antharas.png",
            "BAI": "https://i.ibb.co/XrZkv67h/ring-of-baium.png",
            "FRI": "https://i.ibb.co/gF4YKGTM/frintezza-necklace.png",
            "ZAK": "https://i.ibb.co/spkC6Gzz/zaken-earring.png",
            "ORF": "https://i.ibb.co/0X6mPzYV/orfen-earring.png",
            "AQ":  "https://i.ibb.co/rKRtZmBG/ring-of-queen-ant.png",
            "COR": "https://i.ibb.co/3mN9R0sK/ring-of-core.png",
            "SIE": "https://i.ibb.co/Txfby6wD/images.png"
        };

        const noldor = ["Noldor Archer", "Outlaw CP", "Shadow CP", "Viking CP"];
        const krim = ["Hattrick CP", "Legion CP", "Animals CP", "Mafia CP"];

        function renderLists() {
            const statsHtml = Object.keys(bossIcons).map(b => `
                <div class="stat-box"><img src="${bossIcons[b]}" class="boss-icon"><span class="stat-val">0</span></div>
            `).join('');

            const makeItem = (name, style) => `
                <div class="cp-box ${style}">
                    <button class="cp-btn" onclick="this.parentElement.classList.toggle('active')">
                        <span>${name}</span><span style="color:var(--gold)">0 PTS</span>
                    </button>
                    <div class="cp-content"><div class="stat-grid">${statsHtml}</div></div>
                </div>`;

            document.getElementById('noldor-list').innerHTML = noldor.map(n => makeItem(n, 'cp-noldor')).join('');
            document.getElementById('krim-list').innerHTML = krim.map(n => makeItem(n, 'cp-krim')).join('');
        }

        // ΛΕΙΤΟΥΡΓΙΕΣ MODAL ΟΠΩΣ ΣΤΟ SAFE POINT
        function openCaller(name, img) {
            document.getElementById('modal-name').innerText = name;
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-stats').innerHTML = Object.keys(bossIcons).map(b => `
                <div class="stat-box"><img src="${bossIcons[b]}" class="boss-icon"><span class="stat-val">0</span></div>
            `).join('');
            document.getElementById('caller-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function toggleLeaderLoot() {
            const panel = document.getElementById('leader-loot-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        function closeModal() {
            document.getElementById('caller-modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        setInterval(() => { 
            document.getElementById('clock').innerText = "SERVER TIME: " + new Date().toLocaleTimeString('el-GR', {timeZone:'UTC', hour12:false}) + " UTC"; 
        }, 1000);

        renderLists();
    </script>
</body>
</html>
