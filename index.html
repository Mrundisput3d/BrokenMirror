<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --noldor-sky: #00d9ff;
            --krim-red: #ff3333;
            --bg-overlay: rgba(10, 12, 15, 0.98);
            --panel-bg: rgba(20, 24, 28, 1);
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background: #0a0c0f url('https://images.alphacoders.com/133/1335334.png') no-repeat center center fixed; 
            background-size: cover; color: #eee; margin: 0; padding: 10px; overflow-x: hidden;
        }

        /* ALLIANCE & LEADER SECTION */
        .top-header { text-align: center; margin-bottom: 20px; }
        .ally-logo { width: 80px; height: 80px; border: 2px solid var(--gold); margin-bottom: 5px; }
        .ally-title { font-family: 'Cinzel'; font-size: 2rem; color: var(--gold); display: block; letter-spacing: 5px; text-shadow: 0 0 10px #000; }
        
        .leader-section { margin-top: 15px; }
        .leader-img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }
        .leader-name { font-family: 'Cinzel'; font-size: 1.5rem; color: #fff; display: block; }

        .main-wrapper { display: flex; gap: 20px; max-width: 1400px; margin: 0 auto; position: relative; }

        /* COLUMNS */
        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex-grow: 1; }
        .clan-column { background: var(--panel-bg); height: 450px; display: flex; flex-direction: column; border: 1px solid #444; border-radius: 4px; }
        .column-header { padding: 10px; text-align: center; font-family: 'Cinzel'; font-size: 0.9rem; letter-spacing: 2px; border-bottom: 1px solid #444; }
        
        .noldor-col { border-color: var(--noldor-sky); }
        .noldor-col .column-header { color: var(--noldor-sky); background: rgba(0, 217, 255, 0.05); }
        .krim-col { border-color: var(--krim-red); }
        .krim-col .column-header { color: var(--krim-red); background: rgba(255, 51, 51, 0.05); }

        .scroll-area { overflow-y: auto; padding: 5px; flex-grow: 1; scrollbar-width: thin; }

        /* CP ITEMS */
        .cp-item { margin-bottom: 4px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        .cp-trigger { width: 100%; background: none; border: none; padding: 10px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.8rem; }
        .cp-details { display: none; background: #000; padding: 10px; }
        .active .cp-details { display: block; }

        /* ATTENDANCE GRID */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
        .stat-box { background: #111; padding: 4px; text-align: center; border: 1px solid #222; font-size: 0.6rem; }
        .stat-name { display: block; color: var(--gold); font-weight: bold; }

        /* MINI DISTRIBUTION LOG (SIDEBAR) */
        .mini-dist { width: 220px; background: var(--panel-bg); border: 1px solid var(--gold); height: 450px; display: flex; flex-direction: column; font-size: 0.7rem; }
        .dist-header { background: #221a00; color: var(--gold); padding: 8px; text-align: center; font-family: 'Cinzel'; border-bottom: 1px solid var(--gold); }
        .dist-row { padding: 6px 10px; border-bottom: 1px solid #333; display: flex; flex-direction: column; }
        .dist-date { color: #666; font-size: 0.6rem; }

        @media (max-width: 1000px) { 
            .main-wrapper { flex-direction: column; } 
            .mini-dist { width: 100%; height: 200px; }
            .dashboard-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="top-header">
        <img src="https://via.placeholder.com/80/000000/d4af37?text=BM" alt="Alliance Logo" class="ally-logo">
        <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
        
        <div class="leader-section">
            <img src="https://via.placeholder.com/100/222222/ffffff?text=NIKLAUS" alt="Niklaus" class="leader-img">
            <span class="leader-name">NIKLAUS</span>
            <small style="color: var(--gold); letter-spacing: 3px;">ALLY LEADER</small>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="dashboard-container">
            <div class="clan-column noldor-col">
                <div class="column-header">NOLDOR</div>
                <div class="scroll-area" id="noldor-list"></div>
            </div>

            <div class="clan-column krim-col">
                <div class="column-header">KRIMINALIDES</div>
                <div class="scroll-area" id="krim-list"></div>
            </div>
        </div>

        <div class="mini-dist">
            <div class="dist-header">LOOT LOG</div>
            <div class="scroll-area" id="epic-dist-list"></div>
        </div>
    </div>

    <script>
        const bosses = ["VAL", "ANT", "BAI", "FRI", "ZAK", "ORF", "AQ", "CORE", "SIEGE"];
        const noldorCPs = ["Noldor Archer", "Noldor Archer 2", "Noldor Dummy", "Noldor Tank", "Κriminalides CP", "Outlaw CP", "Ronin CP", "Brazilians CP", "Brazilians 2 CP", "I am Groot CP"];
        const krimCPs = ["Hattrick CP", "55 Room CP", "Legion CP", "Criminal Record CP", "Avalanche CP", "Gankly Crew CP", "Furious Wolves CP", "Animals CP", "Dracaris CP", "Sinaloa CP", "Knockout CP", "VaBank CP"];

        const epicLog = [
            { cp: "Hattrick CP", item: "Valakas Necklace", date: "12/03/26" },
            { cp: "TSAKNORRIS", item: "Zaken Earring", date: "05/03/26" }
        ];

        function createStats() {
            return `<div class="stat-grid">${bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('')}</div>`;
        }

        function createCPItem(name, colorVar) {
            return `
                <div class="cp-item">
                    <button class="cp-trigger" onclick="toggleCP(this)">
                        <span style="color:var(${colorVar})">${name}</span>
                        <small style="color:#666">STATS ▼</small>
                    </button>
                    <div class="cp-details">
                        ${createStats()}
                    </div>
                </div>`;
        }

        function toggleCP(btn) {
            btn.parentElement.classList.toggle('active');
        }

        // Render Lists
        document.getElementById('noldor-list').innerHTML = noldorCPs.map(n => createCPItem(n, '--noldor-sky')).join('');
        document.getElementById('krim-list').innerHTML = krimCPs.map(n => createCPItem(n, '--krim-red')).join('');
        
        // Render Loot Log
        document.getElementById('epic-dist-list').innerHTML = epicLog.map(log => `
            <div class="dist-row">
                <span style="color:var(--gold)">${log.cp}</span>
                <span>${log.item}</span>
                <span class="dist-date">${log.date}</span>
            </div>
        `).join('');
    </script>
</body>
</html>
