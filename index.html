<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --noldor-sky: #00d9ff;
            --krim-red: #ff3333;
            --bg-overlay: rgba(8, 10, 12, 0.88); 
            --panel-bg: rgba(15, 18, 22, 0.96);
            --top1: #ffd700; --top2: #c0c0c0; --top3: #cd7f32;
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background: #0a0c0f url('https://i.ibb.co/CKBbgKym/background-new.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: #eee; margin: 0; padding: 20px;
        }

        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, transparent 20%, var(--bg-overlay) 100%); 
            z-index: -1; 
        }

        .top-header { text-align: center; margin-bottom: 40px; }
        
        /* FIXED LOGOS (CONTAIN INSTEAD OF COVER) */
        .ally-logo { 
            width: 150px; height: 150px; border: 3px solid var(--gold); 
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.5); margin-bottom: 10px; 
            object-fit: contain; background: #000; border-radius: 12px; padding: 5px;
        }
        .ally-title { font-family: 'Cinzel'; font-size: 2.8rem; color: var(--gold); display: block; letter-spacing: 5px; text-shadow: 2px 2px 15px #000; }
        
        .leaders-row { display: flex; justify-content: center; gap: 40px; margin-top: 25px; }
        .leader-card { text-align: center; }
        
        .leader-img { 
            width: 130px; height: 130px; border-radius: 50%; border: 3px solid #fff; 
            object-fit: contain; background: #111; padding: 5px;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .main-wrapper { display: flex; gap: 20px; max-width: 1700px; margin: 0 auto; align-items: flex-start; }

        /* DASHBOARD */
        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex-grow: 1; }
        .clan-column { background: var(--panel-bg); height: 750px; display: flex; flex-direction: column; border: 1px solid #444; border-radius: 8px; }
        .column-header { padding: 15px; text-align: center; font-family: 'Cinzel'; border-bottom: 1px solid #333; }

        .scroll-area { overflow-y: auto; padding: 10px; flex-grow: 1; scrollbar-width: thin; }
        .scroll-area::-webkit-scrollbar { width: 5px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--gold); }

        /* CP BOXES WITH GLOW */
        .cp-box { margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.6); border-radius: 4px; }
        .rank-1 { border: 1px solid var(--top1); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .rank-2 { border: 1px solid var(--top2); box-shadow: 0 0 10px rgba(192, 192, 192, 0.1); }
        .rank-3 { border: 1px solid var(--top3); box-shadow: 0 0 10px rgba(205, 127, 50, 0.1); }

        .cp-btn { width: 100%; background: none; border: none; padding: 15px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        
        .member-list, .dist-detail { display: none; background: rgba(0,0,0,0.8); padding: 5px; border-top: 1px solid #222; }
        .active > .member-list, .active > .dist-detail, .active > .stats-area { display: block; }

        .member-btn { width: 100%; background: none; border: none; padding: 10px 20px; color: #ccc; text-align: left; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.85rem; }
        .stats-area { display: none; background: #000; padding: 15px; border-top: 1px solid var(--gold); }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .stat-box { background: #111; padding: 6px; text-align: center; border: 1px solid #222; font-size: 0.7rem; }
        .stat-name { display: block; color: var(--gold); font-weight: bold; }

        /* INTERACTIVE SIDEBAR ARCHIVE */
        .mini-dist { width: 320px; background: var(--panel-bg); border: 1px solid var(--gold); height: 750px; display: flex; flex-direction: column; border-radius: 8px; }
        .dist-header { background: #221a00; color: var(--gold); padding: 15px; text-align: center; font-family: 'Cinzel'; border-bottom: 1px solid var(--gold); }
        .dist-item-box { border-bottom: 1px solid #222; }
        .dist-trigger { width: 100%; padding: 12px; background: none; border: none; color: #fff; text-align: left; cursor: pointer; font-size: 0.8rem; display: flex; justify-content: space-between; }
        .loot-row { padding: 8px 15px; font-size: 0.75rem; border-left: 2px solid var(--gold); margin: 5px; background: rgba(212,175,55,0.05); }

        @media (max-width: 1200px) { .main-wrapper { flex-direction: column; } .mini-dist { width: 100%; } }
    </style>
</head>
<body>

    <div class="top-header">
        <img src="https://i.ibb.co/YCTxJLw/alliance-logo.png" class="ally-logo">
        <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
        
        <div class="leaders-row">
            <div class="leader-card">
                <img src="https://i.ibb.co/39kHvqVG/niklaus-logo.png" class="leader-img">
                <span class="leader-name">NIKLAUS</span>
                <small style="color:var(--gold)">ALLY LEADER</small>
            </div>
            <div class="leader-card">
                <img src="https://via.placeholder.com/130/111/fff?text=TSAK" class="leader-img">
                <span class="leader-name">TSAKNORRIS</span>
                <small style="color:var(--gold)">SHOTCALLER</small>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="dashboard-container">
            <div class="clan-column noldor-col">
                <div class="column-header" style="color:var(--noldor-sky)">NOLDOR CLAN</div>
                <div class="scroll-area" id="noldor-list"></div>
            </div>
            <div class="clan-column krim-col">
                <div class="column-header" style="color:var(--krim-red)">KRIMINALIDES MAIN</div>
                <div class="scroll-area" id="krim-list"></div>
            </div>
        </div>

        <div class="mini-dist">
            <div class="dist-header">LOOT ARCHIVE (BY CP)</div>
            <div class="scroll-area" id="epic-dist-list"></div>
        </div>
    </div>

    <script>
        const bosses = ["VAL", "ANT", "BAI", "FRI", "ZAK", "ORF", "AQ", "CORE", "SIEGE"];
        
        // Παράδειγμα Loot Δεδομένων για το Archive
        const lootArchive = {
            "Hattrick CP": [{item: "Valakas Necklace", date: "12/03/2026"}, {item: "Draco Bow", date: "10/03/2026"}],
            "55 Room CP": [{item: "Zaken Earring", date: "08/03/2026"}],
            "NIKLAUS": [{item: "Core Ring", date: "01/03/2026"}]
        };

        const noldorData = [
            { name: "Noldor Archer", pts: 1500, lead: "Artemis", mems: ["Legolas", "Sylvanas", "Robin"] },
            { name: "Noldor Archer 2", pts: 1200, lead: "Apollo", mems: ["ArcherX", "ArcherY"] },
            { name: "Noldor Dummy", pts: 450, lead: "Dummy", mems: ["D1", "D2"] },
            { name: "Noldor Tank", pts: 1100, lead: "Aegis", mems: ["Shield", "Wall"] },
            { name: "Κriminalides CP", pts: 1800, lead: "Boss", mems: ["Member1", "Member2"] },
            { name: "Outlaw CP", pts: 950, lead: "Renegade", mems: ["O1", "O2"] },
            { name: "Ronin CP", pts: 800, lead: "Samurai", mems: ["Katana", "Bushido"] },
            { name: "Brazilians CP", pts: 1350, lead: "Ronaldo", mems: ["Neymar", "Pele"] },
            { name: "Brazilians 2 CP", pts: 700, lead: "Kaka", mems: ["Cafu", "Zico"] },
            { name: "I am Groot CP", pts: 300, lead: "Groot", mems: ["Rocket", "StarLord"] }
        ];

        const krimData = [
            { name: "Hattrick CP", pts: 2100, lead: "Captain", mems: ["Striker", "Goalie"] },
            { name: "55 Room CP", pts: 1950, lead: "Master55", mems: ["P1", "P2"] },
            { name: "Legion CP", pts: 1100, lead: "Cent", mems: ["S1", "S2"] },
            { name: "Criminal Record CP", pts: 1600, lead: "Judge", mems: ["J1", "J2"] },
            { name: "Avalanche CP", pts: 1400, lead: "Snow", mems: ["Ice", "Frost"] },
            { name: "Gankly Crew CP", pts: 900, lead: "Ganker", mems: ["G1", "G2"] },
            { name: "Furious Wolves CP", pts: 850, lead: "Alpha", mems: ["W1", "W2"] },
            { name: "Animals CP", pts: 750, lead: "Lion", mems: ["Tiger", "Bear"] },
            { name: "Dracaris CP", pts: 1250, lead: "Dany", mems: ["Drag1", "Drag2"] },
            { name: "Sinaloa CP", pts: 1550, lead: "ElChapo", mems: ["C1", "C2"] },
            { name: "Knockout CP", pts: 1050, lead: "Tyson", mems: ["Box1", "Box2"] },
            { name: "VaBank CP", pts: 1300, lead: "Dealer", mems: ["V1", "V2"] }
        ];

        function createCPItem(cp, color, rank) {
            let rankClass = (rank === 0) ? "rank-1" : (rank === 1) ? "rank-2" : (rank === 2) ? "rank-3" : "";
            const membersHTML = [cp.lead, ...cp.mems].map((m, i) => `
                <div class="member-item">
                    <button class="member-btn" onclick="this.parentElement.classList.toggle('active')">
                        <span>${i === 0 ? '👑 ' : ''}${m}</span><small>STATS ▼</small>
                    </button>
                    <div class="stats-area">
                        <div class="stat-grid">${bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('')}</div>
                    </div>
                </div>`).join('');

            return `<div class="cp-box ${rankClass}">
                <button class="cp-btn" onclick="this.parentElement.classList.toggle('active')">
                    <span><span style="color:var(${color})">${cp.name}</span></span>
                    <span style="color:var(--gold); font-weight:bold;">${cp.pts} PTS</span>
                </button>
                <div class="member-list">${membersHTML}</div>
            </div>`;
        }

        const render = (data, id, col) => {
            const sorted = [...data].sort((a,b) => b.pts - a.pts);
            document.getElementById(id).innerHTML = sorted.map((cp, i) => createCPItem(cp, col, i)).join('');
        };

        render(noldorData, 'noldor-list', '--noldor-sky');
        render(krimData, 'krim-list', '--krim-red');

        // Distribution Archive Logic
        const allEntities = ["NIKLAUS", "TSAKNORRIS", ...noldorData.map(c=>c.name), ...krimData.map(c=>c.name)];
        document.getElementById('epic-dist-list').innerHTML = allEntities.map(name => {
            const loots = lootArchive[name] || [];
            return `
            <div class="dist-item-box">
                <button class="dist-trigger" onclick="this.parentElement.classList.toggle('active')">
                    <span style="color:var(--gold)">${name}</span>
                    <small>${loots.length} ITEMS ▼</small>
                </button>
                <div class="dist-detail">
                    ${loots.length > 0 ? loots.map(l => `<div class="loot-row"><b>${l.item}</b><br><small>${l.date}</small></div>`).join('') : '<div class="loot-row">No records</div>'}
                </div>
            </div>`;
        }).join('');
    </script>
</body>
</html>
