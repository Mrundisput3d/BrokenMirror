<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror | Clan Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #8a6d3b;
            --bg-overlay: rgba(10, 12, 15, 0.94);
            --panel-bg: rgba(20, 24, 28, 0.98);
            --border-style: 2px solid var(--dark-gold);
            --member-bg: rgba(255, 255, 255, 0.03);
            --epic-pink: #ff79c6;
            --leader-glow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background: url('https://images.alphacoders.com/133/1335334.png') no-repeat center center fixed; 
            background-size: cover;
            color: #eee; margin: 0; padding: 20px;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 10%, var(--bg-overlay) 90%);
            z-index: -1;
        }

        h1, h2, h3, .column-header, .cp-trigger span, .leader-label, .stat-title, .caller-name { font-family: 'Cinzel', serif; }

        header { text-align: center; margin-bottom: 30px; }
        .main-title { font-size: 3.5rem; color: var(--gold); text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); margin: 0; letter-spacing: 6px; }

        /* LEADERSHIP SECTION */
        .leadership-section {
            max-width: 1000px; margin: 0 auto 40px auto;
            text-align: center;
        }

        .leader-box {
            background: rgba(0,0,0,0.7); border: var(--border-style);
            padding: 20px; margin-bottom: 20px; border-radius: 5px;
            box-shadow: var(--leader-glow);
        }

        .caller-box {
            max-width: 500px; margin: 0 auto;
            background: rgba(20, 24, 28, 0.9); border: 1px solid var(--dark-gold);
            border-radius: 5px; overflow: hidden;
        }

        .caller-trigger {
            width: 100%; background: none; border: none; color: #fff; padding: 15px;
            cursor: pointer; display: flex; flex-direction: column; align-items: center;
            transition: 0.3s;
        }
        .caller-trigger:hover { background: rgba(212, 175, 55, 0.1); }

        .caller-stats { display: none; background: #0a0c0e; padding: 15px; border-top: 1px solid var(--dark-gold); }
        .caller-box.active .caller-stats { display: block; animation: fadeIn 0.4s; }

        /* DASHBOARD GRID */
        .dashboard-container { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px; 
            width: 100%; max-width: 1300px; margin: 0 auto;
        }

        .clan-column {
            background: var(--panel-bg); border: var(--border-style);
            border-radius: 5px; height: 550px; display: flex; flex-direction: column;
        }

        .column-header { 
            background: linear-gradient(to bottom, #2c3136, #111);
            padding: 15px; color: var(--gold); font-size: 1.2rem; text-align: center; border-bottom: var(--border-style);
        }

        .scroll-area { overflow-y: auto; padding: 15px; flex-grow: 1; }
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--dark-gold); }

        /* NESTED ITEMS */
        .cp-item { margin-bottom: 10px; border: 1px solid rgba(138, 109, 59, 0.2); background: rgba(0,0,0,0.4); }
        .cp-trigger { width: 100%; background: none; border: none; color: var(--gold); padding: 15px; text-align: left; cursor: pointer; display: flex; justify-content: space-between; }
        .cp-details { display: none; background: rgba(0,0,0,0.5); border-top: 1px solid var(--dark-gold); }
        .active > .cp-details { display: block; }

        .member-item { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .member-trigger { width: 100%; background: none; border: none; color: #fff; padding: 10px 20px; text-align: left; cursor: pointer; font-size: 0.9rem; display: flex; justify-content: space-between; }
        .member-stats { display: none; background: #0a0c0e; padding: 15px; border-left: 3px solid var(--gold); margin: 5px 20px; }
        .member-item.active .member-stats { display: block; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .stat-box { background: #161a1f; padding: 8px; text-align: center; border: 1px solid #333; font-size: 0.75rem; }
        .stat-name { display: block; color: var(--gold); font-weight: bold; }

        /* EPIC LOG */
        .epic-section { width: 100%; max-width: 1300px; margin: 40px auto; background: var(--panel-bg); border: var(--border-style); padding: 20px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { color: var(--gold); border-bottom: 2px solid var(--dark-gold); padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid rgba(138, 109, 59, 0.1); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 900px) { .dashboard-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <h1 class="main-title">Broken Mirror</h1>
        <p style="color: var(--gold); letter-spacing: 2px;">CLAN MANAGEMENT SYSTEM</p>
    </header>

    <div class="leadership-section">
        <div class="leader-box">
            <h3 style="color: var(--gold); margin: 0; font-size: 0.8rem; letter-spacing: 3px;">★ ALLY LEADER ★</h3>
            <div style="font-size: 2.2rem; color: #fff; text-shadow: 0 0 10px var(--gold); font-family: 'Cinzel';">NIKLAUS</div>
        </div>

        <div class="caller-box" id="caller-tsak">
            <button class="caller-trigger" onclick="toggleCaller()">
                <span style="color: var(--gold); font-size: 0.7rem; letter-spacing: 2px;">TACTICAL CALLER ▼</span>
                <span style="font-size: 1.6rem; color: #fff; font-family: 'Cinzel';">TSAKNORRIS</span>
            </button>
            <div class="caller-stats">
                <span class="stat-title" style="font-size:0.8rem; color:var(--gold)">Personal Raid Stats</span>
                <div id="caller-stat-grid" class="stat-grid"></div>
            </div>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="clan-column"><div class="column-header">Noldor Clan</div><div class="scroll-area" id="noldor-list"></div></div>
        <div class="clan-column"><div class="column-header">Kriminalides Main</div><div class="scroll-area" id="krim-list"></div></div>
    </div>

    <div class="epic-section">
        <h2 style="color:var(--gold); text-align: center; letter-spacing: 3px;">EPIC JEWELS DISTRIBUTION LOG</h2>
        <table>
            <thead><tr><th>Date</th><th>Epic Jewel</th><th>Recipient CP</th><th>Clan</th></tr></thead>
            <tbody>
                <tr><td>12/03/2026</td><td style="color:var(--epic-pink); font-weight:bold;">Valakas Necklace</td><td>Hattrick CP</td><td>Kriminalides</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const bosses = ["VAL", "ANT", "BAI", "ZAK", "FRI", "AQ", "ORFEN", "CORE", "BELETH"];
        
        // Fill Tsaknorris Stats
        document.getElementById('caller-stat-grid').innerHTML = bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('');

        function toggleCaller() {
            document.getElementById('caller-tsak').classList.toggle('active');
        }

        const noldorData = [
            { name: "CP 1", leader: "Player1", members: ["MemberA", "MemberB"] },
            { name: "Noldor Archer", leader: "Artemis", members: ["Legolas", "Sylvanas"] },
            { name: "Noldor Archer 2", leader: "Apollo", members: ["ArcherX", "ArcherY"] },
            { name: "Noldor Dummy", leader: "DummyLead", members: ["D1", "D2"] },
            { name: "Noldor Tank", leader: "Aegis", members: ["Wall", "Shield"] },
            { name: "Κriminalides CP", leader: "Boss", members: ["Thug1", "Thug2"] },
            { name: "Outlaw CP", leader: "Renegade", members: ["O1", "O2"] },
            { name: "Ronin CP", leader: "Samurai", members: ["Katana", "Bushido"] },
            { name: "Brazilians CP", leader: "Ronaldo", members: ["Neymar", "Pele"] },
            { name: "Brazilians 2 CP", leader: "Kaka", members: ["Cafu", "Zico"] },
            { name: "I am Groot CP", leader: "Groot", members: ["Rocket", "StarLord"] }
        ];

        const krimData = [
            { name: "Hattrick CP", leader: "Captain", members: ["Striker", "Goalie"] },
            { name: "55 Room CP", leader: "Master55", members: ["P1", "P2"] },
            { name: "Legion CP", leader: "Centurion", members: ["Soldier1", "Soldier2"] },
            { name: "Criminal Record CP", leader: "Judge", members: ["Lawyer", "Jury"] },
            { name: "Avalanche CP", leader: "Snow", members: ["Ice", "Frost"] },
            { name: "Gankly Crew CP", leader: "Ganker", members: ["Ninja1", "Ninja2"] },
            { name: "Furious Wolves CP", leader: "Alpha", members: ["Wolf1", "Wolf2"] },
            { name: "Animals CP", leader: "Lion", members: ["Tiger", "Bear"] },
            { name: "Dracaris CP", leader: "Khaleesi", members: ["Dragon1", "Dragon2"] },
            { name: "Sinaloa CP", leader: "El Chapo", members: ["Cartel1", "Cartel2"] },
            { name: "Knockout CP", leader: "Tyson", members: ["Hook", "Jab"] },
            { name: "VaBank CP", leader: "Dealer", members: ["Card1", "Card2"] }
        ];

        function createMemberHTML(name, isLeader = false) {
            return `<div class="member-item">
                <button class="member-trigger" onclick="toggleItem(event, this)"><span>${isLeader ? '👑 ' : ''}${name}</span><small style="color:#666">Stats ▼</small></button>
                <div class="member-stats"><div class="stat-grid">${bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('')}</div></div>
            </div>`;
        }

        function createCPItem(cp) {
            return `<div class="cp-item">
                <button class="cp-trigger" onclick="toggleItem(event, this)"><span>${cp.name}</span><small>Roster ▼</small></button>
                <div class="cp-details">${createMemberHTML(cp.leader, true)}${cp.members.map(m => createMemberHTML(m)).join('')}</div>
            </div>`;
        }

        document.getElementById('noldor-list').innerHTML = noldorData.map(createCPItem).join('');
        document.getElementById('krim-list').innerHTML = krimData.map(createCPItem).join('');

        function toggleItem(event, btn) {
            event.stopPropagation();
            btn.parentElement.classList.toggle('active');
        }
    </script>
</body>
</html>
