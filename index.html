<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --noldor-sky: #00d9ff;
            --krim-red: #ff3333;
            --bg-overlay: rgba(10, 12, 15, 0.85); 
            --panel-bg: rgba(15, 18, 22, 0.98);
            --top1: #ffd700; --top2: #c0c0c0; --top3: #cd7f32;
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background: #0a0c0f url('https://i.ibb.co/6R9SnyS0/background.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: #eee; margin: 0; padding: 20px;
        }

        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-overlay); z-index: -1; 
        }

        .top-header { text-align: center; margin-bottom: 40px; }
        
        /* ALLIANCE LOGO FIX */
        .ally-logo { 
            width: 200px; height: 180px; 
            object-fit: contain; /* Δείχνει όλη την εικόνα */
            margin-bottom: 10px; 
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6));
        }

        .ally-title { 
            font-family: 'Cinzel Decorative', cursive; 
            font-size: 3rem; color: var(--gold); display: block; 
            letter-spacing: 3px; text-shadow: 2px 2px 15px #000; 
        }
        
        .leaders-row { display: flex; justify-content: center; gap: 60px; margin-top: 30px; }
        .leader-card { text-align: center; width: 180px; }
        
        /* LEADER LOGOS FIX */
        .leader-img-container {
            width: 150px; height: 150px; 
            margin: 0 auto;
            background: rgba(0,0,0,0.4);
            border: 2px solid var(--gold);
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .leader-img { 
            width: 90%; height: 90%; 
            object-fit: contain; /* Δεν κόβει ποτέ την εικόνα */
        }

        .leader-name { font-family: 'Cinzel'; font-size: 1.6rem; color: #fff; display: block; margin-top: 12px; text-shadow: 2px 2px 5px #000; }

        .main-wrapper { display: flex; gap: 25px; max-width: 1700px; margin: 0 auto; }

        /* DASHBOARD COLUMNS */
        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; flex-grow: 1; }
        .clan-column { background: var(--panel-bg); height: 750px; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 10px; border-top: 4px solid var(--gold); }
        .column-header { padding: 20px; text-align: center; font-family: 'Cinzel'; font-size: 1.3rem; border-bottom: 1px solid #222; letter-spacing: 2px; }
        
        .scroll-area { overflow-y: auto; padding: 15px; flex-grow: 1; scrollbar-width: thin; scrollbar-color: var(--gold) transparent; }
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* CP BOXES & TOP 3 */
        .cp-box { margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.5); border-radius: 6px; transition: 0.3s; }
        .rank-1 { border: 1px solid var(--top1); box-shadow: inset 0 0 15px rgba(255, 215, 0, 0.1); position: relative; }
        .rank-1::after { content: "TOP 1"; position: absolute; top: -10px; right: 10px; background: var(--top1); color: #000; font-size: 0.6rem; font-weight: bold; padding: 2px 8px; border-radius: 4px; }

        .cp-btn { width: 100%; background: none; border: none; padding: 18px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .points-tag { border: 1px solid var(--gold); padding: 4px 12px; border-radius: 4px; color: var(--gold); font-weight: bold; font-size: 0.9rem; }

        .member-list { display: none; background: rgba(0,0,0,0.8); border-top: 1px solid #222; }
        .active > .member-list { display: block; }
        .member-btn { width: 100%; background: none; border: none; padding: 12px 25px; color: #ccc; text-align: left; cursor: pointer; border-bottom: 1px solid #111; }

        /* SIDEBAR */
        .mini-dist { width: 340px; background: var(--panel-bg); border: 1px solid var(--gold); height: 750px; border-radius: 10px; display: flex; flex-direction: column; }
        .dist-header { background: #1a1400; color: var(--gold); padding: 20px; text-align: center; font-family: 'Cinzel'; border-bottom: 1px solid var(--gold); }

        @media (max-width: 1200px) { .main-wrapper { flex-direction: column; } .mini-dist { width: 100%; height: 400px; } }
    </style>
</head>
<body>

    <div class="top-header">
        <img src="https://i.ibb.co/1fyDHTJp/alliance-logo.png" class="ally-logo">
        <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
        
        <div class="leaders-row">
            <div class="leader-card">
                <div class="leader-img-container">
                    <img src="https://i.ibb.co/5X3NDQFR/niklaus.png" class="leader-img">
                </div>
                <span class="leader-name">NIKLAUS</span>
                <small style="color:var(--gold); letter-spacing: 2px;">ALLY LEADER</small>
            </div>
            <div class="leader-card">
                <div class="leader-img-container">
                    <img src="https://i.ibb.co/Zs2GGFt/tsaknorris.png" class="leader-img">
                </div>
                <span class="leader-name">TSAKNORRIS</span>
                <small style="color:var(--gold); letter-spacing: 2px;">SHOTCALLER</small>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="dashboard-container">
            <div class="clan-column" style="border-top-color: var(--noldor-sky);">
                <div class="column-header" style="color:var(--noldor-sky)">NOLDOR CLAN</div>
                <div class="scroll-area" id="noldor-list"></div>
            </div>
            <div class="clan-column" style="border-top-color: var(--krim-red);">
                <div class="column-header" style="color:var(--krim-red)">KRIMINALIDES MAIN</div>
                <div class="scroll-area" id="krim-list"></div>
            </div>
        </div>

        <div class="mini-dist">
            <div class="dist-header">LOOT DISTRIBUTION</div>
            <div class="scroll-area" id="epic-dist-list"></div>
        </div>
    </div>

    <script>
        // Τα δεδομένα σου
        const noldorData = [
            { name: "Noldor Archer", pts: 1500, lead: "Artemis", mems: ["Legolas", "Sylvanas"] },
            { name: "Noldor Archer 2", pts: 1200, lead: "Apollo", mems: ["ArcherX"] },
            { name: "Κriminalides CP", pts: 1800, lead: "Boss", mems: ["M1"] }
        ];

        const krimData = [
            { name: "Hattrick CP", pts: 2100, lead: "Captain", mems: ["Striker"] },
            { name: "55 Room CP", pts: 1950, lead: "Master55", mems: ["P1"] }
        ];

        function createCPItem(cp, color, rank) {
            let rankClass = (rank === 0) ? "rank-1" : "";
            const membersHTML = [cp.lead, ...cp.mems].map(m => `<button class="member-btn">${m}</button>`).join('');

            return `
                <div class="cp-box ${rankClass}">
                    <button class="cp-btn" onclick="this.parentElement.classList.toggle('active')">
                        <span style="color:var(${color}); font-weight:bold;">${cp.name}</span>
                        <span class="points-tag">${cp.pts} PTS</span>
                    </button>
                    <div class="member-list">${membersHTML}</div>
                </div>`;
        }

        const render = (data, id, col) => {
            const sorted = [...data].sort((a,b) => b.pts - a.pts);
            document.getElementById(id).innerHTML = sorted.map((cp, i) => createCPItem(cp, col, i)).join('');
        };

        render(noldorData, 'noldor-list', '--noldor-sky');
        render(krimData, 'krim-list', '--krim-red');

        const allNames = ["NIKLAUS", "TSAKNORRIS", ...noldorData.map(c=>c.name), ...krimData.map(c=>c.name)];
        document.getElementById('epic-dist-list').innerHTML = allNames.map(n => 
            `<div style="padding:15px; border-bottom:1px solid #222;"><b style="color:var(--gold)">${n}</b><br><small style="color:#666">No loot history</small></div>`
        ).join('');
    </script>
</body>
</html>
