<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37; --silver: #c0c0c0; --bronze: #cd7f32;
            --noldor-sky: #00d9ff; --krim-red: #ff3333;
            --bg-overlay: rgba(10, 12, 15, 0.96); 
        }
        body { 
            font-family: 'Open Sans', sans-serif; 
            background: #0a0c0f url('https://i.ibb.co/1GmpSyxZ/BACKGROUND.jpg') no-repeat center center fixed; 
            background-size: cover; color: #eee; margin: 0; padding: 0;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-overlay); z-index: -1; }

        /* HEADER & TIME */
        .server-time { position: absolute; top: 20px; right: 40px; color: var(--gold); font-family: 'Cinzel'; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 5px; background: rgba(0,0,0,0.5); font-size: 0.8rem; z-index: 100; }
        .top-header { text-align: center; margin-bottom: 30px; padding-top: 20px; }
        .ally-logo { width: 140px; height: auto; filter: drop-shadow(0 0 15px var(--gold)); margin-bottom: 10px; }
        .ally-title { font-family: 'Cinzel Decorative', cursive; font-size: 2.2rem; color: var(--gold); display: block; letter-spacing: 2px; }

        /* LEADERS */
        .leaders-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 40px; margin-top: 30px; }
        .leader-card { text-align: center; cursor: pointer; transition: 0.3s; min-width: 120px; }
        .img-frame { width: 90px; height: 90px; margin: 0 auto; background: #000; border: 2px solid var(--gold); border-radius: 50%; overflow: hidden; box-shadow: 0 0 15px rgba(212,175,55,0.3); }
        .leader-img { width: 100%; height: 100%; object-fit: contain; }
        .leader-name { color: var(--gold); font-size: 0.85rem; font-family: 'Cinzel'; display: block; margin-top: 10px; font-weight: bold; }
        .leader-role { color: #888; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-top: 2px; }

        /* CP NAMES & TOP 3 COLORS */
        .cp-box { margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.3); border-radius: 6px; overflow: hidden; }
        .cp-btn { width: 100%; background: none; border: none; padding: 12px 15px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-family: 'Open Sans'; font-weight: 700; }
        
        .cp-rank-1 { color: var(--gold) !important; text-shadow: 0 0 10px rgba(212,175,55,0.6); }
        .cp-rank-2 { color: var(--silver) !important; text-shadow: 0 0 8px rgba(192,192,192,0.5); }
        .cp-rank-3 { color: var(--bronze) !important; text-shadow: 0 0 8px rgba(205,127,50,0.5); }
        .cp-noldor { color: var(--noldor-sky); }
        .cp-krim { color: var(--krim-red); }

        /* STATS */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .stat-box { background: #15181c; padding: 10px; border: 1px solid #222; text-align: center; border-radius: 4px; display: flex; flex-direction: column; align-items: center; }
        .boss-icon { width: 28px; height: 28px; margin-bottom: 5px; border: 1px solid #333; }
        .stat-val { font-size: 0.9rem; color: #fff; font-family: 'Cinzel'; font-weight: bold; }

        /* OTHERS */
        .main-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; max-width: 1600px; margin: 20px auto; padding: 0 20px; }
        .clan-column { background: rgba(15, 18, 22, 0.95); height: 750px; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 10px; border-top: 4px solid var(--gold); overflow: hidden; }
        .scroll-area { overflow-y: auto; padding: 10px; flex-grow: 1; }
        .points-tag { border: 1px solid currentColor; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; font-family: 'Cinzel'; }
        
        .member-list { display: none; background: rgba(0,0,0,0.5); border-top: 1px solid #222; }
        .active > .member-list { display: block; }
        .active-member > .member-stats { display: block; }
        .member-stats { display: none; background: #000; padding: 15px; border-top: 1px solid #333; }
        
        .loot-section { background: rgba(212, 175, 55, 0.05); border-top: 1px solid #333; padding: 10px; }
        .loot-toggle-btn { width: 100%; background: none; border: 1px solid var(--gold); color: var(--gold); padding: 8px; font-family: 'Cinzel'; cursor: pointer; border-radius: 4px; font-size: 0.75rem; }
    </style>
</head>
<body>

    <div class="server-time" id="clock">SERVER TIME: 00:00:00 UTC</div>
    
    <div class="top-header">
        <img src="https://i.ibb.co/6R9q5PGv/ALLIANCE-LOGO.png" class="ally-logo">
        <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
        <div class="leaders-row">
            <div class="leader-card">
                <div class="img-frame"><img src="https://i.ibb.co/5X3NDQFR/niklaus.png" class="leader-img"></div>
                <span class="leader-name">NIKLAUS</span>
                <span class="leader-role">ALLY LEADER</span>
            </div>
            <div class="leader-card">
                <div class="img-frame"><img src="https://i.ibb.co/xSVgzBPB/tsaknorris.png" class="leader-img"></div>
                <span class="leader-name">TSAKNORRIS</span>
                <span class="leader-role">SHOT CALLER</span>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="clan-column">
            <div style="padding:15px; text-align:center; color:var(--noldor-sky); font-family:'Cinzel'; border-bottom:1px solid #222;">NOLDOR CLAN</div>
            <div class="scroll-area" id="noldor-list"></div>
        </div>
        <div class="clan-column">
            <div style="padding:15px; text-align:center; color:var(--krim-red); font-family:'Cinzel'; border-bottom:1px solid #222;">KRIMINALIDES CLAN</div>
            <div class="scroll-area" id="krim-list"></div>
        </div>
    </div>

    <script>
        const bossConfig = {
            "VAL": { name: "Valakas", img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/necklace-valakas.png?raw=true" },
            "ANT": { name: "Antharas", img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/earring-antharas.png?raw=true" },
            "BAI": { name: "Baium", img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/ring-of-baium.png?raw=true" },
            "FRI": { name: "Frintezza", img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/frintezza-necklace.png?raw=true" },
            "ZAK": { name: "Zaken", img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/zaken-earring.png?raw=true" },
            "ORF": { name: "Orfen", img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/earring-orfen.png?raw=true" },
            "AQ":  { name: "Queen Ant", img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/ring-of-queen-ant.png?raw=true" },
            "SIEGE": { name: "Siege", img: "https://i.ibb.co/Txfby6wD/images.png" } // ΤΟ ΝΕΟ ΕΙΚΟΝΙΔΙΟ
        };

        const noldorCPs = [{name:"Noldor Clan", pts:4200}, {name:"Noldor Archer", pts:3800}, {name:"Outlaw CP", pts:1500}];
        const krimCPs = [{name:"Hattrick CP", pts:4500}, {name:"55 Room CP", pts:3100}, {name:"Animals CP", pts:800}];

        function renderLists() {
            const allSorted = [...noldorCPs, ...krimCPs].sort((a,b) => b.pts - a.pts);
            
            const makeList = (arr, clanClass) => {
                return arr.map(cp => {
                    const rank = allSorted.findIndex(x => x.name === cp.name);
                    let colorClass = clanClass;
                    let medal = "";
                    if(rank === 0) { colorClass="cp-rank-1"; medal="🥇 "; }
                    else if(rank === 1) { colorClass="cp-rank-2"; medal="🥈 "; }
                    else if(rank === 2) { colorClass="cp-rank-3"; medal="🥉 "; }

                    return `
                    <div class="cp-box">
                        <button class="cp-btn" onclick="this.parentElement.classList.toggle('active')">
                            <span class="${colorClass}">${medal}${cp.name}</span>
                            <span class="points-tag">${cp.pts} PTS</span>
                        </button>
                        <div class="member-list">
                            <div class="member-item">
                                <button class="cp-btn" style="font-size:0.8rem;" onclick="this.nextElementSibling.classList.toggle('active-member')">👑 CP Leader</button>
                                <div class="member-stats">
                                    <div class="stat-grid">
                                        ${Object.keys(bossConfig).map(b => `<div class="stat-box"><img src="${bossConfig[b].img}" class="boss-icon"><span class="stat-val">0</span></div>`).join('')}
                                    </div>
                                </div>
                            </div>
                            <div class="loot-section">
                                <button class="loot-toggle-btn">VIEW LOOT HISTORY</button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            };

            document.getElementById('noldor-list').innerHTML = makeList(noldorCPs, "cp-noldor");
            document.getElementById('krim-list').innerHTML = makeList(krimCPs, "cp-krim");
        }

        setInterval(() => {
            document.getElementById('clock').innerText = "SERVER TIME: " + new Date().toLocaleTimeString('el-GR', {timeZone:'UTC', hour12:false}) + " UTC";
        }, 1000);

        renderLists();
    </script>
</body>
</html>
