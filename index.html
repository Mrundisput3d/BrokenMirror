<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror | Clan Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #8a6d3b;
            --bg-overlay: rgba(10, 12, 15, 0.94);
            --panel-bg: rgba(20, 24, 28, 0.98);
            --border-style: 2px solid var(--dark-gold);
            --member-bg: rgba(255, 255, 255, 0.03);
            --epic-pink: #ff79c6;
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background: url('https://images.alphacoders.com/133/1335334.png') no-repeat center center fixed; 
            background-size: cover;
            color: #eee; margin: 0; padding: 20px;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 10%, var(--bg-overlay) 90%);
            z-index: -1;
        }

        h1, h2, .column-header, .cp-trigger span, .leader-label, .stat-title { font-family: 'Cinzel', serif; }

        header { text-align: center; margin-bottom: 30px; }
        .main-title { font-size: 3.5rem; color: var(--gold); text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); margin: 0; letter-spacing: 6px; }

        .dashboard-container { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px; 
            width: 100%; max-width: 1300px; margin: 0 auto;
        }

        .clan-column {
            background: var(--panel-bg); border: var(--border-style);
            border-radius: 5px; height: 650px; display: flex; flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .column-header { 
            background: linear-gradient(to bottom, #2c3136, #111);
            padding: 15px; color: var(--gold); font-size: 1.2rem;
            text-align: center; border-bottom: var(--border-style);
        }

        .scroll-area { overflow-y: auto; padding: 15px; flex-grow: 1; }
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--dark-gold); }

        /* CP ITEM */
        .cp-item { margin-bottom: 10px; border: 1px solid rgba(138, 109, 59, 0.2); background: rgba(0,0,0,0.4); }
        .cp-trigger { 
            width: 100%; background: none; border: none; color: var(--gold); padding: 15px;
            text-align: left; cursor: pointer; display: flex; justify-content: space-between;
        }

        /* MEMBER ITEM (Nested) */
        .cp-details { display: none; background: rgba(0,0,0,0.5); border-top: 1px solid var(--dark-gold); }
        .active > .cp-details { display: block; }

        .member-item { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .member-trigger {
            width: 100%; background: none; border: none; color: #fff; padding: 10px 20px;
            text-align: left; cursor: pointer; font-size: 0.9rem; display: flex; justify-content: space-between;
        }
        .member-trigger:hover { background: rgba(212, 175, 55, 0.1); }

        /* MEMBER STATS (Nested deeper) */
        .member-stats { display: none; background: #0a0c0e; padding: 15px; border-left: 3px solid var(--gold); margin: 5px 20px; }
        .member-item.active .member-stats { display: block; animation: slideIn 0.3s forwards; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .stat-box { background: #161a1f; padding: 8px; text-align: center; border: 1px solid #333; font-size: 0.75rem; }
        .stat-name { display: block; color: var(--gold); font-weight: bold; }

        /* EPIC LOG TABLE */
        .epic-section { width: 100%; max-width: 1300px; margin: 40px auto; background: var(--panel-bg); border: var(--border-style); padding: 20px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { color: var(--gold); border-bottom: 2px solid var(--dark-gold); padding: 12px; text-align: left; font-family: 'Cinzel'; }
        td { padding: 12px; border-bottom: 1px solid rgba(138, 109, 59, 0.1); }
        .jewel-name { color: var(--epic-pink); font-weight: bold; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        @media (max-width: 900px) { .dashboard-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <h1 class="main-title">Broken Mirror</h1>
        <p style="color: var(--gold); letter-spacing: 2px;">CLAN MANAGEMENT SYSTEM</p>
    </header>

    <div class="dashboard-container">
        <div class="clan-column">
            <div class="column-header">Noldor Clan</div>
            <div class="scroll-area" id="noldor-list"></div>
        </div>

        <div class="clan-column">
            <div class="column-header">Kriminalides Main</div>
            <div class="scroll-area" id="krim-list"></div>
        </div>
    </div>

    <div class="epic-section">
        <h2 style="color:var(--gold); text-align: center; letter-spacing: 3px;">EPIC JEWELS DISTRIBUTION LOG</h2>
        <table>
            <thead>
                <tr><th>Date</th><th>Epic Jewel</th><th>Recipient CP</th><th>Clan</th></tr>
            </thead>
            <tbody>
                <tr><td>12/03/2026</td><td class="jewel-name">Valakas Necklace</td><td>Hattrick CP</td><td>Kriminalides</td></tr>
                <tr><td>10/03/2026</td><td class="jewel-name">Antharas Earring</td><td>Noldor Archer</td><td>Noldor</td></tr>
                <tr><td>08/03/2026</td><td class="jewel-name">Baium Ring</td><td>Ronin CP</td><td>Noldor</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const noldorData = [
            { name: "CP 1", leader: "Player1", members: ["MemberA", "MemberB", "MemberC"] },
            { name: "Noldor Archer", leader: "Artemis", members: ["Legolas", "Sylvanas"] },
            { name: "Noldor Archer 2", leader: "Apollo", members: ["ArcherX", "ArcherY"] },
            { name: "Noldor Dummy", leader: "DummyLead", members: ["D1", "D2"] },
            { name: "Noldor Tank", leader: "Aegis", members: ["Wall", "Shield"] },
            { name: "Κriminalides CP", leader: "Boss", members: ["Thug1", "Thug2"] },
            { name: "Outlaw CP", leader: "Renegade", members: ["O1", "O2"] },
            { name: "Ronin CP", leader: "Samurai", members: ["Katana", "Bushido"] },
            { name: "Brazilians CP", leader: "Ronaldo", members: ["Neymar", "Pele"] },
            { name: "Brazilians 2 CP", leader: "Kaka", members: ["Cafu", "Zico"] },
            { name: "I am Groot CP", leader: "Groot", members: ["Rocket", "StarLord"] }
        ];

        const krimData = [
            { name: "Hattrick CP", leader: "Captain", members: ["Striker", "Goalie"] },
            { name: "55 Room CP", leader: "Master55", members: ["P1", "P2"] },
            { name: "Legion CP", leader: "Centurion", members: ["Soldier1", "Soldier2"] },
            { name: "Criminal Record CP", leader: "Judge", members: ["Lawyer", "Jury"] },
            { name: "Avalanche CP", leader: "Snow", members: ["Ice", "Frost"] },
            { name: "Gankly Crew CP", leader: "Ganker", members: ["Ninja1", "Ninja2"] },
            { name: "Furious Wolves CP", leader: "Alpha", members: ["Wolf1", "Wolf2"] },
            { name: "Animals CP", leader: "Lion", members: ["Tiger", "Bear"] },
            { name: "Dracaris CP", leader: "Khaleesi", members: ["Dragon1", "Dragon2"] },
            { name: "Sinaloa CP", leader: "El Chapo", members: ["Cartel1", "Cartel2"] },
            { name: "Knockout CP", leader: "Tyson", members: ["Hook", "Jab"] },
            { name: "VaBank CP", leader: "Dealer", members: ["Card1", "Card2"] }
        ];

        const bosses = ["VAL", "ANT", "BAI", "ZAK", "FRI", "AQ", "ORFEN", "CORE", "BELETH"];

        function createMemberHTML(name, isLeader = false) {
            return `
                <div class="member-item">
                    <button class="member-trigger" onclick="toggleItem(event, this)">
                        <span>${isLeader ? '👑 ' : ''}${name}</span>
                        <small style="color:#666">Stats ▼</small>
                    </button>
                    <div class="member-stats">
                        <span class="stat-title" style="font-size:0.8rem; color:var(--gold)">Epic Participations</span>
                        <div class="stat-grid">
                            ${bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('')}
                        </div>
                    </div>
                </div>`;
        }

        function createCPItem(cp) {
            const leaderHTML = createMemberHTML(cp.leader, true);
            const membersHTML = cp.members.map(m => createMemberHTML(m)).join('');

            return `
                <div class="cp-item">
                    <button class="cp-trigger" onclick="toggleItem(event, this)">
                        <span>${cp.name}</span>
                        <small>Roster ▼</small>
                    </button>
                    <div class="cp-details">
                        ${leaderHTML}
                        ${membersHTML}
                    </div>
                </div>`;
        }

        document.getElementById('noldor-list').innerHTML = noldorData.map(createCPItem).join('');
        document.getElementById('krim-list').innerHTML = krimData.map(createCPItem).join('');

        function toggleItem(event, btn) {
            event.stopPropagation();
            btn.parentElement.classList.toggle('active');
        }
    </script>
</body>
</html>
