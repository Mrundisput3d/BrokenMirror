<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror | Clan Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --noldor-sky: #00d9ff; /* Γαλάζιο */
            --krim-red: #ff3333;
            --bg-overlay: rgba(10, 12, 15, 0.96);
            --panel-bg: rgba(15, 18, 22, 0.98);
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background: url('https://images.alphacoders.com/133/1335334.png') no-repeat center center fixed; 
            background-size: cover;
            color: #eee; margin: 0; padding: 10px;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 10%, var(--bg-overlay) 90%);
            z-index: -1;
        }

        h1, h2, h3, .column-header, .cp-trigger span { font-family: 'Cinzel', serif; }

        header { text-align: center; margin-bottom: 15px; }
        .main-title { font-size: 2.5rem; color: var(--gold); text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); margin: 0; letter-spacing: 4px; }

        /* LEADERSHIP - ΠΙΟ ΣΥΜΠΑΓΕΣ */
        .leadership-section { max-width: 900px; margin: 0 auto 20px auto; display: flex; justify-content: center; gap: 20px; }
        .leader-box { 
            background: rgba(0,0,0,0.8); border: 1px solid var(--gold); 
            padding: 10px 30px; border-radius: 4px; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            text-align: center;
        }

        /* MAIN DASHBOARD */
        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 1300px; margin: 0 auto; }
        .clan-column { background: var(--panel-bg); height: 450px; display: flex; flex-direction: column; border-radius: 4px; }
        .scroll-area { overflow-y: auto; padding: 8px; flex-grow: 1; }
        .scroll-area::-webkit-scrollbar { width: 4px; }

        /* NOLDOR STYLE (ΓΑΛΑΖΙΟ) */
        .noldor-col { border: 1px solid var(--noldor-sky); }
        .noldor-col .column-header { background: #003344; color: var(--noldor-sky); padding: 10px; text-align: center; border-bottom: 1px solid var(--noldor-sky); }
        .noldor-col .cp-trigger span { color: var(--noldor-sky); }
        .noldor-col .scroll-area::-webkit-scrollbar-thumb { background: var(--noldor-sky); }

        /* KRIMINALIDES STYLE (ΚΟΚΚΙΝΟ) */
        .krim-col { border: 1px solid var(--krim-red); }
        .krim-col .column-header { background: #440000; color: var(--krim-red); padding: 10px; text-align: center; border-bottom: 1px solid var(--krim-red); }
        .krim-col .cp-trigger span { color: var(--krim-red); }
        .krim-col .scroll-area::-webkit-scrollbar-thumb { background: var(--krim-red); }

        .cp-item { margin-bottom: 5px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }
        .cp-trigger { width: 100%; background: none; border: none; padding: 10px; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .cp-details { display: none; background: rgba(0,0,0,0.6); padding: 5px; }
        .active > .cp-details { display: block; }

        /* EPIC DISTRIBUTION (ΠΙΟ ΜΙΚΡΟ & ΚΙΤΡΙΝΟ) */
        .epic-section { width: 100%; max-width: 1300px; margin: 20px auto; background: var(--panel-bg); border: 1px solid var(--gold); height: 250px; display: flex; flex-direction: column; }
        .epic-section .column-header { background: #332200; color: var(--gold); font-size: 0.9rem; padding: 8px; text-align: center; border-bottom: 1px solid var(--gold); }
        .epic-scroll-area { overflow-y: auto; padding: 10px; flex-grow: 1; }
        .epic-scroll-area::-webkit-scrollbar { width: 4px; }
        .epic-scroll-area::-webkit-scrollbar-thumb { background: var(--gold); }
        
        .epic-group-item { margin-bottom: 4px; border: 1px solid rgba(212, 175, 55, 0.2); }
        .epic-group-trigger { width: 100%; background: none; border: none; color: var(--gold); padding: 8px 12px; text-align: left; cursor: pointer; font-family: 'Cinzel'; font-size: 0.85rem; display: flex; justify-content: space-between; }
        .jewel-list { display: none; background: rgba(0,0,0,0.8); padding: 5px; border-top: 1px solid var(--gold); }
        .jewel-row { display: flex; justify-content: space-between; padding: 4px 12px; font-size: 0.8rem; border-bottom: 1px solid #222; }
        
        .active { display: block !important; }

        @media (max-width: 800px) { .dashboard-container { grid-template-columns: 1fr; } .leadership-section { flex-direction: column; align-items: center; } }
    </style>
</head>
<body>

    <header>
        <h1 class="main-title">Broken Mirror</h1>
    </header>

    <div class="leadership-section">
        <div class="leader-box">
            <span style="color: var(--gold); font-size: 0.6rem; display: block; letter-spacing: 2px;">ALLY LEADER</span>
            <span style="font-size: 1.4rem; color: #fff; font-family: 'Cinzel';">NIKLAUS</span>
        </div>
        <div class="leader-box" style="cursor:pointer;" onclick="toggleElement('tsak-stats')">
            <span style="color: var(--gold); font-size: 0.6rem; display: block; letter-spacing: 2px;">TACTICAL CALLER</span>
            <span style="font-size: 1.4rem; color: #fff; font-family: 'Cinzel';">TSAKNORRIS ▼</span>
            <div id="tsak-stats" style="display:none; margin-top:10px; font-size: 0.7rem; color: #888;">
                Click below in Distribution for Loots
            </div>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="clan-column noldor-col">
            <div class="column-header">Noldor Clan</div>
            <div class="scroll-area" id="noldor-list"></div>
        </div>

        <div class="clan-column krim-col">
            <div class="column-header">Kriminalides Main</div>
            <div class="scroll-area" id="krim-list"></div>
        </div>
    </div>

    <div class="epic-section">
        <div class="column-header">Epic Distribution Log</div>
        <div class="epic-scroll-area" id="epic-dist-list"></div>
    </div>

    <script>
        const noldorCPs = ["CP 1", "Noldor Archer", "Noldor Archer 2", "Noldor Dummy", "Noldor Tank", "Κriminalides CP", "Outlaw CP", "Ronin CP", "Brazilians CP", "Brazilians 2 CP", "I am Groot CP"];
        const krimCPs = ["Hattrick CP", "55 Room CP", "Legion CP", "Criminal Record CP", "Avalanche CP", "Gankly Crew CP", "Furious Wolves CP", "Animals CP", "Dracaris CP", "Sinaloa CP", "Knockout CP", "VaBank CP"];
        const callers = ["NIKLAUS", "TSAKNORRIS"];

        const epicData = {
            "TSAKNORRIS": [{j: "Zaken Earring", d: "05/03/26"}],
            "Hattrick CP": [{j: "Valakas Necklace", d: "12/03/26"}]
        };

        function createCPItem(name) {
            return `<div class="cp-item">
                <button class="cp-trigger" onclick="this.parentElement.classList.toggle('active')"><span>${name}</span><small>▼</small></button>
                <div class="cp-details" style="color:#888; font-size:0.8rem; padding:10px;">Roster & Stats Placeholder</div>
            </div>`;
        }

        function createEpicGroup(name) {
            const jewels = epicData[name] || [];
            const rows = jewels.map(i => `<div class="jewel-row"><span>${i.j}</span><span>${i.d}</span></div>`).join('') || '<div style="padding:5px; color:#444;">No items</div>';
            return `<div class="epic-group-item">
                <button class="epic-group-trigger" onclick="this.parentElement.classList.toggle('active')"><span>${name}</span><small>${jewels.length} Items</small></button>
                <div class="jewel-list">${rows}</div>
            </div>`;
        }

        document.getElementById('noldor-list').innerHTML = noldorCPs.map(createCPItem).join('');
        document.getElementById('krim-list').innerHTML = krimCPs.map(createCPItem).join('');
        document.getElementById('epic-dist-list').innerHTML = [...callers, ...noldorCPs, ...krimCPs].map(createEpicGroup).join('');

        function toggleElement(id) {
            const el = document.getElementById(id);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
