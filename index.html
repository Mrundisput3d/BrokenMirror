<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --noldor-sky: #00d9ff;
            --krim-red: #ff3333;
            /* Ρύθμιση για να "αναπνέει" το background */
            --bg-overlay: rgba(8, 10, 12, 0.85); 
            --panel-bg: rgba(15, 18, 22, 0.95);
            --top1: #ffd700; --top2: #c0c0c0; --top3: #cd7f32;
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            /* ΝΕΟ BACKGROUND URL */
            background: #0a0c0f url('https://i.ibb.co/CKBbgKym/background-new.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: #eee; margin: 0; padding: 20px;
        }

        /* Layer για να σκοτεινιάσει ελαφρά η φωτό ώστε να μη "χτυπάει" στα μάτια */
        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, transparent 10%, var(--bg-overlay) 100%); 
            z-index: -1; 
        }

        .top-header { text-align: center; margin-bottom: 40px; }
        
        .ally-logo { 
            width: 160px; height: 160px; border: 3px solid var(--gold); 
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.6); margin-bottom: 15px; 
            object-fit: contain; background: rgba(0,0,0,0.6); border-radius: 12px;
        }
        .ally-title { font-family: 'Cinzel'; font-size: 3rem; color: var(--gold); display: block; letter-spacing: 6px; text-shadow: 3px 3px 15px #000; }
        
        .leaders-row { display: flex; justify-content: center; gap: 60px; margin-top: 30px; }
        .leader-card { text-align: center; }
        
        .leader-img { 
            width: 150px; height: 150px; border-radius: 50%; border: 3px solid #fff; 
            object-fit: cover; box-shadow: 0 0 25px rgba(255,255,255,0.15); 
            background: #111;
        }
        .leader-name { font-family: 'Cinzel'; font-size: 1.8rem; color: #fff; display: block; margin-top: 10px; text-shadow: 2px 2px 8px #000; }

        .main-wrapper { display: flex; gap: 25px; max-width: 1700px; margin: 0 auto; align-items: flex-start; }

        /* DASHBOARD COLUMNS */
        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; flex-grow: 1; }
        .clan-column { 
            background: var(--panel-bg); height: 750px; display: flex; flex-direction: column; 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.7); backdrop-filter: blur(5px);
        }
        .column-header { padding: 18px; text-align: center; font-family: 'Cinzel'; font-size: 1.3rem; border-bottom: 1px solid rgba(255,255,255,0.1); letter-spacing: 2px; }
        
        .noldor-col { border-top: 5px solid var(--noldor-sky); }
        .krim-col { border-top: 5px solid var(--krim-red); }

        .scroll-area { overflow-y: scroll; padding: 15px; flex-grow: 1; scrollbar-width: thin; }
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* CP BOXES */
        .cp-box { margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.5); border-radius: 6px; transition: all 0.3s ease; }
        .cp-box:hover { border-color: var(--gold); transform: translateX(5px); }
        .cp-btn { width: 100%; background: none; border: none; padding: 18px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 1rem; }
        
        .rank-1 { border: 1px solid var(--top1); background: rgba(255, 215, 0, 0.05); }
        .points-tag { border: 1px solid var(--gold); padding: 4px 14px; border-radius: 20px; color: var(--gold); font-weight: bold; font-size: 0.85rem; background: rgba(0,0,0,0.4); }

        /* MEMBER LIST & STATS */
        .member-list { display: none; background: rgba(0,0,0,0.85); border-top: 1px solid rgba(212,175,55,0.2); border-radius: 0 0 6px 6px; }
        .member-btn { width: 100%; background: none; border: none; padding: 14px 25px; color: #ddd; text-align: left; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.95rem; transition: 0.2s; }
        .member-btn:hover { color: var(--gold); background: rgba(255,255,255,0.05); }
        
        .stats-area { display: none; background: #050505; padding: 20px; border-top: 1px solid var(--gold); }
        .active > .member-list, .active > .stats-area { display: block; animation: slideDown 0.3s ease-out; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .stat-box { background: #111; padding: 10px; text-align: center; border: 1px solid #333; border-radius: 4px; }
        .stat-name { display: block; color: var(--gold); font-weight: bold; font-size: 0.8rem; margin-bottom: 4px; }

        /* SIDEBAR LOOT */
        .mini-dist { width: 340px; background: var(--panel-bg); border: 1px solid var(--gold); height: 750px; display: flex; flex-direction: column; border-radius: 10px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .dist-header { background: linear-gradient(180deg, #221a00 0%, #000 100%); color: var(--gold); padding: 18px; text-align: center; font-family: 'Cinzel'; border-bottom: 1px solid var(--gold); font-size: 1.1rem; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 1300px) { 
            .main-wrapper { flex-direction: column; align-items: center; } 
            .mini-dist { width: 100%; height: 450px; } 
            .ally-title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="top-header">
        <img src="https://i.ibb.co/YCTxJLw/alliance-logo.png" class="ally-logo" alt="Alliance Logo">
        <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
        
        <div class="leaders-row">
            <div class="leader-card">
                <img src="https://i.ibb.co/39kHvqVG/niklaus-logo.png" class="leader-img" alt="Niklaus">
                <span class="leader-name">NIKLAUS</span>
                <small style="color:var(--gold); letter-spacing: 4px; font-weight: bold; text-transform: uppercase;">Ally Leader</small>
            </div>
            <div class="leader-card">
                <img src="https://via.placeholder.com/150/111/fff?text=TSAK" class="leader-img" alt="Tsaknorris">
                <span class="leader-name">TSAKNORRIS</span>
                <small style="color:var(--gold); letter-spacing: 4px; font-weight: bold; text-transform: uppercase;">Shotcaller</small>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="dashboard-container">
            <div class="clan-column noldor-col">
                <div class="column-header" style="color:var(--noldor-sky)">NOLDOR CLAN</div>
                <div class="scroll-area" id="noldor-list"></div>
            </div>
            <div class="clan-column krim-col">
                <div class="column-header" style="color:var(--krim-red)">KRIMINALIDES MAIN</div>
                <div class="scroll-area" id="krim-list"></div>
            </div>
        </div>

        <div class="mini-dist">
            <div class="dist-header">LOOT DISTRIBUTION ARCHIVE</div>
            <div class="scroll-area" id="epic-dist-list"></div>
        </div>
    </div>

    <script>
        const bosses = ["VAL", "ANT", "BAI", "FRI", "ZAK", "ORF", "AQ", "CORE", "SIEGE"];
        
        // Μπορείς να επεξεργαστείς τα ονόματα και τους πόντους εδώ
        const noldorData = [
            { name: "Noldor Archer", pts: 1500, lead: "Artemis", mems: ["Legolas", "Sylvanas", "Robin"] },
            { name: "Noldor Archer 2", pts: 1200, lead: "Apollo", mems: ["ArcherX", "ArcherY"] },
            { name: "Noldor Dummy", pts: 450, lead: "Dummy", mems: ["D1", "D2"] },
            { name: "Noldor Tank", pts: 1100, lead: "Aegis", mems: ["Shield", "Wall"] },
            { name: "Κriminalides CP", pts: 1800, lead: "Boss", mems: ["Member1", "Member2"] },
            { name: "Outlaw CP", pts: 950, lead: "Renegade", mems: ["O1", "O2"] },
            { name: "Ronin CP", pts: 800, lead: "Samurai", mems: ["Katana", "Bushido"] },
            { name: "Brazilians CP", pts: 1350, lead: "Ronaldo", mems: ["Neymar", "Pele"] },
            { name: "Brazilians 2 CP", pts: 700, lead: "Kaka", mems: ["Cafu", "Zico"] },
            { name: "I am Groot CP", pts: 300, lead: "Groot", mems: ["Rocket", "StarLord"] }
        ];

        const krimData = [
            { name: "Hattrick CP", pts: 2100, lead: "Captain", mems: ["Striker", "Goalie"] },
            { name: "55 Room CP", pts: 1950, lead: "Master55", mems: ["P1", "P2"] },
            { name: "Legion CP", pts: 1100, lead: "Cent", mems: ["S1", "S2"] },
            { name: "Criminal Record CP", pts: 1600, lead: "Judge", mems: ["J1", "J2"] },
            { name: "Avalanche CP", pts: 1400, lead: "Snow", mems: ["Ice", "Frost"] },
            { name: "Gankly Crew CP", pts: 900, lead: "Ganker", mems: ["G1", "G2"] },
            { name: "Furious Wolves CP", pts: 850, lead: "Alpha", mems: ["W1", "W2"] },
            { name: "Animals CP", pts: 750, lead: "Lion", mems: ["Tiger", "Bear"] },
            { name: "Dracaris CP", pts: 1250, lead: "Dany", mems: ["Drag1", "Drag2"] },
            { name: "Sinaloa CP", pts: 1550, lead: "ElChapo", mems: ["C1", "C2"] },
            { name: "Knockout CP", pts: 1050, lead: "Tyson", mems: ["Box1", "Box2"] },
            { name: "VaBank CP", pts: 1300, lead: "Dealer", mems: ["V1", "V2"] }
        ];

        function createCPItem(cp, color, rank) {
            let rankClass = (rank === 0) ? "rank-1" : "";
            const badge = rank < 3 ? `<span style="color:var(--gold); font-weight:bold; margin-right:10px;">#${rank+1}</span>` : "";

            const membersHTML = [cp.lead, ...cp.mems].map((m, i) => `
                <div class="member-item">
                    <button class="member-btn" onclick="this.parentElement.classList.toggle('active')">
                        <span>${i === 0 ? '👑 ' : ''}${m}</span><small>ATTENDANCE ▼</small>
                    </button>
                    <div class="stats-area">
                        <div class="stat-grid">${bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('')}</div>
                    </div>
                </div>`).join('');

            return `
                <div class="cp-box ${rankClass}">
                    <button class="cp-btn" onclick="this.parentElement.classList.toggle('active')">
                        <span>${badge}<span style="color:var(${color}); font-weight:bold;">${cp.name}</span></span>
                        <span class="points-tag">${cp.pts} PTS</span>
                    </button>
                    <div class="member-list">${membersHTML}</div>
                </div>`;
        }

        const render = (data, id, col) => {
            const sorted = [...data].sort((a,b) => b.pts - a.pts);
            document.getElementById(id).innerHTML = sorted.map((cp, i) => createCPItem(cp, col, i)).join('');
        };

        render(noldorData, 'noldor-list', '--noldor-sky');
        render(krimData, 'krim-list', '--krim-red');

        // Distribution Archive Setup
        const allEntities = ["NIKLAUS", "TSAKNORRIS", ...noldorData.map(c=>c.name), ...krimData.map(c=>c.name)];
        document.getElementById('epic-dist-list').innerHTML = allEntities.map(n => 
            `<div style="padding:18px; border-bottom:1px solid rgba(255,255,255,0.05);"><b style="color:var(--gold)">${n}</b><br><span style="color:#555; font-size:0.75rem;">No rewards found in current cycle.</span></div>`
        ).join('');
    </script>
</body>
</html>
