<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --noldor-sky: #00d9ff;
            --krim-red: #ff3333;
            --bg-overlay: rgba(10, 12, 15, 0.98);
            --panel-bg: rgba(15, 18, 22, 1);
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background: #0a0c0f url('https://images.alphacoders.com/133/1335334.png') no-repeat center center fixed; 
            background-size: cover; color: #eee; margin: 0; padding: 20px;
        }

        /* HEADER & LOGOS */
        .top-header { text-align: center; margin-bottom: 30px; }
        .ally-logo { width: 130px; height: 130px; border: 3px solid var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); margin-bottom: 10px; }
        .ally-title { font-family: 'Cinzel'; font-size: 2.5rem; color: var(--gold); display: block; letter-spacing: 5px; }
        
        .leaders-row { display: flex; justify-content: center; gap: 40px; margin-top: 25px; flex-wrap: wrap; }
        .leader-card { text-align: center; width: 180px; }
        .leader-img { width: 140px; height: 140px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .leader-name { font-family: 'Cinzel'; font-size: 1.6rem; color: #fff; display: block; margin-top: 10px; }

        .main-wrapper { display: flex; gap: 20px; max-width: 1600px; margin: 0 auto; align-items: flex-start; }

        /* DASHBOARD & COLUMNS */
        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex-grow: 1; }
        .clan-column { background: var(--panel-bg); height: 600px; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 5px; }
        .column-header { padding: 15px; text-align: center; font-family: 'Cinzel'; font-size: 1.1rem; border-bottom: 1px solid #333; }
        
        .noldor-col { border-color: var(--noldor-sky); }
        .noldor-col .column-header { color: var(--noldor-sky); background: rgba(0, 217, 255, 0.05); }
        .krim-col { border-color: var(--krim-red); }
        .krim-col .column-header { color: var(--krim-red); background: rgba(255, 51, 51, 0.05); }

        .scroll-area { overflow-y: auto; padding: 10px; flex-grow: 1; scrollbar-width: thin; }

        /* NESTED MENU STRUCTURE */
        .cp-box { margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.4); }
        .cp-btn { width: 100%; background: none; border: none; padding: 12px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; font-family: 'Cinzel'; font-size: 0.9rem; }
        
        .member-list { display: none; background: rgba(20,20,20,0.8); border-top: 1px solid #222; }
        .member-item { border-bottom: 1px solid #111; }
        .member-btn { width: 100%; background: none; border: none; padding: 8px 20px; color: #ccc; text-align: left; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.8rem; }
        
        .stats-area { display: none; background: #000; padding: 10px; border-top: 1px solid var(--gold); }
        
        /* OPEN STATES */
        .cp-box.active > .member-list { display: block; }
        .member-item.active > .stats-area { display: block; }

        /* STATS GRID */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .stat-box { background: #111; padding: 5px; text-align: center; border: 1px solid #222; font-size: 0.65rem; }
        .stat-name { display: block; color: var(--gold); font-weight: bold; }

        /* SIDEBAR LOOT LOG */
        .mini-dist { width: 260px; background: var(--panel-bg); border: 1px solid var(--gold); height: 600px; display: flex; flex-direction: column; }
        .dist-header { background: #221a00; color: var(--gold); padding: 12px; text-align: center; font-family: 'Cinzel'; border-bottom: 1px solid var(--gold); }
        .dist-entry { padding: 10px; border-bottom: 1px solid #333; font-size: 0.75rem; }

        @media (max-width: 1100px) { .main-wrapper { flex-direction: column; } .mini-dist { width: 100%; height: 300px; } }
    </style>
</head>
<body>

    <div class="top-header">
        <img src="https://via.placeholder.com/130/000000/d4af37?text=BM" alt="Alliance Logo" class="ally-logo">
        <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
        
        <div class="leaders-row">
            <div class="leader-card">
                <img src="https://via.placeholder.com/140/222/fff?text=NIKLAUS" class="leader-img">
                <span class="leader-name">NIKLAUS</span>
                <small style="color:var(--gold)">ALLY LEADER</small>
            </div>
            <div class="leader-card">
                <img src="https://via.placeholder.com/140/111/fff?text=TSAK" class="leader-img">
                <span class="leader-name">TSAKNORRIS</span>
                <small style="color:var(--gold)">SHOTCALLER</small>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="dashboard-container">
            <div class="clan-column noldor-col">
                <div class="column-header">NOLDOR CLAN</div>
                <div class="scroll-area" id="noldor-list"></div>
            </div>
            <div class="clan-column krim-col">
                <div class="column-header">KRIMINALIDES MAIN</div>
                <div class="scroll-area" id="krim-list"></div>
            </div>
        </div>

        <div class="mini-dist">
            <div class="dist-header">LOOT HISTORY</div>
            <div class="scroll-area" id="epic-dist-list"></div>
        </div>
    </div>

    <script>
        const bosses = ["VAL", "ANT", "BAI", "FRI", "ZAK", "ORF", "AQ", "CORE", "SIEGE"];
        const noldorCPs = [
            { name: "Noldor Archer", leader: "Artemis", members: ["Legolas", "Sylvanas", "Robin"] },
            { name: "Noldor Tank", leader: "Aegis", members: ["Shield", "Wall", "Fortress"] },
            { name: "Brazilians CP", leader: "Ronaldo", members: ["Neymar", "Pele", "Kaka"] }
            // Πρόσθεσε εδώ τα υπόλοιπα...
        ];
        const krimCPs = [
            { name: "Hattrick CP", leader: "Captain", members: ["Striker", "Goalie", "Mid"] },
            { name: "55 Room CP", leader: "Master55", members: ["P1", "P2", "P3"] }
        ];

        function createStatsHTML() {
            return `<div class="stat-grid">${bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('')}</div>`;
        }

        function createCPItem(cp, color) {
            const memberHTML = [cp.leader, ...cp.members].map((m, i) => `
                <div class="member-item">
                    <button class="member-btn" onclick="toggleElement(this)">
                        <span>${i === 0 ? '👑 ' : ''}${m}</span>
                        <small>STATS ▼</small>
                    </button>
                    <div class="stats-area">${createStatsHTML()}</div>
                </div>
            `).join('');

            return `
                <div class="cp-box">
                    <button class="cp-btn" onclick="toggleElement(this)">
                        <span style="color:var(${color})">${cp.name}</span>
                        <small>ROSTER ▼</small>
                    </button>
                    <div class="member-list">${memberHTML}</div>
                </div>`;
        }

        function toggleElement(btn) {
            btn.parentElement.classList.toggle('active');
        }

        // Render Lists
        document.getElementById('noldor-list').innerHTML = noldorCPs.map(cp => createCPItem(cp, '--noldor-sky')).join('');
        document.getElementById('krim-list').innerHTML = krimCPs.map(cp => createCPItem(cp, '--krim-red')).join('');
        
        // Render Loot Log (All CPs + Callers)
        const allNames = ["NIKLAUS", "TSAKNORRIS", ...noldorCPs.map(c=>c.name), ...krimCPs.map(c=>c.name)];
        document.getElementById('epic-dist-list').innerHTML = allNames.map(name => `
            <div class="dist-entry">
                <b style="color:var(--gold)">${name}</b><br>
                <span style="color:#777">No current loots recorded</span>
            </div>
        `).join('');
    </script>
</body>
</html>
