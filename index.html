<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37; --silver: #c0c0c0; --bronze: #cd7f32;
            --noldor-sky: #00d9ff; --krim-red: #ff3333;
            --bg-overlay: rgba(10, 12, 15, 0.94); 
            --panel-bg: rgba(15, 18, 22, 0.98);
        }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Open Sans', sans-serif; 
            background: #0a0c0f url('https://i.ibb.co/1GmpSyxZ/BACKGROUND.jpg') no-repeat center center fixed; 
            background-size: cover; color: #eee; margin: 0; padding: 0;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-overlay); z-index: -1; }

        .page-section { min-height: 100vh; padding: 20px; box-sizing: border-box; position: relative; }
        .server-time { position: absolute; top: 20px; right: 40px; color: var(--gold); font-family: 'Cinzel'; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 5px; background: rgba(0,0,0,0.5); }

        .top-header { text-align: center; margin-bottom: 25px; }
        .ally-logo { width: 130px; height: 130px; object-fit: contain; filter: drop-shadow(0 0 15px var(--gold)); }
        .ally-title { font-family: 'Cinzel Decorative', cursive; font-size: 2.2rem; color: var(--gold); display: block; }
        
        .leaders-row { display: flex; justify-content: center; gap: 50px; margin-top: 15px; }
        .leader-card { text-align: center; cursor: pointer; }
        .img-frame { width: 105px; height: 105px; margin: 0 auto; background: #000; border: 2px solid var(--gold); border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .leader-img { width: 100%; height: 100%; object-fit: contain; }
        .leader-label { color: var(--gold); font-size: 0.75rem; letter-spacing: 1px; display: block; margin-top: 5px; }
        
        .main-wrapper { display: flex; gap: 15px; max-width: 1750px; margin: 0 auto; }
        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex-grow: 1; }
        
        .clan-column { background: var(--panel-bg); height: 720px; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 8px; border-top: 3px solid var(--gold); }
        .column-header { padding: 15px; text-align: center; font-family: 'Cinzel'; font-size: 1.1rem; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .clan-mini-logo { width: 35px; height: 35px; object-fit: contain; }

        .scroll-area { overflow-y: auto; padding: 8px; flex-grow: 1; }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--gold); }

        /* CP & MEMBERS */
        .cp-box { margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.4); border-radius: 4px; }
        .rank-1 { border-color: var(--gold); }
        .cp-btn { width: 100%; background: none; border: none; padding: 10px 12px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.85rem; align-items: center; }
        .points-tag { color: var(--gold); font-weight: bold; border: 1px solid var(--gold); padding: 1px 6px; border-radius: 3px; font-size: 0.75rem; }

        .member-list { display: none; background: rgba(0,0,0,0.6); border-top: 1px solid #222; }
        .active > .member-list { display: block; }
        .member-btn { width: 100%; background: none; border: none; padding: 8px 15px; color: #ccc; text-align: left; cursor: pointer; font-size: 0.8rem; display: flex; justify-content: space-between; border-bottom: 1px solid #111; }
        
        .stats-area { display: none; background: #000; padding: 10px; border: 1px solid var(--gold); border-radius: 5px; margin: 5px; }
        .active-member > .stats-area { display: block; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
        .stat-box { background: #111; padding: 4px; text-align: center; border: 1px solid #222; font-size: 0.6rem; }
        .stat-name { display: block; color: var(--gold); font-weight: bold; }

        .mini-dist { width: 320px; background: var(--panel-bg); border: 1px solid var(--gold); height: 720px; border-radius: 8px; display: flex; flex-direction: column; }
        .dist-header { background: #1a1400; color: var(--gold); padding: 12px; text-align: center; font-family: 'Cinzel'; border-bottom: 1px solid var(--gold); }
        .archive-search { background: #000; border: none; border-bottom: 1px solid #333; color: #fff; padding: 10px; width: 100%; box-sizing: border-box; font-size: 0.75rem; outline: none; }
        .dist-trigger { width: 100%; padding: 10px; background: none; border: none; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.75rem; border-bottom: 1px solid #222; }
        .loot-detail { display: none; background: rgba(0,0,0,0.8); padding: 8px; font-size: 0.75rem; border-left: 2px solid var(--gold); }
        .active-dist > .loot-detail { display: block; }

        .admin-panel { max-width: 1750px; margin: 20px auto; background: rgba(20,20,20,0.9); padding: 15px; border-radius: 8px; border: 1px dashed var(--gold); display: flex; gap: 10px; align-items: center; justify-content: center; }
        .admin-panel select, .admin-panel button { padding: 8px; border-radius: 4px; background: #000; color: #fff; border: 1px solid #444; }

        /* SECTION 2 PRICES */
        .epic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; max-width: 1400px; margin: 0 auto; }
        .epic-card { background: var(--panel-bg); border: 1px solid #333; padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 15px; border-left: 3px solid var(--gold); }
        .epic-img { width: 45px; height: 45px; object-fit: contain; filter: drop-shadow(0 0 5px var(--gold)); }
        .epic-info h4 { margin: 0; font-family: 'Cinzel'; color: var(--gold); font-size: 0.9rem; }
        .epic-info p { margin: 3px 0 0; font-weight: bold; color: #fff; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="page-section" id="top">
        <div class="server-time" id="clock">SERVER TIME: 00:00:00</div>
        
        <div class="top-header">
            <img src="https://i.ibb.co/1fyDHTJp/alliance-logo.png" class="ally-logo">
            <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
            <div class="leaders-row">
                <div class="leader-card">
                    <div class="img-frame"><img src="https://i.ibb.co/5X3NDQFR/niklaus.png" class="leader-img"></div>
                    <span style="font-family:'Cinzel';">NIKLAUS</span>
                    <span class="leader-label">ALLY LEADER</span>
                </div>
                <div class="leader-card">
                    <div class="img-frame"><img src="https://i.ibb.co/xSVgzBPB/tsaknorris.png" class="leader-img"></div>
                    <span style="font-family:'Cinzel';">TSAKNORRIS</span>
                    <span class="leader-label">SHOTCALLER</span>
                </div>
            </div>
        </div>

        <div class="main-wrapper">
            <div class="dashboard-container">
                <div class="clan-column">
                    <div class="column-header" style="color:var(--noldor-sky)">
                        <img src="https://i.ibb.co/8LvFNQkC/noldor.png" class="clan-mini-logo"> NOLDOR CLAN
                    </div>
                    <div class="scroll-area" id="noldor-list"></div>
                </div>
                <div class="clan-column">
                    <div class="column-header" style="color:var(--krim-red)">
                        <img src="https://i.ibb.co/VYMZjzYr/kriminalides.png" class="clan-mini-logo"> KRIMINALIDES MAIN
                    </div>
                    <div class="scroll-area" id="krim-list"></div>
                </div>
            </div>
            <div class="mini-dist">
                <div class="dist-header">LOOT ARCHIVE</div>
                <input type="text" class="archive-search" id="searchBox" onkeyup="filterArchive()" placeholder="Search CP...">
                <div class="scroll-area" id="loot-list"></div>
            </div>
        </div>

        <div class="admin-panel">
            <strong style="color:var(--gold)">DEDUCT POINTS:</strong>
            <select id="sel-cp"></select>
            <select id="sel-jewel">
                <option value="none">-- Select Epic --</option>
                <option value="Core Ring|25">Core Ring (25)</option>
                <option value="Orfen Earring|75">Orfen Earring (75)</option>
                <option value="Queen Ant Ring|150">Queen Ant (150)</option>
                <option value="Zaken Earring|175">Zaken Earring (175)</option>
                <option value="Frintezza Neck|225">Frintezza Neck (225)</option>
                <option value="Baium Ring|950">Baium Ring (950)</option>
                <option value="Antharas Earring|1100">Antharas Earring (1100)</option>
                <option value="Valakas Neck|3100">Valakas Neck (3100)</option>
            </select>
            <button onclick="applyLoot()" style="background:var(--gold); color:#000; cursor:pointer; border:none; font-weight:bold;">CONFIRM</button>
        </div>

        <div style="text-align: center; margin-top: 10px;">
            <a href="#bottom" style="color:var(--gold); text-decoration: none; font-family: 'Cinzel'; font-size: 0.8rem;">SCROLL DOWN FOR PRICES ▼</a>
        </div>
    </div>

    <div class="page-section" id="bottom" style="background: rgba(0,0,0,0.5);">
        <h2 style="font-family:'Cinzel Decorative'; color:var(--gold); text-align:center; margin-bottom: 40px;">EPIC JEWELS PRICES</h2>
        <div class="epic-grid" id="prices-grid"></div>
        <div style="text-align: center; margin-top: 60px;">
            <a href="#top" style="color:var(--gold); text-decoration: none; font-family: 'Cinzel';">▲ BACK TO DASHBOARD</a>
        </div>
    </div>

    <script>
        const bosses = ["VAL", "ANT", "BAI", "FRI", "ZAK", "ORF", "AQ", "CORE", "SIEGE"];
        
        // ΟΛΑ ΤΑ CP NAMES
        let noldorData = [
            { name: "Kriminalides CP", pts: 4500, lead: "DarkLord", mems: ["Slayer", "Member1", "Member2"] },
            { name: "Noldor Archer", pts: 2500, lead: "Artemis", mems: ["Legolas", "Swift"] },
            { name: "Brazilians CP", pts: 1800, lead: "Ronaldo", mems: ["Neymar"] },
            { name: "Noldor Archer 2", pts: 1200, lead: "Apollo", mems: ["ArcherX"] },
            { name: "Noldor Tank", pts: 1100, lead: "Aegis", mems: ["Shield"] },
            { name: "Outlaw CP", pts: 950, lead: "Renegade", mems: ["R1"] }
        ];

        let krimData = [
            { name: "Hattrick CP", pts: 5200, lead: "Captain", mems: ["Striker", "Goalie"] },
            { name: "55 Room CP", pts: 2100, lead: "Master55", mems: ["P1", "P2"] },
            { name: "Criminal Record CP", pts: 1900, lead: "Judge", mems: ["J1"] },
            { name: "Sinaloa CP", pts: 1600, lead: "ElChapo", mems: ["C1"] },
            { name: "Avalanche CP", pts: 1400, lead: "Snow", mems: ["Ice"] },
            { name: "VaBank CP", pts: 1300, lead: "Dealer", mems: ["V1"] },
            { name: "Dracaris CP", pts: 1250, lead: "Dany", mems: ["Drag1"] }
        ];

        let archive = {};

        function renderEverything() {
            renderList(noldorData, 'noldor-list', '--noldor-sky');
            renderList(krimData, 'krim-list', '--krim-red');
            updateArchive();
        }

        function renderList(data, id, col) {
            const sorted = [...data].sort((a,b) => b.pts - a.pts);
            document.getElementById(id).innerHTML = sorted.map((cp, i) => `
                <div class="cp-box ${i === 0 ? 'rank-1' : ''}">
                    <button class="cp-btn" onclick="this.parentElement.classList.toggle('active')">
                        <span style="color:var(${col})">#${i+1} ${cp.name}</span>
                        <span class="points-tag">${cp.pts} PTS</span>
                    </button>
                    <div class="member-list">
                        ${[cp.lead, ...cp.mems].map((m, idx) => `
                            <div class="member-container">
                                <button class="member-btn" onclick="this.parentElement.classList.toggle('active-member')">
                                    <span>${idx === 0 ? '👑 ' : ''}${m}</span><small>▼</small>
                                </button>
                                <div class="stats-area">
                                    <div class="stat-grid">${bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('')}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        const epicPrices = [
            { name: "Core Ring", pts: 25, gb: "5 GB", img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/ring-of-core.png?raw=true" },
            { name: "Orfen Earring", pts: 75, gb: "15 GB", img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/earring-orfen.png?raw=true" },
            { name: "Queen Ant Ring", pts: 150, gb: "30 GB", img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/ring-of-queen-ant.png?raw=true" },
            { name: "Zaken Earring", pts: 175, gb: "35 GB", img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/zaken-earring.png?raw=true" },
            { name: "Frintezza Neck", pts: 225, gb: "45 GB", img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/frintezza-necklace.png?raw=true" },
            { name: "Baium Ring", pts: 950, gb: "190 GB", img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/ring-of-baium.png?raw=true" },
            { name: "Antharas Earring", pts: 1100, gb: "220 GB", img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/earring-antharas.png?raw=true" },
            { name: "Valakas Necklace", pts: 3100, gb: "620 GB", img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/necklace-valakas.png?raw=true" }
        ];

        function applyLoot() {
            const cpName = document.getElementById('sel-cp').value;
            const jewelInfo = document.getElementById('sel-jewel').value.split('|');
            if(jewelInfo[0] === "none") return;
            const cost = parseInt(jewelInfo[1]);
            let cp = [...noldorData, ...krimData].find(c => c.name === cpName);
            if(cp) {
                cp.pts -= cost;
                if(!archive[cpName]) archive[cpName] = [];
                archive[cpName].unshift(`${jewelInfo[0]} (${new Date().toLocaleDateString('el-GR')})`);
                renderEverything();
                alert(`Confirmed: -${cost} PTS from ${cpName}`);
            }
        }

        function updateArchive() {
            const allNames = [...noldorData, ...krimData].map(c => c.name).sort();
            document.getElementById('sel-cp').innerHTML = allNames.map(n => `<option value="${n}">${n}</option>`).join('');
            document.getElementById('loot-list').innerHTML = allNames.map(name => `
                <div class="dist-item">
                    <button class="dist-trigger" onclick="this.parentElement.classList.toggle('active-dist')">
                        <span>${name}</span><small>${(archive[name] || []).length} items ▼</small>
                    </button>
                    <div class="loot-detail">${(archive[name] || []).map(i => `<div>💠 ${i}</div>`).join('') || 'Empty'}</div>
                </div>
            `).join('');
        }

        function filterArchive() {
            let input = document.getElementById('searchBox').value.toUpperCase();
            let items = document.getElementsByClassName('dist-item');
            for (let i = 0; i < items.length; i++) {
                items[i].style.display = items[i].innerText.toUpperCase().includes(input) ? "" : "none";
            }
        }

        // Render Prices
        document.getElementById('prices-grid').innerHTML = epicPrices.map(ep => `
            <div class="epic-card">
                <img src="${ep.img}" class="epic-img" onerror="this.src='https://via.placeholder.com/45'">
                <div class="epic-info">
                    <h4>${ep.name}</h4>
                    <p>${ep.pts} PTS <small style="color:var(--gold)">(${ep.gb})</small></p>
                </div>
            </div>
        `).join('');

        setInterval(() => { document.getElementById('clock').innerText = "SERVER TIME: " + new Date().toLocaleTimeString('el-GR'); }, 1000);
        renderEverything();
    </script>
</body>
</html>
