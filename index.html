<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Το Προφίλ μου</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 350px; }
        img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #007bff; }
        h1 { color: #333; margin: 10px 0; }
        p { color: #666; font-size: 0.9rem; }
        .links { margin-top: 20px; }
        .btn { display: block; background: #007bff; color: white; text-decoration: none; padding: 10px; margin: 5px 0; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/100" alt="Avatar">
        <h1>Το Όνομά Σου</h1>
        <p>Web Developer | Ερασιτέχνης Φωτογράφος | Gamer</p>
        <hr>
        <div class="links">
            <a href="#" class="btn">LinkedIn</a>
            <a href="#" class="btn">GitHub</a>
            <a href="mailto:email@example.com" class="btn">Επικοινωνία</a>
        </div>
    </div>

</body>
</html>
