<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --noldor-sky: #00d9ff;
            --krim-red: #ff3333;
            --bg-overlay: rgba(10, 12, 15, 0.9); 
            --panel-bg: rgba(15, 18, 22, 0.98);
            --top1: #ffd700; --top2: #c0c0c0; --top3: #cd7f32;
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background: #0a0c0f url('https://i.ibb.co/1GmpSyxZ/BACKGROUND.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: #eee; margin: 0; padding: 20px;
        }

        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-overlay); z-index: -1; 
        }

        .top-header { text-align: center; margin-bottom: 25px; }
        .ally-logo { width: 140px; height: 140px; object-fit: contain; margin-bottom: 5px; filter: drop-shadow(0 0 15px var(--gold)); }
        .ally-title { font-family: 'Cinzel Decorative', cursive; font-size: 2.2rem; color: var(--gold); display: block; text-shadow: 2px 2px 10px #000; }
        
        .leaders-row { display: flex; justify-content: center; gap: 40px; margin-top: 15px; }
        .leader-card { text-align: center; }
        .img-frame { width: 110px; height: 110px; margin: 0 auto; background: #000; border: 2px solid var(--gold); border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .leader-img { width: 100%; height: 100%; object-fit: contain; }
        .leader-name { font-family: 'Cinzel'; font-size: 1.3rem; color: #fff; display: block; margin-top: 5px; }

        .main-wrapper { display: flex; gap: 15px; max-width: 1700px; margin: 0 auto; align-items: flex-start; }

        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex-grow: 1; }
        .clan-column { background: var(--panel-bg); height: 720px; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 8px; border-top: 3px solid var(--gold); }
        .column-header { padding: 12px; text-align: center; font-family: 'Cinzel'; font-size: 1rem; border-bottom: 1px solid #222; letter-spacing: 1px; }
        
        .scroll-area { overflow-y: auto; padding: 8px; flex-grow: 1; scrollbar-width: thin; scrollbar-color: var(--gold) transparent; }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--gold); }

        .cp-box { margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.4); border-radius: 4px; }
        .rank-1 { border-color: var(--top1); box-shadow: inset 0 0 10px rgba(255,215,0,0.05); }
        .rank-2 { border-color: var(--top2); }
        .rank-3 { border-color: var(--top3); }

        .cp-btn { width: 100%; background: none; border: none; padding: 10px 12px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
        .points-tag { color: var(--gold); font-weight: bold; font-size: 0.75rem; border: 1px solid var(--gold); padding: 1px 6px; border-radius: 3px; }

        .member-list { display: none; background: rgba(0,0,0,0.6); border-top: 1px solid #222; }
        .active > .member-list { display: block; }
        
        .member-btn { width: 100%; background: none; border: none; padding: 8px 15px; color: #ccc; text-align: left; cursor: pointer; font-size: 0.8rem; display: flex; justify-content: space-between; border-bottom: 1px solid #111; }
        .stats-area { display: none; background: #000; padding: 8px; }
        .active-member > .stats-area { display: block; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
        .stat-box { background: #111; padding: 4px; text-align: center; border: 1px solid #222; font-size: 0.6rem; }
        .stat-name { display: block; color: var(--gold); font-weight: bold; }

        .mini-dist { width: 300px; background: var(--panel-bg); border: 1px solid var(--gold); height: 720px; border-radius: 8px; display: flex; flex-direction: column; }
        .dist-header { background: #1a1400; color: var(--gold); padding: 12px; text-align: center; font-family: 'Cinzel'; border-bottom: 1px solid var(--gold); font-size: 0.9rem; }
        .dist-item { border-bottom: 1px solid #222; }
        .dist-trigger { width: 100%; padding: 10px; background: none; border: none; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.75rem; }
        .loot-detail { display: none; background: rgba(0,0,0,0.5); padding: 8px; font-size: 0.7rem; color: #aaa; border-left: 2px solid var(--gold); }
        .active-dist > .loot-detail { display: block; }

        @media (max-width: 1200px) { .main-wrapper { flex-direction: column; } .mini-dist { width: 100%; } }
    </style>
</head>
<body>

    <div class="top-header">
        <img src="https://i.ibb.co/1fyDHTJp/alliance-logo.png" class="ally-logo">
        <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
        
        <div class="leaders-row">
            <div class="leader-card">
                <div class="img-frame"><img src="https://i.ibb.co/5X3NDQFR/niklaus.png" class="leader-img"></div>
                <span class="leader-name">NIKLAUS</span>
                <small style="color:var(--gold)">ALLY LEADER</small>
            </div>
            <div class="leader-card">
                <div class="img-frame">
                    <img src="https://i.ibb.co/xSVgzBPB/tsaknorris.png" class="leader-img">
                </div>
                <span class="leader-name">TSAKNORRIS</span>
                <small style="color:var(--gold)">SHOTCALLER</small>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="dashboard-container">
            <div class="clan-column">
                <div class="column-header" style="color:var(--noldor-sky)">NOLDOR CLAN</div>
                <div class="scroll-area" id="noldor-list"></div>
            </div>
            <div class="clan-column">
                <div class="column-header" style="color:var(--krim-red)">KRIMINALIDES MAIN</div>
                <div class="scroll-area" id="krim-list"></div>
            </div>
        </div>

        <div class="mini-dist">
            <div class="dist-header">LOOT ARCHIVE</div>
            <div class="scroll-area" id="epic-dist-list"></div>
        </div>
    </div>

    <script>
        const bosses = ["VAL", "ANT", "BAI", "FRI", "ZAK", "ORF", "AQ", "CORE", "SIEGE"];
        
        // ΟΛΑ ΤΑ CP NAMES ΟΠΩΣ ΗΤΑΝ ΣΤΗΝ ΑΡΧΗ
        const noldorData = [
            { name: "Kriminalides CP", pts: 1800, lead: "Boss", mems: ["Member1", "Member2"] },
            { name: "Noldor Archer", pts: 1500, lead: "Artemis", mems: ["Legolas", "Sylvanas"] },
            { name: "Brazilians CP", pts: 1350, lead: "Ronaldo", mems: ["Neymar"] },
            { name: "Noldor Archer 2", pts: 1200, lead: "Apollo", mems: ["ArcherX"] },
            { name: "Noldor Tank", pts: 1100, lead: "Aegis", mems: ["Shield"] },
            { name: "Outlaw CP", pts: 950, lead: "Renegade", mems: ["O1"] },
            { name: "Ronin CP", pts: 800, lead: "Samurai", mems: ["Katana"] },
            { name: "Brazilians 2 CP", pts: 700, lead: "Kaka", mems: ["Zico"] },
            { name: "Noldor Dummy", pts: 450, lead: "Dummy", mems: ["D1"] },
            { name: "I am Groot CP", pts: 300, lead: "Groot", mems: ["Rocket"] }
        ];

        const krimData = [
            { name: "Hattrick CP", pts: 2100, lead: "Captain", mems: ["Striker"] },
            { name: "55 Room CP", pts: 1950, lead: "Master55", mems: ["P1"] },
            { name: "Criminal Record CP", pts: 1600, lead: "Judge", mems: ["J1"] },
            { name: "Sinaloa CP", pts: 1550, lead: "ElChapo", mems: ["C1"] },
            { name: "Avalanche CP", pts: 1400, lead: "Snow", mems: ["Ice"] },
            { name: "VaBank CP", pts: 1300, lead: "Dealer", mems: ["V1"] },
            { name: "Dracaris CP", pts: 1250, lead: "Dany", mems: ["Drag1"] },
            { name: "Legion CP", pts: 1100, lead: "Cent", mems: ["S1"] },
            { name: "Knockout CP", pts: 1050, lead: "Tyson", mems: ["Box1"] },
            { name: "Gankly Crew CP", pts: 900, lead: "Ganker", mems: ["G1"] },
            { name: "Furious Wolves CP", pts: 850, lead: "Alpha", mems: ["W1"] },
            { name: "Animals CP", pts: 750, lead: "Lion", mems: ["Tiger"] }
        ];

        function createCPItem(cp, color, rank) {
            let rankClass = (rank === 0) ? "rank-1" : (rank === 1) ? "rank-2" : (rank === 2) ? "rank-3" : "";
            const membersHTML = [cp.lead, ...cp.mems].map((m, i) => `
                <div class="member-container">
                    <button class="member-btn" onclick="this.parentElement.classList.toggle('active-member')">
                        <span>${i === 0 ? '👑 ' : ''}${m}</span><small>STATS ▼</small>
                    </button>
                    <div class="stats-area">
                        <div class="stat-grid">${bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('')}</div>
                    </div>
                </div>`).join('');

            return `
                <div class="cp-box ${rankClass}">
                    <button class="cp-btn" onclick="this.parentElement.classList.toggle('active')">
                        <span style="color:var(${color}); font-weight:bold;">#${rank+1} ${cp.name}</span>
                        <span class="points-tag">${cp.pts} PTS</span>
                    </button>
                    <div class="member-list">${membersHTML}</div>
                </div>`;
        }

        const render = (data, id, col) => {
            const sorted = [...data].sort((a,b) => b.pts - a.pts);
            document.getElementById(id).innerHTML = sorted.map((cp, i) => createCPItem(cp, col, i)).join('');
        };

        render(noldorData, 'noldor-list', '--noldor-sky');
        render(krimData, 'krim-list', '--krim-red');

        // ΟΛΑ ΤΑ ΟΝΟΜΑΤΑ ΣΤΟ LOOT ARCHIVE (Sorted)
        const allEntities = ["NIKLAUS", "TSAKNORRIS", ...noldorData.map(c=>c.name), ...krimData.map(c=>c.name)].sort();
        document.getElementById('epic-dist-list').innerHTML = allEntities.map(name => `
            <div class="dist-item">
                <button class="dist-trigger" onclick="this.parentElement.classList.toggle('active-dist')">
                    <span style="color:var(--gold)">${name}</span>
                    <small>LOOT ▼</small>
                </button>
                <div class="loot-detail">No rewards found in current cycle.</div>
            </div>`).join('');
    </script>
</body>
</html>
