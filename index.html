<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --noldor-sky: #00d9ff;
            --krim-red: #ff3333;
            --bg-overlay: rgba(10, 12, 15, 0.92); 
            --panel-bg: rgba(15, 18, 22, 0.98);
            --top1: #ffd700; --top2: #c0c0c0; --top3: #cd7f32;
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            /* BACKGROUND FIX: Χρησιμοποιούμε contain ή fixed για να μη ζουμάρει */
            background: #0a0c0f url('https://i.ibb.co/CKBbgKym/background-new.jpg') no-repeat center center fixed; 
            background-size: 100% auto; /* Προσαρμογή στο πλάτος χωρίς υπερβολικό ζουμ */
            color: #eee; margin: 0; padding: 20px;
        }

        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-overlay); z-index: -1; 
        }

        .top-header { text-align: center; margin-bottom: 30px; }
        
        /* LOGO FIX: object-fit contain για να φαίνεται όλη η εικόνα */
        .ally-logo { 
            width: 150px; height: 150px; border: 2px solid var(--gold); 
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4); margin-bottom: 10px; 
            object-fit: contain; background: rgba(0,0,0,0.8); border-radius: 8px; padding: 10px;
        }
        .ally-title { font-family: 'Cinzel'; font-size: 2.5rem; color: var(--gold); display: block; letter-spacing: 5px; text-shadow: 0 0 10px #000; }
        
        .leaders-row { display: flex; justify-content: center; gap: 40px; margin-top: 20px; }
        .leader-card { text-align: center; }
        
        .leader-img { 
            width: 120px; height: 120px; border-radius: 50%; border: 3px solid #fff; 
            object-fit: contain; background: #000; padding: 5px;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }
        .leader-name { font-family: 'Cinzel'; font-size: 1.5rem; color: #fff; display: block; margin-top: 8px; }

        .main-wrapper { display: flex; gap: 20px; max-width: 1600px; margin: 0 auto; align-items: flex-start; }

        /* DASHBOARD */
        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex-grow: 1; }
        .clan-column { background: var(--panel-bg); height: 680px; display: flex; flex-direction: column; border: 1px solid #444; border-radius: 8px; }
        .column-header { padding: 15px; text-align: center; font-family: 'Cinzel'; font-size: 1.1rem; border-bottom: 1px solid #333; }
        
        .scroll-area { overflow-y: auto; padding: 10px; flex-grow: 1; scrollbar-width: thin; scrollbar-color: var(--gold) transparent; }
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* CP BOXES & TOP 3 BADGES */
        .cp-box { margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.6); border-radius: 4px; }
        .rank-1 { border: 1px solid var(--top1); box-shadow: 0 0 15px rgba(255,215,0,0.1); }
        .rank-2 { border: 1px solid var(--top2); }
        .rank-3 { border: 1px solid var(--top3); }

        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; margin-right: 10px; text-transform: uppercase; }
        .badge-1 { background: var(--top1); color: #000; box-shadow: 0 0 10px var(--top1); }
        .badge-2 { background: var(--top2); color: #000; }
        .badge-3 { background: var(--top3); color: #000; }

        .cp-btn { width: 100%; background: none; border: none; padding: 14px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .points-tag { font-family: 'Open Sans'; font-weight: 600; color: var(--gold); background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 10px; font-size: 0.8rem; }

        .member-list { display: none; background: rgba(0,0,0,0.8); padding: 5px; border-top: 1px solid #222; }
        .member-item { border-bottom: 1px solid #111; }
        .member-btn { width: 100%; background: none; border: none; padding: 10px 20px; color: #ccc; text-align: left; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.85rem; }
        
        .stats-area { display: none; background: #000; padding: 15px; border-top: 1px solid var(--gold); }
        .active > .member-list, .active > .stats-area { display: block; }

        /* STATS GRID */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .stat-box { background: #111; padding: 6px; text-align: center; border: 1px solid #222; font-size: 0.7rem; }
        .stat-name { display: block; color: var(--gold); font-weight: bold; }

        /* SIDEBAR ARCHIVE */
        .mini-dist { width: 300px; background: var(--panel-bg); border: 1px solid var(--gold); height: 680px; display: flex; flex-direction: column; border-radius: 8px; }
        .dist-header { background: #221a00; color: var(--gold); padding: 15px; text-align: center; font-family: 'Cinzel'; border-bottom: 1px solid var(--gold); }
        .dist-item { padding: 12px; border-bottom: 1px solid #222; }

        @media (max-width: 1200px) { .main-wrapper { flex-direction: column; } .mini-dist { width: 100%; } }
    </style>
</head>
<body>

    <div class="top-header">
        <img src="https://i.ibb.co/YCTxJLw/alliance-logo.png" class="ally-logo">
        <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
        
        <div class="leaders-row">
            <div class="leader-card">
                <img src="https://i.ibb.co/39kHvqVG/niklaus-logo.png" class="leader-img">
                <span class="leader-name">NIKLAUS</span>
                <small style="color:var(--gold)">ALLY LEADER</small>
            </div>
            <div class="leader-card">
                <img src="https://via.placeholder.com/120/111/fff?text=TSAK" class="leader-img">
                <span class="leader-name">TSAKNORRIS</span>
                <small style="color:var(--gold)">SHOTCALLER</small>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="dashboard-container">
            <div class="clan-column noldor-col">
                <div class="column-header" style="color:var(--noldor-sky)">NOLDOR CLAN</div>
                <div class="scroll-area" id="noldor-list"></div>
            </div>
            <div class="clan-column krim-col">
                <div class="column-header" style="color:var(--krim-red)">KRIMINALIDES MAIN</div>
                <div class="scroll-area" id="krim-list"></div>
            </div>
        </div>

        <div class="mini-dist">
            <div class="dist-header">LOOT DISTRIBUTION</div>
            <div class="scroll-area" id="epic-dist-list"></div>
        </div>
    </div>

    <script>
        const bosses = ["VAL", "ANT", "BAI", "FRI", "ZAK", "ORF", "AQ", "CORE", "SIEGE"];
        
        const noldorData = [
            { name: "Noldor Archer", pts: 1500, lead: "Artemis", mems: ["Legolas", "Sylvanas", "Robin"] },
            { name: "Noldor Archer 2", pts: 1200, lead: "Apollo", mems: ["ArcherX", "ArcherY"] },
            { name: "Noldor Dummy", pts: 450, lead: "Dummy", mems: ["D1", "D2"] },
            { name: "Noldor Tank", pts: 1100, lead: "Aegis", mems: ["Shield", "Wall"] },
            { name: "Κriminalides CP", pts: 1800, lead: "Boss", mems: ["Member1", "Member2"] },
            { name: "Outlaw CP", pts: 950, lead: "Renegade", mems: ["O1", "O2"] },
            { name: "Ronin CP", pts: 800, lead: "Samurai", mems: ["Katana", "Bushido"] },
            { name: "Brazilians CP", pts: 1350, lead: "Ronaldo", mems: ["Neymar", "Pele"] },
            { name: "Brazilians 2 CP", pts: 700, lead: "Kaka", mems: ["Cafu", "Zico"] },
            { name: "I am Groot CP", pts: 300, lead: "Groot", mems: ["Rocket", "StarLord"] }
        ];

        const krimData = [
            { name: "Hattrick CP", pts: 2100, lead: "Captain", mems: ["Striker", "Goalie"] },
            { name: "55 Room CP", pts: 1950, lead: "Master55", mems: ["P1", "P2"] },
            { name: "Legion CP", pts: 1100, lead: "Cent", mems: ["S1", "S2"] },
            { name: "Criminal Record CP", pts: 1600, lead: "Judge", mems: ["J1", "J2"] },
            { name: "Avalanche CP", pts: 1400, lead: "Snow", mems: ["Ice", "Frost"] },
            { name: "Gankly Crew CP", pts: 900, lead: "Ganker", mems: ["G1", "G2"] },
            { name: "Furious Wolves CP", pts: 850, lead: "Alpha", mems: ["W1", "W2"] },
            { name: "Animals CP", pts: 750, lead: "Lion", mems: ["Tiger", "Bear"] },
            { name: "Dracaris CP", pts: 1250, lead: "Dany", mems: ["Drag1", "Drag2"] },
            { name: "Sinaloa CP", pts: 1550, lead: "ElChapo", mems: ["C1", "C2"] },
            { name: "Knockout CP", pts: 1050, lead: "Tyson", mems: ["Box1", "Box2"] },
            { name: "VaBank CP", pts: 1300, lead: "Dealer", mems: ["V1", "V2"] }
        ];

        function createCPItem(cp, color, rank) {
            let rankClass = (rank === 0) ? "rank-1" : (rank === 1) ? "rank-2" : (rank === 2) ? "rank-3" : "";
            let badgeHTML = "";
            if(rank === 0) badgeHTML = '<span class="badge badge-1">TOP 1</span>';
            if(rank === 1) badgeHTML = '<span class="badge badge-2">TOP 2</span>';
            if(rank === 2) badgeHTML = '<span class="badge badge-3">TOP 3</span>';

            const membersHTML = [cp.lead, ...cp.mems].map((m, i) => `
                <div class="member-item">
                    <button class="member-btn" onclick="this.parentElement.classList.toggle('active')">
                        <span>${i === 0 ? '👑 ' : ''}${m}</span><small>STATS ▼</small>
                    </button>
                    <div class="stats-area">
                        <div class="stat-grid">${bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('')}</div>
                    </div>
                </div>`).join('');

            return `
                <div class="cp-box ${rankClass}">
                    <button class="cp-btn" onclick="this.parentElement.classList.toggle('active')">
                        <span>${badgeHTML}<span style="color:var(${color}); font-weight:bold;">${cp.name}</span></span>
                        <span class="points-tag">${cp.pts} PTS</span>
                    </button>
                    <div class="member-list">${membersHTML}</div>
                </div>`;
        }

        const render = (data, id, col) => {
            const sorted = [...data].sort((a,b) => b.pts - a.pts);
            document.getElementById(id).innerHTML = sorted.map((cp, i) => createCPItem(cp, col, i)).join('');
        };

        render(noldorData, 'noldor-list', '--noldor-sky');
        render(krimData, 'krim-list', '--krim-red');

        // Distribution Archive (Simple List for now)
        const allNames = ["NIKLAUS", "TSAKNORRIS", ...noldorData.map(c=>c.name), ...krimData.map(c=>c.name)];
        document.getElementById('epic-dist-list').innerHTML = allNames.map(n => 
            `<div class="dist-item"><b style="color:var(--gold)">${n}</b><br><small style="color:#555">No items recorded</small></div>`
        ).join('');
    </script>
</body>
</html>
