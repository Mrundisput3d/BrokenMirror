<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37; --silver: #c0c0c0; --bronze: #cd7f32;
            --noldor-sky: #00d9ff; --krim-red: #ff3333;
            --bg-overlay: rgba(10, 12, 15, 0.96); 
        }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Open Sans', sans-serif; 
            background: #0a0c0f url('https://i.ibb.co/1GmpSyxZ/BACKGROUND.jpg') no-repeat center center fixed; 
            background-size: cover; color: #eee; margin: 0; padding: 0; overflow-x: hidden;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-overlay); z-index: -1; }

        .page-section { min-height: 100vh; padding: 20px; box-sizing: border-box; position: relative; }
        .server-time { position: absolute; top: 20px; right: 40px; color: var(--gold); font-family: 'Cinzel'; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 5px; background: rgba(0,0,0,0.5); }

        .top-header { text-align: center; margin-bottom: 30px; }
        .ally-logo { width: 110px; height: 110px; filter: drop-shadow(0 0 15px var(--gold)); }
        .ally-title { font-family: 'Cinzel Decorative', cursive; font-size: 2.2rem; color: var(--gold); display: block; }
        
        /* CALLER POPUP EFFECT */
        .leaders-row { display: flex; justify-content: center; gap: 60px; margin-top: 20px; }
        .leader-card { text-align: center; cursor: pointer; transition: transform 0.3s; }
        .leader-card:hover { transform: scale(1.1); }
        .img-frame { width: 110px; height: 110px; margin: 0 auto; background: #000; border: 2px solid var(--gold); border-radius: 50%; overflow: hidden; }
        .leader-img { width: 100%; height: 100%; object-fit: contain; }
        .leader-label { color: var(--gold); font-size: 0.7rem; letter-spacing: 1px; display: block; margin-top: 8px; font-family: 'Cinzel'; }

        /* CENTERED MODAL */
        #caller-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; background: #0f1216; border: 2px solid var(--gold); border-radius: 15px;
            padding: 25px; z-index: 9999; box-shadow: 0 0 50px #000; text-align: center;
        }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9998; }

        /* DASHBOARD LAYOUT */
        .main-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .clan-column { background: rgba(15, 18, 22, 0.95); height: 700px; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 10px; border-top: 4px solid var(--gold); }
        .column-header { padding: 15px; text-align: center; font-family: 'Cinzel'; font-size: 1.1rem; border-bottom: 1px solid #222; color: var(--gold); }

        .scroll-area { overflow-y: auto; padding: 10px; flex-grow: 1; }
        .scroll-area::-webkit-scrollbar { width: 5px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--gold); }

        /* CP BOXES */
        .cp-box { margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.3); border-radius: 6px; }
        .cp-btn { width: 100%; background: none; border: none; padding: 12px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .points-tag { color: var(--gold); font-weight: bold; border: 1px solid var(--gold); padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }

        .member-list { display: none; background: rgba(0,0,0,0.5); border-top: 1px solid #222; padding: 10px; }
        .active > .member-list { display: block; }

        /* LOOT INSIDE CP */
        .loot-history-btn { width: 100%; padding: 8px; margin-top: 10px; background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'Cinzel'; font-size: 0.7rem; border-radius: 4px; }
        .loot-display { margin-top: 10px; font-size: 0.8rem; color: #aaa; display: none; border-left: 2px solid var(--gold); padding-left: 10px; }

        /* ADMIN BAR */
        .admin-panel { max-width: 1400px; margin: 20px auto; background: #111; padding: 15px; border-radius: 8px; border: 1px dashed var(--gold); display: flex; gap: 15px; align-items: center; justify-content: center; }
        .admin-panel select, .admin-panel button { padding: 10px; border-radius: 4px; background: #000; color: #fff; border: 1px solid #444; }

        /* BOSS GRID */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 15px; }
        .stat-box { background: #1a1e23; padding: 8px; border: 1px solid #333; border-radius: 4px; }
        .stat-name { display: block; color: var(--gold); font-size: 0.65rem; font-weight: bold; }
        .stat-val { font-size: 1rem; color: #fff; }

        /* SECTION 2 & 3 */
        .section-title { font-family: 'Cinzel'; color: var(--gold); text-align: center; margin: 50px 0 20px; font-size: 1.8rem; }
        .epic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; max-width: 1400px; margin: 0 auto; }
        .epic-card { background: rgba(15, 18, 22, 0.9); border: 1px solid #333; padding: 15px; border-radius: 8px; display: flex; align-items: center; gap: 15px; }
        .epic-img { width: 50px; height: 50px; }
    </style>
</head>
<body>

    <div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
    <div id="caller-modal">
        <img id="modal-img" src="" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--gold); margin-bottom:10px;">
        <h2 id="modal-name" style="font-family:'Cinzel'; color:var(--gold); margin:5px 0;"></h2>
        <p id="modal-title" style="color:#888; font-size:0.8rem; margin-bottom:20px;"></p>
        <div class="stat-grid" id="modal-stats"></div>
        <button onclick="closeModal()" style="margin-top:20px; background:none; border:1px solid #444; color:#fff; padding:8px 20px; cursor:pointer;">CLOSE</button>
    </div>

    <div class="page-section">
        <div class="server-time" id="clock">SERVER TIME: 00:00:00</div>
        
        <div class="top-header">
            <img src="https://i.ibb.co/1fyDHTJp/alliance-logo.png" class="ally-logo">
            <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
            <div class="leaders-row">
                <div class="leader-card" onclick="openCaller('NIKLAUS', 'ALLY LEADER', 'https://i.ibb.co/5X3NDQFR/niklaus.png')">
                    <div class="img-frame"><img src="https://i.ibb.co/5X3NDQFR/niklaus.png" class="leader-img"></div>
                    <span class="leader-label">NIKLAUS</span>
                </div>
                <div class="leader-card" onclick="openCaller('TSAKNORRIS', 'SHOTCALLER', 'https://i.ibb.co/xSVgzBPB/tsaknorris.png')">
                    <div class="img-frame"><img src="https://i.ibb.co/xSVgzBPB/tsaknorris.png" class="leader-img"></div>
                    <span class="leader-label">TSAKNORRIS</span>
                </div>
            </div>
        </div>

        <div class="main-wrapper">
            <div class="clan-column">
                <div class="column-header">NOLDOR CLAN — CPs</div>
                <div class="scroll-area" id="noldor-list"></div>
            </div>
            <div class="clan-column">
                <div class="column-header" style="color:var(--krim-red)">KRIMINALIDES CLAN — CPs</div>
                <div class="scroll-area" id="krim-list"></div>
            </div>
        </div>

        <div class="admin-panel">
            <strong style="color:var(--gold)">LOOT SETTLEMENT:</strong>
            <select id="sel-cp"></select>
            <select id="sel-jewel">
                <option value="none">-- Select Epic --</option>
                <option value="Core Ring|25">Core Ring (25)</option>
                <option value="Orfen Earring|75">Orfen Earring (75)</option>
                <option value="Queen Ant Ring|150">Queen Ant (150)</option>
                <option value="Zaken Earring|175">Zaken Earring (175)</option>
                <option value="Frintezza Neck|225">Frintezza Neck (225)</option>
                <option value="Baium Ring|950">Baium Ring (950)</option>
                <option value="Antharas Earring|1100">Antharas Earring (1100)</option>
                <option value="Valakas Necklace|3100">Valakas Necklace (3100)</option>
            </select>
            <button onclick="applyLoot()" style="background:var(--gold); color:#000; font-weight:bold; cursor:pointer; border:none;">CONFIRM DEDUCTION</button>
        </div>
    </div>

    <div class="page-section" id="bottom" style="background: rgba(0,0,0,0.4);">
        <h2 class="section-title">EPIC JEWELS PRICES</h2>
        <div class="epic-grid" id="prices-grid"></div>
    </div>

    <script>
        const bosses = ["VAL", "ANT", "BAI", "FRI", "ZAK", "ORF", "AQ", "CORE", "SIEGE"];
        let archive = {};

        const noldorCPs = ["Noldor Clan", "Noldor Archer", "Noldor Archer 2", "Noldor Dummy", "Noldor Tank", "Kriminalides CP", "Outlaw CP", "Ronin CP", "Brazilians CP", "Brazilians 2 CP", "I am Groot CP"];
        const krimCPs = ["Hattrick CP", "55 Room CP", "Legion CP", "Criminal Record CP", "Avalanche CP", "Gankly Crew CP", "Furious Wolves CP", "Animals CP", "Dracaris CP", "Sinaloa CP", "Knockout CP", "VaBank CP"];

        let noldorData = noldorCPs.map(name => ({ name, pts: 2000, lead: "CP Leader" }));
        let krimData = krimCPs.map(name => ({ name, pts: 2000, lead: "CP Leader" }));

        function renderAll() {
            const render = (data, elId) => {
                document.getElementById(elId).innerHTML = data.sort((a,b) => b.pts - a.pts).map(cp => `
                    <div class="cp-box">
                        <button class="cp-btn" onclick="this.parentElement.classList.toggle('active')">
                            <span>${cp.name}</span>
                            <span class="points-tag">${cp.pts} PTS</span>
                        </button>
                        <div class="member-list">
                            <div style="color:var(--gold); font-size:0.8rem;">👑 Leader: ${cp.lead}</div>
                            <button class="loot-history-btn" onclick="toggleLoot('${cp.name}')">VIEW LOOT HISTORY</button>
                            <div class="loot-display" id="loot-${cp.name.replace(/\s+/g, '')}">
                                ${archive[cp.name] ? archive[cp.name].join('<br>') : 'No items yet.'}
                            </div>
                        </div>
                    </div>
                `).join('');
            };
            render(noldorData, 'noldor-list');
            render(krimData, 'krim-list');

            const allNames = [...noldorCPs, ...krimCPs].sort();
            document.getElementById('sel-cp').innerHTML = allNames.map(n => `<option value="${n}">${n}</option>`).join('');
        }

        function toggleLoot(name) {
            const el = document.getElementById('loot-' + name.replace(/\s+/g, ''));
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        function openCaller(name, title, img) {
            document.getElementById('modal-name').innerText = name;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-stats').innerHTML = bosses.map(b => `
                <div class="stat-box"><span class="stat-name">${b}</span><span class="stat-val">${Math.floor(Math.random()*25)}</span></div>
            `).join('');
            document.getElementById('caller-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('caller-modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function applyLoot() {
            const cpName = document.getElementById('sel-cp').value;
            const jewel = document.getElementById('sel-jewel').value.split('|');
            if(jewel[0] === 'none') return;

            let cp = [...noldorData, ...krimData].find(c => c.name === cpName);
            if(cp) {
                cp.pts -= parseInt(jewel[1]);
                if(!archive[cpName]) archive[cpName] = [];
                archive[cpName].unshift(`💠 ${jewel[0]} (${new Date().toLocaleDateString('el-GR')})`);
                renderAll();
                alert('Loot recorded successfully!');
            }
        }

        // Prices
        const epics = [
            { name: "Core Ring", pts: 25, img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/ring-of-core.png?raw=true" },
            { name: "Orfen Earring", pts: 75, img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/earring-orfen.png?raw=true" },
            { name: "Queen Ant Ring", pts: 150, img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/ring-of-queen-ant.png?raw=true" },
            { name: "Zaken Earring", pts: 175, img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/zaken-earring.png?raw=true" },
            { name: "Frintezza Neck", pts: 225, img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/frintezza-necklace.png?raw=true" },
            { name: "Baium Ring", pts: 950, img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/ring-of-baium.png?raw=true" },
            { name: "Antharas Earring", pts: 1100, img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/earring-antharas.png?raw=true" },
            { name: "Valakas Necklace", pts: 3100, img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/necklace-valakas.png?raw=true" }
        ];

        document.getElementById('prices-grid').innerHTML = epics.map(e => `
            <div class="epic-card">
                <img src="${e.img}" class="epic-img">
                <div>
                    <h4 style="margin:0; color:var(--gold); font-family:Cinzel;">${e.name}</h4>
                    <p style="margin:5px 0 0; font-weight:bold;">${e.pts} PTS</p>
                </div>
            </div>
        `).join('');

        setInterval(() => { document.getElementById('clock').innerText = "SERVER TIME: " + new Date().toLocaleTimeString('el-GR'); }, 1000);
        renderAll();
    </script>
</body>
</html>
