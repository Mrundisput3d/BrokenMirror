<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --noldor-sky: #00d9ff; --krim-red: #ff3333; --bg-overlay: rgba(10, 12, 15, 0.96); }
        html { scroll-behavior: smooth; }
        body { font-family: 'Open Sans', sans-serif; background: #0a0c0f url('https://i.ibb.co/1GmpSyxZ/BACKGROUND.jpg') no-repeat center center fixed; background-size: cover; color: #eee; margin: 0; padding: 0; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-overlay); z-index: -1; }

        .floating-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: rgba(0,0,0,0.9); padding: 10px 25px; border-radius: 30px; border: 1px solid var(--gold); z-index: 10000; }
        .nav-btn { color: var(--gold); text-decoration: none; font-family: 'Cinzel'; font-size: 0.8rem; transition: 0.3s; }
        
        .page-section { min-height: 100vh; padding: 40px 20px; box-sizing: border-box; position: relative; border-bottom: 1px solid rgba(212,175,55,0.1); }
        .server-time { position: absolute; top: 20px; right: 40px; color: var(--gold); font-family: 'Cinzel'; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 5px; font-size: 0.8rem; }

        /* ROSTER */
        .main-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; max-width: 1500px; margin: 0 auto; }
        .clan-column { background: rgba(15, 18, 22, 0.95); height: 550px; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 10px; border-top: 4px solid var(--gold); }
        .column-header { padding: 15px; text-align: center; font-family: 'Cinzel'; font-size: 1.1rem; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .scroll-area { overflow-y: auto; padding: 10px; flex-grow: 1; }
        
        .cp-box { margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.3); border-radius: 6px; overflow: hidden; }
        .active > .member-list { display: block; }
        .member-list { display: none; background: rgba(0,0,0,0.5); padding: 5px 0; }
        .cp-btn { width: 100%; background: none; border: none; padding: 12px 15px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
        .points-tag { border: 1px solid var(--gold); padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; color: var(--gold); }

        /* MARKETPLACE */
        .marketplace-wrapper { display: flex; flex-wrap: wrap; gap: 30px; max-width: 1400px; margin: 0 auto; }
        .epic-table-container { background: rgba(10, 12, 15, 0.9); border: 2px solid var(--gold); border-radius: 10px; padding: 15px; flex: 1; }
        .epic-table { width: 100%; border-collapse: collapse; }
        .mini-icon { width: 24px; height: 24px; vertical-align: middle; margin-right: 10px; }

        /* PVP VIDEOS BUTTON */
        .video-btn { background: linear-gradient(45deg, #8b0000, #ff0000); color: white; border: 2px solid var(--gold); padding: 20px 50px; font-family: 'Cinzel'; font-size: 1.5rem; text-decoration: none; border-radius: 10px; display: inline-block; transition: 0.3s; box-shadow: 0 0 20px rgba(255,0,0,0.4); cursor: pointer; }
        .video-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(255,0,0,0.6); }
    </style>
</head>
<body>
    <nav class="floating-nav">
        <a href="#section1" class="nav-btn">ROSTER</a>
        <a href="#section2" class="nav-btn">MARKET</a>
        <a href="#section3" class="nav-btn">PVP ZONE</a>
    </nav>

    <div class="page-section" id="section1">
        <div class="server-time" id="clock">SERVER TIME: 00:00:00</div>
        <div style="text-align:center; margin-bottom:30px;">
            <img src="https://i.ibb.co/6R9q5PGv/ALLIANCE-LOGO.png" style="width:120px;">
            <h1 style="font-family:'Cinzel Decorative'; color:var(--gold);">BROKEN MIRROR ALLIANCE</h1>
        </div>
        <div class="main-wrapper">
            <div class="clan-column"><div class="column-header"><img src="https://i.ibb.co/8LvFNQkC/noldor.png" style="width:30px;"> NOLDOR</div><div class="scroll-area" id="noldor-list"></div></div>
            <div class="clan-column"><div class="column-header"><img src="https://i.ibb.co/VYMZjzYr/kriminalides.png" style="width:30px;"> KRIMINALIDES</div><div class="scroll-area" id="krim-list"></div></div>
        </div>
    </div>

    <div class="page-section" id="section2">
        <h2 style="font-family:'Cinzel Decorative'; color:var(--gold); text-align:center;">MARKETPLACE</h2>
        <div class="marketplace-wrapper">
            <div class="epic-table-container">
                <table class="epic-table"><tbody id="prices-table-body"></tbody></table>
            </div>
        </div>
    </div>

    <div class="page-section" id="section3" style="text-align:center; display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h2 style="font-family:'Cinzel Decorative'; color:var(--gold); margin-bottom:40px;">BATTLE MEDIA CENTER</h2>
        <a href="videos.html" class="video-btn">WATCH PVP VIDEOS</a>
    </div>

    <script>
        const pricesData = [
            { name: "Orfen Earring", pts: 35, img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/earring-orfen.png?raw=true" },
            { name: "Core Ring", pts: 25, img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/ring-of-core.png?raw=true" },
            { name: "Baium Ring", pts: 950, img: "https://github.com/Mrundisput3d/animals-cp-tracker/blob/master/images/ring-of-baium.png?raw=true" }
        ];
        function render() {
            document.getElementById('prices-table-body').innerHTML = pricesData.map(p => `<tr><td><img src="${p.img}" class="mini-icon"> ${p.name}</td><td style="color:var(--gold); font-weight:bold;">${p.pts}</td></tr>`).join('');
            const noldor = [{name:"Noldor Clan", pts:5000}, {name:"Outlaw CP", pts:3000}];
            document.getElementById('noldor-list').innerHTML = noldor.map(cp => `<div class="cp-box"><button class="cp-btn"><span>${cp.name}</span><span class="points-tag">${cp.pts} PTS</span></button></div>`).join('');
        }
        render();
        setInterval(() => { document.getElementById('clock').innerText = "SERVER TIME: " + new Date().toLocaleTimeString('el-GR'); }, 1000);
    </script>
</body>
</html>
