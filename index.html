<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror | Clan Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --noldor-sky: #00d9ff;
            --krim-red: #ff3333;
            --bg-overlay: rgba(10, 12, 15, 0.96);
            --panel-bg: rgba(15, 18, 22, 0.98);
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background: url('https://images.alphacoders.com/133/1335334.png') no-repeat center center fixed; 
            background-size: cover; color: #eee; margin: 0; padding: 10px;
        }

        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 10%, var(--bg-overlay) 90%); z-index: -1; }

        h1, h2, h3, .column-header, .cp-trigger span { font-family: 'Cinzel', serif; }

        /* ALLY LEADER - LARGE & PROMINENT */
        .ally-leader-crown {
            text-align: center; margin-bottom: 20px;
        }
        .leader-img {
            width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--gold);
            box-shadow: 0 0 20px var(--gold); object-fit: cover; margin-bottom: 10px;
        }
        .leader-name-big { font-size: 2.2rem; color: #fff; text-shadow: 0 0 15px var(--gold); display: block; }

        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 1200px; margin: 0 auto; }
        
        /* COLUMNS */
        .clan-column { background: var(--panel-bg); height: 400px; display: flex; flex-direction: column; border-radius: 4px; overflow: hidden; }
        .column-header { padding: 8px; text-align: center; font-size: 1rem; letter-spacing: 2px; }
        .scroll-area { overflow-y: auto; padding: 5px; flex-grow: 1; }
        .scroll-area::-webkit-scrollbar { width: 3px; }

        .noldor-col { border: 1px solid var(--noldor-sky); }
        .noldor-col .column-header { background: #002233; color: var(--noldor-sky); }
        .krim-col { border: 1px solid var(--krim-red); }
        .krim-col .column-header { background: #330000; color: var(--krim-red); }

        /* CP ITEMS & STATS */
        .cp-item { margin-bottom: 4px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        .cp-trigger { width: 100%; background: none; border: none; padding: 8px 12px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.85rem; }
        .cp-details { display: none; background: #000; padding: 10px; border-top: 1px solid #333; }
        .active .cp-details { display: block; }

        .stat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .stat-box { background: #111; padding: 4px; text-align: center; border: 1px solid #222; font-size: 0.65rem; }
        .stat-name { display: block; color: var(--gold); font-weight: bold; }

        /* CALLER BOX */
        .caller-wrap { max-width: 400px; margin: 0 auto 20px; border: 1px solid var(--gold); background: rgba(0,0,0,0.7); }

        /* DISTRIBUTION LOG - VERY COMPACT */
        .epic-section { width: 100%; max-width: 1200px; margin: 15px auto; border: 1px solid var(--gold); background: var(--panel-bg); height: 180px; display: flex; flex-direction: column; }
        .epic-section .column-header { background: #221a00; color: var(--gold); font-size: 0.8rem; }
        .epic-scroll { overflow-y: auto; padding: 5px; flex-grow: 1; }
        .epic-row { display: flex; justify-content: space-between; padding: 4px 10px; font-size: 0.75rem; border-bottom: 1px solid #222; color: var(--gold); }

        @media (max-width: 700px) { .dashboard-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="ally-leader-crown">
        <img src="https://i.imgur.com/your-image-here.jpg" alt="Niklaus" class="leader-img" onerror="this.src='https://via.placeholder.com/150/000000/d4af37?text=NIKLAUS'">
        <span class="leader-name-big">NIKLAUS</span>
        <small style="color: var(--gold); letter-spacing: 5px;">ALLY LEADER</small>
    </div>

    <div class="caller-wrap">
        <div class="cp-item">
            <button class="cp-trigger" onclick="this.parentElement.classList.toggle('active')">
                <span style="color: var(--gold);">★ TSAKNORRIS (CALLER)</span>
                <small>ATTENDANCE ▼</small>
            </button>
            <div class="cp-details">
                <div class="stat-grid" id="tsak-stats"></div>
            </div>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="clan-column noldor-col">
            <div class="column-header">NOLDOR</div>
            <div class="scroll-area" id="noldor-list"></div>
        </div>
        <div class="clan-column krim-col">
            <div class="column-header">KRIMINALIDES</div>
            <div class="scroll-area" id="krim-list"></div>
        </div>
    </div>

    <div class="epic-section">
        <div class="column-header">LOOT DISTRIBUTION LOG</div>
        <div class="epic-scroll" id="epic-dist-list"></div>
    </div>

    <script>
        const bosses = ["VAL", "ANT", "BAI", "ZAK", "FRI", "AQ", "ORF", "COR", "BEL", "TIAT"];
        // Αφαιρέθηκε το CP 1
        const noldorCPs = ["Noldor Archer", "Noldor Archer 2", "Noldor Dummy", "Noldor Tank", "Κriminalides CP", "Outlaw CP", "Ronin CP", "Brazilians CP", "Brazilians 2 CP", "I am Groot CP"];
        const krimCPs = ["Hattrick CP", "55 Room CP", "Legion CP", "Criminal Record CP", "Avalanche CP", "Gankly Crew CP", "Furious Wolves CP", "Animals CP", "Dracaris CP", "Sinaloa CP", "Knockout CP", "VaBank CP"];

        const epicData = { "TSAKNORRIS": "Zaken Earring", "Hattrick CP": "Valakas Necklace" };

        function createStats() {
            return `<div class="stat-grid">${bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('')}</div>`;
        }

        function createCPItem(name, colorClass) {
            return `<div class="cp-item">
                <button class="cp-trigger" onclick="this.parentElement.classList.toggle('active')">
                    <span style="color:var(${colorClass})">${name}</span>
                    <small>STATS ▼</small>
                </button>
                <div class="cp-details">
                    <p style="font-size:0.7rem; color:#666; margin-bottom:5px;">Epic Participation:</p>
                    ${createStats()}
                </div>
            </div>`;
        }

        document.getElementById('tsak-stats').innerHTML = bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('');
        document.getElementById('noldor-list').innerHTML = noldorCPs.map(name => createCPItem(name, '--noldor-sky')).join('');
        document.getElementById('krim-list').innerHTML = krimCPs.map(name => createCPItem(name, '--krim-red')).join('');
        
        // Distribution Log
        document.getElementById('epic-dist-list').innerHTML = [...noldorCPs, ...krimCPs, "TSAKNORRIS"].map(name => `
            <div class="epic-row">
                <span>${name}</span>
                <span style="color:#fff">${epicData[name] || '--'}</span>
            </div>
        `).join('');
    </script>
</body>
</html>
