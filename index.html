<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror | Clan Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --noldor-blue: #0099ff;
            --krim-red: #ff3333;
            --bg-overlay: rgba(10, 12, 15, 0.94);
            --panel-bg: rgba(20, 24, 28, 0.98);
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background: url('https://images.alphacoders.com/133/1335334.png') no-repeat center center fixed; 
            background-size: cover;
            color: #eee; margin: 0; padding: 20px;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 10%, var(--bg-overlay) 90%);
            z-index: -1;
        }

        h1, h2, h3, .column-header, .cp-trigger span, .stat-title { font-family: 'Cinzel', serif; }

        header { text-align: center; margin-bottom: 30px; }
        .main-title { font-size: 3rem; color: var(--gold); text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); margin: 0; letter-spacing: 5px; }

        /* LEADERSHIP */
        .leadership-section { max-width: 1000px; margin: 0 auto 30px auto; text-align: center; }
        .leader-box { background: rgba(0,0,0,0.7); border: 2px solid var(--gold); padding: 15px; margin-bottom: 15px; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        /* MAIN DASHBOARD */
        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; width: 100%; max-width: 1300px; margin: 0 auto; }
        .clan-column { background: var(--panel-bg); height: 500px; display: flex; flex-direction: column; border-radius: 5px; }
        .scroll-area { overflow-y: auto; padding: 10px; flex-grow: 1; }
        .scroll-area::-webkit-scrollbar { width: 6px; }

        /* NOLDOR STYLE (BLUE) */
        .noldor-col { border: 2px solid var(--noldor-blue); box-shadow: 0 0 15px rgba(0, 153, 255, 0.2); }
        .noldor-col .column-header { background: linear-gradient(to bottom, #003366, #111); color: var(--noldor-blue); border-bottom: 2px solid var(--noldor-blue); }
        .noldor-col .cp-item { border: 1px solid rgba(0, 153, 255, 0.3); }
        .noldor-col .cp-trigger span { color: var(--noldor-blue); }
        .noldor-col .member-stats { border-left-color: var(--noldor-blue); }
        .noldor-col .stat-name { color: var(--noldor-blue); }
        .noldor-col .scroll-area::-webkit-scrollbar-thumb { background: var(--noldor-blue); }

        /* KRIMINALIDES STYLE (RED) */
        .krim-col { border: 2px solid var(--krim-red); box-shadow: 0 0 15px rgba(255, 51, 51, 0.2); }
        .krim-col .column-header { background: linear-gradient(to bottom, #660000, #111); color: var(--krim-red); border-bottom: 2px solid var(--krim-red); }
        .krim-col .cp-item { border: 1px solid rgba(255, 51, 51, 0.3); }
        .krim-col .cp-trigger span { color: var(--krim-red); }
        .krim-col .member-stats { border-left-color: var(--krim-red); }
        .krim-col .stat-name { color: var(--krim-red); }
        .krim-col .scroll-area::-webkit-scrollbar-thumb { background: var(--krim-red); }

        /* CP & MEMBER GENERAL */
        .cp-item { margin-bottom: 8px; background: rgba(0,0,0,0.5); transition: 0.3s; }
        .cp-item:hover { background: rgba(255,255,255,0.05); }
        .cp-trigger { width: 100%; background: none; border: none; padding: 12px; text-align: left; cursor: pointer; display: flex; justify-content: space-between; }
        .cp-details { display: none; background: rgba(0,0,0,0.6); border-top: 1px solid rgba(255,255,255,0.1); }
        .active > .cp-details, .active > .member-stats, .active > .jewel-list { display: block; animation: fadeIn 0.3s; }

        .member-item { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .member-trigger { width: 100%; background: none; border: none; color: #fff; padding: 8px 15px; text-align: left; cursor: pointer; font-size: 0.9rem; }
        .member-stats { display: none; background: #000; padding: 10px; margin: 5px 15px; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .stat-box { background: #111; padding: 5px; text-align: center; border: 1px solid #333; font-size: 0.7rem; }

        /* EPIC DISTRIBUTION (GOLD/YELLOW) */
        .epic-section { width: 100%; max-width: 1300px; margin: 40px auto; background: var(--panel-bg); border: 2px solid var(--gold); height: 500px; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .epic-section .column-header { background: linear-gradient(to bottom, #443300, #111); color: var(--gold); border-bottom: 2px solid var(--gold); }
        .epic-scroll-area { overflow-y: auto; padding: 15px; flex-grow: 1; }
        .epic-scroll-area::-webkit-scrollbar { width: 6px; }
        .epic-scroll-area::-webkit-scrollbar-thumb { background: var(--gold); }
        
        .epic-group-item { margin-bottom: 10px; border: 1px solid rgba(212, 175, 55, 0.3); background: rgba(0,0,0,0.4); }
        .epic-group-trigger { width: 100%; background: none; border: none; color: var(--gold); padding: 15px; text-align: left; cursor: pointer; font-family: 'Cinzel'; display: flex; justify-content: space-between; }
        .jewel-list { display: none; background: rgba(212, 175, 55, 0.05); padding: 10px; border-top: 1px solid var(--gold); }
        .jewel-row { display: flex; justify-content: space-between; padding: 8px 15px; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1 class="main-title">Broken Mirror</h1>
        <p style="color: var(--gold); letter-spacing: 2px;">CLAN MANAGEMENT SYSTEM</p>
    </header>

    <div class="leadership-section">
        <div class="leader-box">
            <h3 style="color: var(--gold); margin: 0; font-size: 0.7rem;">ALLY LEADER</h3>
            <div style="font-size: 1.8rem; color: #fff;">NIKLAUS</div>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="clan-column noldor-col">
            <div class="column-header">Noldor Clan (Blue)</div>
            <div class="scroll-area" id="noldor-list"></div>
        </div>

        <div class="clan-column krim-col">
            <div class="column-header">Kriminalides Main (Red)</div>
            <div class="scroll-area" id="krim-list"></div>
        </div>
    </div>

    <div class="epic-section">
        <div class="column-header">Epic Jewels Distribution Archive (Gold)</div>
        <div class="epic-scroll-area" id="epic-dist-list"></div>
    </div>

    <script>
        const bosses = ["VAL", "ANT", "BAI", "ZAK", "FRI", "AQ", "ORFEN", "CORE", "BELETH"];
        const noldorCPs = ["CP 1", "Noldor Archer", "Noldor Archer 2", "Noldor Dummy", "Noldor Tank", "Κriminalides CP", "Outlaw CP", "Ronin CP", "Brazilians CP", "Brazilians 2 CP", "I am Groot CP"];
        const krimCPs = ["Hattrick CP", "55 Room CP", "Legion CP", "Criminal Record CP", "Avalanche CP", "Gankly Crew CP", "Furious Wolves CP", "Animals CP", "Dracaris CP", "Sinaloa CP", "Knockout CP", "VaBank CP"];
        const callers = ["NIKLAUS", "TSAKNORRIS"];

        const epicData = {
            "Hattrick CP": [{j: "Valakas Necklace", d: "12/03/2026"}],
            "TSAKNORRIS": [{j: "Zaken Earring", d: "05/03/2026"}]
        };

        function createMemberHTML(name, isLeader = false) {
            return `<div class="member-item">
                <button class="member-trigger" onclick="toggleItem(event, this)"><span>${isLeader ? '👑 ' : ''}${name}</span></button>
                <div class="member-stats"><div class="stat-grid">${bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('')}</div></div>
            </div>`;
        }

        function createCPItem(name) {
            return `<div class="cp-item">
                <button class="cp-trigger" onclick="toggleItem(event, this)"><span>${name}</span><small>▼</small></button>
                <div class="cp-details">${createMemberHTML("Leader", true)}${createMemberHTML("Member 1")}</div>
            </div>`;
        }

        function createEpicGroup(name) {
            const jewels = epicData[name] || [];
            const rows = jewels.map(i => `<div class="jewel-row"><span>${i.j}</span><span style="color:#888">${i.d}</span></div>`).join('') || '<div style="padding:10px; color:#555;">Empty</div>';
            return `<div class="epic-group-item">
                <button class="epic-group-trigger" onclick="this.parentElement.classList.toggle('active')"><span>${name}</span><small>${jewels.length} Items ▼</small></button>
                <div class="jewel-list">${rows}</div>
            </div>`;
        }

        document.getElementById('noldor-list').innerHTML = noldorCPs.map(createCPItem).join('');
        document.getElementById('krim-list').innerHTML = krimCPs.map(createCPItem).join('');
        document.getElementById('epic-dist-list').innerHTML = [...callers, ...noldorCPs, ...krimCPs].map(createEpicGroup).join('');

        function toggleItem(event, btn) {
            event.stopPropagation();
            btn.parentElement.classList.toggle('active');
        }
    </script>
</body>
</html>
