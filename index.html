<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance | Roster</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --gold: #d4af37;
            --bg: #0a0c0f;
            --card-bg: #15181c;
            --blue: #00d9ff;
            --red: #ff4444;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg);
            color: #eee;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        .alliance-section {
            margin-bottom: 50px;
        }

        .clan-header {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
        }

        .noldor-header { color: var(--blue); border-color: var(--blue); }
        .kriminalides-header { color: var(--red); border-color: var(--red); }

        .cp-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .cp-card {
            background-color: var(--card-bg);
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
            position: relative;
        }

        .cp-name {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 15px;
            display: block;
        }

        .points-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold);
            color: #fff;
            padding: 5px 12px;
            border-radius: 4px;
            font-weight: bold;
        }

        .member-list {
            font-size: 0.9rem;
            color: #aaa;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Broken Mirror Alliance</h1>

    <div class="alliance-section">
        <div class="clan-header noldor-header">NOLDOR CLAN</div>
        <div id="noldor-grid" class="cp-grid"></div>
    </div>

    <div class="alliance-section">
        <div class="clan-header kriminalides-header">KRIMINALIDES CLAN</div>
        <div id="kriminalides-grid" class="cp-grid"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRL8EehxdcgVYJ0LJ1khVYkSJcaCMKRes",
        authDomain: "brokenmirrordb.firebaseapp.com",
        databaseURL: "https://brokenmirrordb-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "brokenmirrordb",
        storageBucket: "brokenmirrordb.firebasestorage.app",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('cps/').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const noldorGrid = document.getElementById('noldor-grid');
        const krimGrid = document.getElementById('kriminalides-grid');
        
        noldorGrid.innerHTML = "";
        krimGrid.innerHTML = "";

        Object.keys(data).forEach(id => {
            const cp = data[id];
            if(cp.clan === 'history') return;

            const cardHTML = `
                <div class="cp-card">
                    <span class="cp-name">${cp.name}</span>
                    <div class="points-badge">${cp.totalPoints || 0} PTS</div>
                    <div class="member-list">${cp.members}</div>
                </div>
            `;

            if(cp.clan === 'noldor' || cp.clan === 'caller') {
                noldorGrid.innerHTML += cardHTML;
            } else if(cp.clan === 'kriminalides') {
                krimGrid.innerHTML += cardHTML;
            }
        });
    });
</script>
</body>
</html>
