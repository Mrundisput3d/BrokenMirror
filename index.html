<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Mirror Alliance | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --noldor-sky: #00d9ff;
            --krim-red: #ff3333;
            --bg-overlay: rgba(10, 12, 15, 0.9); 
            --panel-bg: rgba(15, 18, 22, 0.98);
            --top1: #ffd700; --top2: #c0c0c0; --top3: #cd7f32;
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background: #0a0c0f url('https://i.ibb.co/1GmpSyxZ/BACKGROUND.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: #eee; margin: 0; padding: 20px;
        }

        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-overlay); z-index: -1; 
        }

        .top-header { text-align: center; margin-bottom: 30px; }
        
        /* LOGOS FIX */
        .ally-logo { width: 160px; height: 160px; object-fit: contain; margin-bottom: 10px; filter: drop-shadow(0 0 15px var(--gold)); }
        .ally-title { font-family: 'Cinzel Decorative', cursive; font-size: 2.5rem; color: var(--gold); display: block; text-shadow: 2px 2px 10px #000; }
        
        .leaders-row { display: flex; justify-content: center; gap: 40px; margin-top: 20px; }
        .leader-card { text-align: center; }
        .img-frame { width: 120px; height: 120px; margin: 0 auto; background: #000; border: 2px solid var(--gold); border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .leader-img { width: 100%; height: 100%; object-fit: contain; }

        .main-wrapper { display: flex; gap: 20px; max-width: 1650px; margin: 0 auto; align-items: flex-start; }

        /* ΠΑΝΕΛ ΛΙΣΤΩΝ */
        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex-grow: 1; }
        .clan-column { background: var(--panel-bg); height: 700px; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 8px; border-top: 3px solid var(--gold); }
        .column-header { padding: 15px; text-align: center; font-family: 'Cinzel'; font-size: 1.1rem; border-bottom: 1px solid #222; }
        
        .scroll-area { overflow-y: auto; padding: 10px; flex-grow: 1; scrollbar-width: thin; scrollbar-color: var(--gold) transparent; }
        .scroll-area::-webkit-scrollbar { width: 5px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--gold); }

        /* CP & MEMBERS INTERACTION */
        .cp-box { margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.4); border-radius: 4px; }
        .rank-1 { border: 1px solid var(--top1); box-shadow: 0 0 10px rgba(255,215,0,0.1); }
        .cp-btn { width: 100%; background: none; border: none; padding: 15px; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .points-tag { color: var(--gold); font-weight: bold; font-size: 0.85rem; border: 1px solid var(--gold); padding: 2px 8px; border-radius: 4px; }

        .member-list { display: none; background: rgba(0,0,0,0.6); border-top: 1px solid #222; }
        .active > .member-list { display: block; }
        
        .member-btn { width: 100%; background: none; border: none; padding: 10px 20px; color: #ccc; text-align: left; cursor: pointer; font-size: 0.85rem; display: flex; justify-content: space-between; border-bottom: 1px solid #111; }
        .stats-area { display: none; background: #000; padding: 10px; }
        .active-member > .stats-area { display: block; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .stat-box { background: #111; padding: 5px; text-align: center; border: 1px solid #222; font-size: 0.65rem; }
        .stat-name { display: block; color: var(--gold); font-weight: bold; }

        /* LOOT ARCHIVE INTERACTION */
        .mini-dist { width: 320px; background: var(--panel-bg); border: 1px solid var(--gold); height: 700px; border-radius: 8px; display: flex; flex-direction: column; }
        .dist-header { background: #1a1400; color: var(--gold); padding: 15px; text-align: center; font-family: 'Cinzel'; border-bottom: 1px solid var(--gold); }
        .dist-item { border-bottom: 1px solid #222; }
        .dist-trigger { width: 100%; padding: 12px; background: none; border: none; color: #fff; text-align: left; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.8rem; }
        .loot-detail { display: none; background: rgba(0,0,0,0.5); padding: 10px; font-size: 0.75rem; color: #aaa; border-left: 2px solid var(--gold); }
        .active-dist > .loot-detail { display: block; }

        @media (max-width: 1200px) { .main-wrapper { flex-direction: column; } .mini-dist { width: 100%; } }
    </style>
</head>
<body>

    <div class="top-header">
        <img src="https://i.ibb.co/1fyDHTJp/alliance-logo.png" class="ally-logo">
        <span class="ally-title">BROKEN MIRROR ALLIANCE</span>
        
        <div class="leaders-row">
            <div class="leader-card">
                <div class="img-frame"><img src="https://i.ibb.co/5X3NDQFR/niklaus.png" class="leader-img"></div>
                <span class="leader-name">NIKLAUS</span>
                <small style="color:var(--gold)">ALLY LEADER</small>
            </div>
            <div class="leader-card">
                <div class="img-frame"><img src="https://i.ibb.co/Zs2GGFt/tsaknorris.png" class="leader-img"></div>
                <span class="leader-name">TSAKNORRIS</span>
                <small style="color:var(--gold)">SHOTCALLER</small>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="dashboard-container">
            <div class="clan-column">
                <div class="column-header" style="color:var(--noldor-sky)">NOLDOR CLAN</div>
                <div class="scroll-area" id="noldor-list"></div>
            </div>
            <div class="clan-column">
                <div class="column-header" style="color:var(--krim-red)">KRIMINALIDES MAIN</div>
                <div class="scroll-area" id="krim-list"></div>
            </div>
        </div>

        <div class="mini-dist">
            <div class="dist-header">LOOT ARCHIVE</div>
            <div class="scroll-area" id="epic-dist-list"></div>
        </div>
    </div>

    <script>
        const bosses = ["VAL", "ANT", "BAI", "FRI", "ZAK", "ORF", "AQ", "CORE", "SIEGE"];
        
        // Mock data
        const noldorData = [
            { name: "Kriminalides CP", pts: 1800, lead: "Boss", mems: ["Member A", "Member B"] },
            { name: "Noldor Archer", pts: 1500, lead: "Artemis", mems: ["Legolas", "Sylvanas"] },
            { name: "Brazilians CP", pts: 1350, lead: "Ronaldo", mems: ["Neymar"] }
        ];

        const krimData = [
            { name: "Hattrick CP", pts: 2100, lead: "Captain", mems: ["Striker", "Goalie"] },
            { name: "55 Room CP", pts: 1950, lead: "Master55", mems: ["Player1"] }
        ];

        function createCPItem(cp, color, rank) {
            const membersHTML = [cp.lead, ...cp.mems].map((m, i) => `
                <div class="member-container">
                    <button class="member-btn" onclick="this.parentElement.classList.toggle('active-member')">
                        <span>${i === 0 ? '👑 ' : ''}${m}</span><small>STATS ▼</small>
                    </button>
                    <div class="stats-area">
                        <div class="stat-grid">${bosses.map(b => `<div class="stat-box"><span class="stat-name">${b}</span>0</div>`).join('')}</div>
                    </div>
                </div>`).join('');

            return `
                <div class="cp-box ${rank === 0 ? 'rank-1' : ''}">
                    <button class="cp-btn" onclick="this.parentElement.classList.toggle('active')">
                        <span style="color:var(${color}); font-weight:bold;">#${rank+1} ${cp.name}</span>
                        <span class="points-tag">${cp.pts} PTS</span>
                    </button>
                    <div class="member-list">${membersHTML}</div>
                </div>`;
        }

        const render = (data, id, col) => {
            const sorted = [...data].sort((a,b) => b.pts - a.pts);
            document.getElementById(id).innerHTML = sorted.map((cp, i) => createCPItem(cp, col, i)).join('');
        };

        render(noldorData, 'noldor-list', '--noldor-sky');
        render(krimData, 'krim-list', '--krim-red');

        // Archive Interaction
        const archiveNames = ["NIKLAUS", "TSAKNORRIS", ...noldorData.map(c=>c.name), ...krimData.map(c=>c.name)];
        document.getElementById('epic-dist-list').innerHTML = archiveNames.map(name => `
            <div class="dist-item">
                <button class="dist-trigger" onclick="this.parentElement.classList.toggle('active-dist')">
                    <span style="color:var(--gold)">${name}</span>
                    <small>HISTORY ▼</small>
                </button>
                <div class="loot-detail">No items recorded in this cycle.</div>
            </div>`).join('');
    </script>
</body>
</html>
